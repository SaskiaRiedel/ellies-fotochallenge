<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    :root {
      --bg: #f5f0e8;
      --text: #161616;
      --muted: #5b5b5b;
      --shadow: 0 10px 28px rgba(0,0,0,0.10);
      --radius: 26px;
      --btn-dark: #222;
      --btn-light: #fff;
      --section-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 50px;
    }

    h1 {
      text-align: center;
      margin: 10px 0 10px;
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      line-height: 1.05;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      line-height: 1.35;
      max-width: 820px;
      margin: 0 auto 30px;
    }

    .section-block {
      margin: 34px 0 42px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
      padding: 14px 18px;
      border-radius: 18px;
      box-shadow: var(--section-shadow);
    }

    .section-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex: 0 0 18px;
      border: 2px solid rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: clamp(1.35rem, 2.4vw, 2rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .task-card {
      border-radius: var(--radius);
      padding: 26px 24px 22px;
      box-shadow: var(--shadow);
    }

    .task-title {
      font-size: clamp(1.35rem, 2.3vw, 1.8rem);
      line-height: 1.18;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .task-caption {
      font-size: clamp(1rem, 1.8vw, 1.12rem);
      line-height: 1.4;
      color: #444;
      margin-bottom: 22px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: transform .12s ease, opacity .12s ease;
    }

    .action-btn:hover,
    .action-btn:focus-visible {
      transform: translateY(-1px);
      opacity: 0.95;
      outline: none;
    }

    .btn-camera {
      background: var(--btn-dark);
      color: var(--btn-light);
    }

    .btn-upload {
      background: rgba(255,255,255,0.86);
      color: #111;
    }

    .status {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #444;
      min-height: 1.3em;
    }

    .hint {
      margin-top: 28px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
      max-width: 920px;
      margin-left: auto;
      margin-right: auto;
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(calc(100vw - 20px), 1000px);
        padding-top: 14px;
      }

      .section-header {
        padding: 12px 14px;
      }

      .task-card {
        padding: 22px 20px 20px;
      }

      .actions {
        flex-direction: column;
      }

      .action-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📸 Fotochallenge</h1>
    <p class="subtitle">
      Wähle eine Aufgabe und lade direkt ein Foto oder Video hoch.
    </p>

    <div id="sectionsContainer"></div>

    <p class="hint">
      <strong>Aufnehmen</strong> öffnet die Kamera für ein neues Foto.
      <strong>Hochladen</strong> öffnet Galerie oder Dateien.
      Bei <strong>„Erinnerungen aus allen Zeiten“</strong> können mehrere Dateien auf einmal ausgewählt werden.
    </p>
  </div>

  <script>
    const sectionsContainer = document.getElementById("sectionsContainer");

    function createHiddenInput(task, mode) {
      const input = document.createElement("input");
      input.type = "file";

      if (mode === "camera") {
        input.accept = "image/*";
        input.setAttribute("capture", "environment");
      } else {
        input.accept = "image/*,video/*";
        if (task.id === "sammelordner") {
          input.multiple = true;
        }
      }

      input.addEventListener("change", async (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;

        const status = document.getElementById(`status-${task.id}`);
        status.textContent = files.length > 1
          ? `${files.length} Dateien werden hochgeladen ...`
          : "Upload läuft ...";

        try {
          for (const file of files) {
            await uploadToCloudinary(file, task);
          }

          status.textContent = files.length > 1
            ? `✓ ${files.length} Uploads erfolgreich!`
            : "✓ Upload erfolgreich!";
        } catch (err) {
          console.error(err);
          status.textContent = "Upload fehlgeschlagen.";
          alert("Mindestens ein Upload hat leider nicht funktioniert.");
        }

        input.value = "";
      });

      return input;
    }

    async function uploadToCloudinary(file, task) {
      const endpoint = `https://api.cloudinary.com/v1_1/${window.APP_CONFIG.cloudName}/auto/upload`;

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", window.APP_CONFIG.uploadPreset);
      formData.append("folder", window.APP_CONFIG.eventTag);

      formData.append(
        "tags",
        `${window.APP_CONFIG.eventTag},fotochallenge,${task.id},${task.section || "ohne-section"}`
      );

      formData.append(
        "context",
        [
          `event_title=${window.APP_CONFIG.eventTitle}`,
          `event_tag=${window.APP_CONFIG.eventTag}`,
          `task_id=${task.id}`,
          `task_title=${task.title}`,
          `task_section=${task.section || ""}`,
          `caption=${task.caption}`
        ].join("|")
      );

      const response = await fetch(endpoint, {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`Cloudinary Upload fehlgeschlagen: ${text}`);
      }

      return response.json();
    }

    function createTaskCard(task) {
      const card = document.createElement("div");
      card.className = "task-card";
      card.style.background = task.color || "#ffffff";

      const title = document.createElement("div");
      title.className = "task-title";
      title.textContent = task.title;

      const caption = document.createElement("div");
      caption.className = "task-caption";
      caption.textContent = task.caption || "";

      const actions = document.createElement("div");
      actions.className = "actions";

      const cameraInput = createHiddenInput(task, "camera");
      const uploadInput = createHiddenInput(task, "upload");

      const cameraBtn = document.createElement("button");
      cameraBtn.className = "action-btn btn-camera";
      cameraBtn.type = "button";
      cameraBtn.textContent = task.id === "sammelordner"
        ? "📷 Foto aufnehmen"
        : "📷 Aufnehmen";
      cameraBtn.addEventListener("click", () => cameraInput.click());

      const uploadBtn = document.createElement("button");
      uploadBtn.className = "action-btn btn-upload";
      uploadBtn.type = "button";
      uploadBtn.textContent = task.id === "sammelordner"
        ? "📁 Hochladen (auch mehrere)"
        : "📁 Hochladen";
      uploadBtn.addEventListener("click", () => uploadInput.click());

      const status = document.createElement("div");
      status.className = "status";
      status.id = `status-${task.id}`;

      actions.appendChild(cameraBtn);
      actions.appendChild(uploadBtn);

      card.appendChild(title);
      card.appendChild(caption);
      card.appendChild(actions);
      card.appendChild(status);
      card.appendChild(cameraInput);
      card.appendChild(uploadInput);

      return card;
    }

    function renderSections() {
      const config = window.APP_CONFIG;
      const sections = Array.isArray(config.sections) ? config.sections : [];
      const tasks = Array.isArray(config.tasks) ? config.tasks : [];

      sectionsContainer.innerHTML = "";

      sections.forEach((section) => {
        const sectionTasks = tasks.filter(task => task.section === section.id);

        if (!sectionTasks.length) return;

        const block = document.createElement("section");
        block.className = "section-block";

        const header = document.createElement("div");
        header.className = "section-header";
        header.style.background = section.color || "#ffffff";

        const dot = document.createElement("div");
        dot.className = "section-dot";
        dot.style.background = section.color || "#ffffff";

        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = section.title;

        const grid = document.createElement("div");
        grid.className = "grid";

        sectionTasks.forEach(task => {
          grid.appendChild(createTaskCard(task));
        });

        header.appendChild(dot);
        header.appendChild(title);

        block.appendChild(header);
        block.appendChild(grid);

        sectionsContainer.appendChild(block);
      });

      const tasksWithoutSection = tasks.filter(task => !task.section);
      if (tasksWithoutSection.length) {
        const fallbackBlock = document.createElement("section");
        fallbackBlock.className = "section-block";

        const header = document.createElement("div");
        header.className = "section-header";
        header.style.background = "#ffffff";

        const dot = document.createElement("div");
        dot.className = "section-dot";
        dot.style.background = "#ffffff";

        const title = document.createElement("h2");
        title.className = "section-title";
        title.textContent = "Weitere Aufgaben";

        const grid = document.createElement("div");
        grid.className = "grid";

        tasksWithoutSection.forEach(task => {
          grid.appendChild(createTaskCard(task));
        });

        header.appendChild(dot);
        header.appendChild(title);

        fallbackBlock.appendChild(header);
        fallbackBlock.appendChild(grid);

        sectionsContainer.appendChild(fallbackBlock);
      }
    }

    renderSections();
  </script>
</body>
</html>
