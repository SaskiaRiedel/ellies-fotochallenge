<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    :root {
      --bg: #f5f0e8;
      --text: #161616;
      --muted: #5b5b5b;
      --shadow: 0 10px 28px rgba(0,0,0,0.10);
      --section-shadow: 0 8px 20px rgba(0,0,0,0.08);
      --radius: 24px;
      --btn-dark: #222;
      --btn-light: #fff;
      --border: rgba(0,0,0,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 50px;
    }

    h1 {
      text-align: center;
      margin: 10px 0 10px;
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      line-height: 1.05;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      line-height: 1.35;
      max-width: 820px;
      margin: 0 auto 30px;
    }

    .accordion {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 18px;
    }

    .section-block {
      border-radius: 24px;
      box-shadow: var(--section-shadow);
      overflow: hidden;
      background: rgba(255,255,255,0.4);
    }

    .section-toggle {
      width: 100%;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 22px;
      cursor: pointer;
      text-align: left;
    }

    .section-toggle:hover {
      filter: brightness(0.99);
    }

    .section-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .section-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      flex: 0 0 18px;
      border: 2px solid rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: clamp(1.25rem, 2.5vw, 1.9rem);
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .section-count {
      font-size: 0.98rem;
      color: #444;
      margin-top: 4px;
    }

    .section-arrow {
      font-size: 1.4rem;
      font-weight: 700;
      transition: transform 0.2s ease;
      flex: 0 0 auto;
    }

    .section-block.open .section-arrow {
      transform: rotate(180deg);
    }

    .section-content {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.30);
    }

    .section-block.open .section-content {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 22px;
      padding-top: 18px;
    }

    .task-card {
      border-radius: var(--radius);
      padding: 24px 22px 20px;
      box-shadow: var(--shadow);
    }

    .task-title {
      font-size: clamp(1.25rem, 2.2vw, 1.7rem);
      line-height: 1.18;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .task-caption {
      font-size: clamp(0.98rem, 1.8vw, 1.08rem);
      line-height: 1.4;
      color: #444;
      margin-bottom: 20px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: transform .12s ease, opacity .12s ease;
    }

    .action-btn:hover,
    .action-btn:focus-visible {
      transform: translateY(-1px);
      opacity: 0.95;
      outline: none;
    }

    .btn-camera {
      background: var(--btn-dark);
      color: var(--btn-light);
    }

    .btn-upload {
      background: rgba(255,255,255,0.86);
      color: #111;
    }

    .status {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #444;
      min-height: 1.3em;
    }

    .hint {
      margin-top: 30px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.45;
      max-width: 920px;
      margin-left: auto;
      margin-right: auto;
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(calc(100vw - 20px), 1000px);
        padding-top: 14px;
      }

      .section-toggle {
        padding: 18px 16px;
      }

      .section-content {
        padding: 0 14px 16px;
      }

      .task-card {
        padding: 22px 18px 18px;
      }

      .actions {
        flex-direction: column;
      }

      .action-btn {
        width: 100%;
      }

      .section-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📸 Fotochallenge</h1>
    <p class="subtitle">
      Wähle eine Kategorie, öffne eine Aufgabe und lade direkt ein Foto oder Video hoch.
    </p>

    <div id="sectionsContainer" class="accordion"></div>

    <p class="hint">
      <strong>Aufnehmen</strong> öffnet die Kamera für ein neues Foto.
      <strong>Hochladen</strong> öffnet Galerie oder Dateien.
      Bei <strong>„Erinnerungen aus allen Zeiten“</strong> können mehrere Dateien auf einmal ausgewählt werden.
    </p>
  </div>

  <script>
    const sectionsContainer = document.getElementById("sectionsContainer");

    function createHiddenInput(task, mode) {
      const input = document.createElement("input");
      input.type = "file";

      if (mode === "camera") {
        input.accept = "image/*";
        input.setAttribute("capture", "environment");
      } else {
        input.accept = "image/*,video/*";
        if (task.id === "sammelordner") {
          input.multiple = true;
        }
      }

      input.addEventListener("change", async (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;

        const status = document.getElementById(`status-${task.id}`);
        status.textContent = files.length > 1
          ? `${files.length} Dateien werden hochgeladen ...`
          : "Upload läuft ...";

        try {
          for (const file of files) {
            await uploadToCloudinary(file, task);
          }

          status.textContent = files.length > 1
            ? `✓ ${files.length} Uploads erfolgreich!`
            : "✓ Upload erfolgreich!";
        } catch (err) {
          console.error(err);
          status.textContent = "Upload fehlgeschlagen.";
          alert("Mindestens ein Upload hat leider nicht funktioniert.");
        }

        input.value = "";
      });

      return input;
    }

    async function uploadToCloudinary(file, task) {
      const endpoint = `https://api.cloudinary.com/v1_1/${window.APP_CONFIG.cloudName}/auto/upload`;

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", window.APP_CONFIG.uploadPreset);
      formData.append("folder", window.APP_CONFIG.eventTag);

      formData.append(
        "tags",
        `${window.APP_CONFIG.eventTag},fotochallenge,${task.id},${task.section || "ohne-section"}`
      );

      formData.append(
        "context",
        [
          `event_title=${window.APP_CONFIG.eventTitle}`,
          `event_tag=${window.APP_CONFIG.eventTag}`,
          `task_id=${task.id}`,
          `task_title=${task.title}`,
          `task_section=${task.section || ""}`,
          `caption=${task.caption || ""}`
        ].join("|")
      );

      const response = await fetch(endpoint, {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`Cloudinary Upload fehlgeschlagen: ${text}`);
      }

      return response.json();
    }

    function createTaskCard(task) {
      const card = document.createElement("div");
      card.className = "task-card";
      card.style.background = task.color || "#ffffff";

      const title = document.createElement("div");
      title.className = "task-title";
      title.textContent = task.title;

      const caption = document.createElement("div");
      caption.className = "task-caption";
      caption.textContent = task.caption || "";

      const actions = document.createElement("div");
      actions.className = "actions";

      const cameraInput = createHiddenInput(task, "camera");
      const uploadInput = createHiddenInput(task, "upload");

      const cameraBtn = document.createElement("button");
      cameraBtn.className = "action-btn btn-camera";
      cameraBtn.type = "button";
      cameraBtn.textContent = task.id === "sammelordner"
        ? "📷 Foto aufnehmen"
        : "📷 Aufnehmen";
      cameraBtn.addEventListener("click", () => cameraInput.click());

      const uploadBtn = document.createElement("button");
      uploadBtn.className = "action-btn btn-upload";
      uploadBtn.type = "button";
      uploadBtn.textContent = task.id === "sammelordner"
        ? "📁 Hochladen (auch mehrere)"
        : "📁 Hochladen";
      uploadBtn.addEventListener("click", () => uploadInput.click());

      const status = document.createElement("div");
      status.className = "status";
      status.id = `status-${task.id}`;

      actions.appendChild(cameraBtn);
      actions.appendChild(uploadBtn);

      card.appendChild(title);
      card.appendChild(caption);
      card.appendChild(actions);
      card.appendChild(status);
      card.appendChild(cameraInput);
      card.appendChild(uploadInput);

      return card;
    }

    function createSectionBlock(section, sectionTasks, isOpen = false) {
      const block = document.createElement("section");
      block.className = "section-block";
      if (isOpen) block.classList.add("open");

      const toggle = document.createElement("button");
      toggle.className = "section-toggle";
      toggle.type = "button";
      toggle.style.background = section.color || "#ffffff";

      const left = document.createElement("div");
      left.className = "section-left";

      const dot = document.createElement("div");
      dot.className = "section-dot";
      dot.style.background = section.color || "#ffffff";

      const textWrap = document.createElement("div");

      const title = document.createElement("h2");
      title.className = "section-title";
      title.textContent = section.title;

      const count = document.createElement("div");
      count.className = "section-count";
      count.textContent = `${sectionTasks.length} Aufgaben`;

      textWrap.appendChild(title);
      textWrap.appendChild(count);

      left.appendChild(dot);
      left.appendChild(textWrap);

      const arrow = document.createElement("div");
      arrow.className = "section-arrow";
      arrow.textContent = "⌄";

      toggle.appendChild(left);
      toggle.appendChild(arrow);

      const content = document.createElement("div");
      content.className = "section-content";

      const grid = document.createElement("div");
      grid.className = "grid";

      sectionTasks.forEach(task => {
        grid.appendChild(createTaskCard(task));
      });

      content.appendChild(grid);

      toggle.addEventListener("click", () => {
        block.classList.toggle("open");
      });

      block.appendChild(toggle);
      block.appendChild(content);

      return block;
    }

    function renderSections() {
      const config = window.APP_CONFIG;
      const sections = Array.isArray(config.sections) ? config.sections : [];
      const tasks = Array.isArray(config.tasks) ? config.tasks : [];

      sectionsContainer.innerHTML = "";

      sections.forEach((section, index) => {
        const sectionTasks = tasks.filter(task => task.section === section.id);
        if (!sectionTasks.length) return;

        const isOpenByDefault = section.id === "erinnerungen";
        const block = createSectionBlock(section, sectionTasks, isOpenByDefault);
        sectionsContainer.appendChild(block);
      });
    }

    renderSections();
  </script>
</body>
</html>
