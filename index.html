<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ellies Fotochallenge</title>

  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <script src="config.js"></script>

  <style>
    :root {
      --bg: #f5f3f1;
      --text: #161616;
      --muted: #5a5a5a;
      --card-shadow: 0 10px 28px rgba(0, 0, 0, 0.10);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: min(1100px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 42px;
    }

    h1 {
      margin: 10px 0 8px;
      text-align: center;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1.05;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: clamp(1rem, 2.6vw, 1.55rem);
      line-height: 1.35;
      margin: 0 auto 26px;
      max-width: 820px;
    }

    .top-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .pill-link {
      display: inline-block;
      text-decoration: none;
      color: #111;
      background: #fff;
      padding: 14px 22px;
      border-radius: 999px;
      box-shadow: var(--card-shadow);
      font-size: 1.15rem;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .task-btn {
      border: none;
      border-radius: var(--radius);
      padding: 28px 26px 26px;
      min-height: 240px;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--card-shadow);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      color: #111;
    }

    .task-btn:hover,
    .task-btn:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.14);
      outline: none;
    }

    .task-title {
      font-size: clamp(1.5rem, 3vw, 2rem);
      line-height: 1.18;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .task-caption {
      font-size: clamp(1.05rem, 2vw, 1.22rem);
      line-height: 1.45;
      color: #444;
    }

    .hint {
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.4;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100vw - 24px, 1000px);
        padding-top: 18px;
      }

      .task-btn {
        min-height: 210px;
        padding: 24px 22px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📸 Ellies Fotochallenge</h1>
    <p class="subtitle">
      Tippe auf eine Aufgabe und lade direkt ein Foto oder Video hoch.
    </p>

    <div class="top-actions">
      <a class="pill-link" href="slideshow.html" target="_blank" rel="noopener">Diashow öffnen</a>
    </div>

    <div id="taskGrid" class="grid"></div>

    <p class="hint">
      Es stehen nur <strong>Datei/Galerie</strong> und <strong>Kamera</strong> zur Auswahl.
      Videos dürfen hochgeladen werden, werden in der Diashow aber nicht abgespielt.
    </p>
  </div>

  <script>
    const grid = document.getElementById("taskGrid");

    function openUpload(task) {
      const widget = cloudinary.createUploadWidget(
        {
          cloudName: APP_CONFIG.cloudName,
          uploadPreset: APP_CONFIG.uploadPreset,

          sources: ["local", "camera"],
          showAdvancedOptions: false,
          showCompletedButton: true,

          multiple: false,
          maxFiles: 1,

          resourceType: "auto",
          clientAllowedFormats: [
            "jpg", "jpeg", "png", "webp", "heic",
            "mp4", "mov", "m4v", "webm"
          ],

          cameraModes: ["photo", "video"],
          // wichtig: KEIN showCamera:true, damit nicht automatisch die Kamera aufgeht

          tags: task.tags,
          context: {
            event_title: APP_CONFIG.eventTitle,
            event_tag: APP_CONFIG.eventTag,
            task_id: task.id,
            task_title: task.title,
            caption: task.caption
          },

          // diese Werte sind okay, auch wenn Cloudinary den Ordner
          // bei unsigned Uploads nicht immer wie gewünscht umsetzt
          folder: APP_CONFIG.eventTag,
          publicIdPrefix: `${APP_CONFIG.eventTag}/${task.id}`,

          cropping: false,
          thumbnailTransformation: [{ width: 400, crop: "limit" }]
        },
        (error, result) => {
          if (error) {
            console.error("Upload-Fehler:", error);
            alert("Der Upload hat leider nicht funktioniert.");
            return;
          }

          if (result && result.event === "success") {
            alert("Upload erfolgreich. Danke!");
          }
        }
      );

      widget.open();
    }

    APP_CONFIG.tasks.forEach(task => {
      const button = document.createElement("button");
      button.className = "task-btn";
      button.style.background = task.color;
      button.innerHTML = `
        <div class="task-title">${task.title}</div>
        <div class="task-caption">${task.caption}</div>
      `;
      button.addEventListener("click", () => openUpload(task));
      grid.appendChild(button);
    });
  </script>
</body>
</html>
