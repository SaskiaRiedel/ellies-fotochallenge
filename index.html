<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ellies Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    :root {
      --bg: #f5f3f1;
      --text: #161616;
      --muted: #5b5b5b;
      --shadow: 0 10px 28px rgba(0,0,0,0.10);
      --radius: 26px;
      --btn-dark: #222;
      --btn-light: #fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: min(1100px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    h1 {
      text-align: center;
      margin: 10px 0 10px;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 1.05;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      line-height: 1.35;
      max-width: 820px;
      margin: 0 auto 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 24px;
    }

    .task-card {
      border-radius: var(--radius);
      padding: 26px 24px 22px;
      box-shadow: var(--shadow);
    }

    .task-title {
      font-size: clamp(1.45rem, 2.8vw, 2rem);
      line-height: 1.18;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .task-caption {
      font-size: clamp(1.02rem, 1.9vw, 1.18rem);
      line-height: 1.4;
      color: #444;
      margin-bottom: 22px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      transition: transform .12s ease, opacity .12s ease;
    }

    .action-btn:hover,
    .action-btn:focus-visible {
      transform: translateY(-1px);
      opacity: 0.95;
      outline: none;
    }

    .btn-camera {
      background: var(--btn-dark);
      color: var(--btn-light);
    }

    .btn-upload {
      background: rgba(255,255,255,0.85);
      color: #111;
    }

    .status {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #444;
      min-height: 1.3em;
    }

    .hint {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.4;
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(calc(100vw - 20px), 1000px);
        padding-top: 14px;
      }

      .task-card {
        padding: 22px 20px 20px;
      }

      .actions {
        flex-direction: column;
      }

      .action-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>📸 Fotochallenge</h1>
    <p class="subtitle">
      Wähle eine Aufgabe und lade direkt ein Foto oder Video hoch.
    </p>

    <div id="taskGrid" class="grid"></div>

    <p class="hint">
      Mit <strong>Aufnehmen</strong> startest du Kamera oder Videoaufnahme. Mit <strong>Hochladen</strong> wählst du aus Galerie oder Dateien.
    </p>
  </div>

  <script>
    const grid = document.getElementById("taskGrid");

    function createHiddenInput(task, mode) {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*,video/*";

      // Nur beim Kamera-Button setzen wir capture.
      // Damit wird NICHT automatisch beim Öffnen der Seite die Kamera geöffnet,
      // sondern erst nach Klick auf den Button.
      if (mode === "camera") {
        input.setAttribute("capture", "environment");
      }

      input.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        if (!file) return;

        const status = document.getElementById(`status-${task.id}`);
        status.textContent = "Upload läuft ...";

        try {
          await uploadToCloudinary(file, task);
          status.textContent = "Upload erfolgreich. Danke!";
        } catch (err) {
          console.error(err);
          status.textContent = "Upload fehlgeschlagen.";
          alert("Der Upload hat leider nicht funktioniert.");
        }

        // Zurücksetzen, damit dieselbe Datei ggf. erneut gewählt werden kann
        input.value = "";
      });

      return input;
    }

    async function uploadToCloudinary(file, task) {
      const endpoint = `https://api.cloudinary.com/v1_1/${APP_CONFIG.cloudName}/auto/upload`;

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", APP_CONFIG.uploadPreset);
      formData.append("folder", APP_CONFIG.eventTag);

      // Tags
      formData.append("tags", task.tags.join(","));

      // Kontext
      formData.append(
        "context",
        [
          `event_title=${APP_CONFIG.eventTitle}`,
          `event_tag=${APP_CONFIG.eventTag}`,
          `task_id=${task.id}`,
          `task_title=${task.title}`,
          `caption=${task.caption}`
        ].join("|")
      );

      const response = await fetch(endpoint, {
        method: "POST",
        body: formData
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(`Cloudinary Upload fehlgeschlagen: ${text}`);
      }

      return response.json();
    }

    function renderTask(task) {
      const card = document.createElement("div");
      card.className = "task-card";
      card.style.background = task.color;

      const title = document.createElement("div");
      title.className = "task-title";
      title.textContent = task.title;

      const caption = document.createElement("div");
      caption.className = "task-caption";
      caption.textContent = task.caption;

      const actions = document.createElement("div");
      actions.className = "actions";

      const cameraInput = createHiddenInput(task, "camera");
      const uploadInput = createHiddenInput(task, "upload");

      const cameraBtn = document.createElement("button");
      cameraBtn.className = "action-btn btn-camera";
      cameraBtn.type = "button";
      cameraBtn.textContent = "📷 Aufnehmen";
      cameraBtn.addEventListener("click", () => cameraInput.click());

      const uploadBtn = document.createElement("button");
      uploadBtn.className = "action-btn btn-upload";
      uploadBtn.type = "button";
      uploadBtn.textContent = "📁 Hochladen";
      uploadBtn.addEventListener("click", () => uploadInput.click());

      const status = document.createElement("div");
      status.className = "status";
      status.id = `status-${task.id}`;

      actions.appendChild(cameraBtn);
      actions.appendChild(uploadBtn);

      card.appendChild(title);
      card.appendChild(caption);
      card.appendChild(actions);
      card.appendChild(status);
      card.appendChild(cameraInput);
      card.appendChild(uploadInput);

      grid.appendChild(card);
    }

    APP_CONFIG.tasks.forEach(renderTask);
  </script>
</body>
</html>
