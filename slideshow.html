<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');

    :root{
      --wall-bg:#e9e4db;
      --shadow:0 12px 26px rgba(0,0,0,.18);
      --caption-text:#111;
      --aspect-num:16;
      --aspect-den:9;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{ position:relative; }

    .viewport{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#111;
      overflow:hidden;
    }

    .stage-shell{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#111;
    }

    .stage{
      position:relative;
      width:min(100vw, calc(100vh * (var(--aspect-num) / var(--aspect-den))));
      height:min(100vh, calc(100vw * (var(--aspect-den) / var(--aspect-num))));
      overflow:hidden;
      background:var(--wall-bg);
    }

    .bg-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background-color:var(--wall-bg);
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
    }

    .empty-note{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:rgba(0,0,0,.45);
      font-size:clamp(1rem,1.8vw,1.45rem);
      text-align:center;
      padding:24px;
      z-index:20;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      right:12px;
      bottom:12px;
      z-index:250;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:6px;
      justify-content:end;
      transition:opacity .18s ease;
    }

    .controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .control-btn{
      border:none;
      border-radius:999px;
      padding:6px 11px;
      min-width:60px;
      background:rgba(255,255,255,.45);
      color:#3d3d3d;
      cursor:pointer;
      font-size:.82rem;
      font-weight:700;
      backdrop-filter:blur(4px);
      box-shadow:0 4px 10px rgba(0,0,0,.09);
    }

    .control-btn.active{
      background:rgba(255,255,255,.82);
      color:#1f1f1f;
    }

    .photo-card{
      position:absolute;
      z-index:30;
      pointer-events:none;
      will-change:left, top, width;
    }

    .photo-frame{
      position:relative;
      border-radius:2px;
      overflow:visible;
      box-shadow:var(--shadow);
      transform-origin:50% 0%;
      will-change:transform, opacity;
      background:#fff;
    }

    .photo-top{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#fff;
      border-radius:1px 1px 0 0;
    }

    .photo-top img.photo-image{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:#fff;
    }

    .caption-strip{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--caption-text);
      font-family:"Kalam","Segoe Print","Trebuchet MS",Arial,sans-serif;
      font-weight:700;
      line-height:1.02;
      letter-spacing:.01em;
      overflow:hidden;
      word-break:break-word;
      hyphens:auto;
    }

    .caption-inner{
      width:100%;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
      overflow:hidden;
    }

    .clip{
      position:absolute;
      z-index:8;
      transform-origin:50% 10%;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter:drop-shadow(0 2px 3px rgba(0,0,0,.18));
      will-change:transform, opacity;
    }

    .photo-card.attaching .photo-frame{
      animation:attachPhoto var(--attach-duration,1s) cubic-bezier(.2,.72,.2,1) forwards;
    }

    .photo-card.attaching .clip{
      animation:attachClip var(--attach-duration,1s) cubic-bezier(.2,.72,.2,1) forwards;
    }

    .photo-card.swinging .photo-frame{
      animation:swayPhotoDamped var(--sway-duration,2.4s) cubic-bezier(.22,.65,.18,1) forwards;
    }

    .photo-card.detaching .photo-frame{
      animation:detachPhoto .95s cubic-bezier(.28,.7,.3,1) forwards;
    }

    .photo-card.detaching .clip{
      animation:detachClip .85s cubic-bezier(.28,.7,.3,1) forwards;
    }

    @keyframes attachPhoto{
      0%{
        opacity:0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(.988);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--photo-rest-rot))
          scale(1);
      }
    }

    @keyframes attachClip{
      0%{
        opacity:0;
        transform:
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(.988);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--clip-rest-rot))
          scale(1);
      }
    }

    @keyframes swayPhotoDamped{
      0%{
        transform:translate(0,0) rotate(var(--photo-rest-rot));
      }
      15%{
        transform:translate(var(--sway-x1), var(--sway-y1)) rotate(calc(var(--photo-final-rot) + var(--sway-r1)));
      }
      32%{
        transform:translate(var(--sway-x2), var(--sway-y2)) rotate(calc(var(--photo-final-rot) - var(--sway-r2)));
      }
      50%{
        transform:translate(var(--sway-x3), var(--sway-y3)) rotate(calc(var(--photo-final-rot) + var(--sway-r3)));
      }
      70%{
        transform:translate(var(--sway-x4), var(--sway-y4)) rotate(calc(var(--photo-final-rot) - var(--sway-r4)));
      }
      86%{
        transform:translate(var(--sway-x5), var(--sway-y5)) rotate(calc(var(--photo-final-rot) + var(--sway-r5)));
      }
      100%{
        transform:translate(0,0) rotate(var(--photo-final-rot));
      }
    }

    @keyframes detachPhoto{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--photo-final-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--photo-end-x), var(--photo-end-y))
          rotate(calc(var(--photo-final-rot) + var(--photo-end-rot)))
          scale(.985);
      }
    }

    @keyframes detachClip{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--clip-rest-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rest-rot) + var(--clip-end-rot)))
          scale(.985);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell">
      <div class="stage" id="stage">
        <div id="bgLayer" class="bg-layer"></div>
        <div id="emptyNote" class="empty-note">Noch keine Bilder in der Fotowand gefunden.</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button id="btn43" class="control-btn" type="button">4:3</button>
    <button id="btn75" class="control-btn" type="button">7:5</button>
    <button id="btn169" class="control-btn active" type="button">16:9</button>
    <button id="btn1610" class="control-btn" type="button">16:10</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const bgLayer = document.getElementById("bgLayer");
    const emptyNote = document.getElementById("emptyNote");
    const controls = document.getElementById("controls");

    const btn43 = document.getElementById("btn43");
    const btn75 = document.getElementById("btn75");
    const btn169 = document.getElementById("btn169");
    const btn1610 = document.getElementById("btn1610");

    const REPO_BASE = "/ellies-fotochallenge/";
    const CACHE_BUSTER = "v=20260308c";

    function assetUrl(filename){
      return `${window.location.origin}${REPO_BASE}assets/${filename}?${CACHE_BUSTER}`;
    }

    const BG_IMAGE = assetUrl("bg_16_9.png");
    const CLIP_IMAGES = [
      assetUrl("klammer1_uhd.png"),
      assetUrl("klammer2_uhd.png"),
      assetUrl("klammer3_uhd.png")
    ];

    const aspectMap = {
      "4:3":   { num:4,  den:3  },
      "7:5":   { num:7,  den:5  },
      "16:9":  { num:16, den:9  },
      "16:10": { num:16, den:10 }
    };

    const allAssets = [];
    const assetIds = new Set();
    const currentCards = [];
    const showCounts = new Map();
    const recentlyShown = [];
    const MAX_RECENT_TRACK = 40;

    let currentFormat = "16:9";
    let nextTimer = null;
    let fetchTimer = null;

    /*
      Nur noch obere + mittlere Reihe.
      anchorX/anchorY = Punkt auf dem Faden, den die Klammer treffen soll.
      Größerer Abstand zwischen den Slots, damit 3 große Bilder sauber passen.
    */
    const SLOT_VARIANTS = [
      ["t1","t3","m5"],
      ["t1","t4","m2"],
      ["t2","t4","m1"],
      ["t2","t5","m3"],
      ["t1","t3","m4"],
      ["t2","t4","m5"],
      ["t1","t4","m4"],
      ["t2","t3","m5"],
      ["t1","t5","m3"],
      ["t2","t5","m2"],

      ["t1","m2"],
      ["t2","m4"],
      ["t4","m2"],
      ["t5","m4"],
      ["t3","m1"],
      ["t3","m5"],
      ["t2","m3"],
      ["t4","m3"]
    ];

    const ANCHORS = {
      t1:{ id:"t1", row:"top",    x:16.0, y:9.2 },
      t2:{ id:"t2", row:"top",    x:31.5, y:11.1 },
      t3:{ id:"t3", row:"top",    x:49.5, y:11.9 },
      t4:{ id:"t4", row:"top",    x:68.5, y:10.9 },
      t5:{ id:"t5", row:"top",    x:84.5, y:8.9 },

      m1:{ id:"m1", row:"middle", x:15.0, y:37.0 },
      m2:{ id:"m2", row:"middle", x:30.5, y:40.2 },
      m3:{ id:"m3", row:"middle", x:48.0, y:41.3 },
      m4:{ id:"m4", row:"middle", x:67.5, y:40.4 },
      m5:{ id:"m5", row:"middle", x:83.8, y:36.9 }
    };

    function getAnchor(id){
      return ANCHORS[id];
    }

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sortByUploadOrder(list){
      return list.sort((a, b) => Number(a.version || 0) - Number(b.version || 0));
    }

    function preloadImage(url){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    async function setFormat(format){
      currentFormat = format;
      const cfg = aspectMap[format];
      document.documentElement.style.setProperty("--aspect-num", String(cfg.num));
      document.documentElement.style.setProperty("--aspect-den", String(cfg.den));

      const ok = await preloadImage(BG_IMAGE);
      bgLayer.style.backgroundImage = ok ? `url("${BG_IMAGE}")` : "none";

      btn43.classList.toggle("active", format === "4:3");
      btn75.classList.toggle("active", format === "7:5");
      btn169.classList.toggle("active", format === "16:9");
      btn1610.classList.toggle("active", format === "16:10");
    }

    function requestFullscreen(){
      const el = document.documentElement;
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function updateControlVisibility(){
      controls.classList.toggle("hidden", !!document.fullscreenElement);
    }

    document.addEventListener("fullscreenchange", updateControlVisibility);

    btn43.addEventListener("click", async () => {
      await setFormat("4:3");
      requestFullscreen();
      await rebuildWall();
    });

    btn75.addEventListener("click", async () => {
      await setFormat("7:5");
      requestFullscreen();
      await rebuildWall();
    });

    btn169.addEventListener("click", async () => {
      await setFormat("16:9");
      requestFullscreen();
      await rebuildWall();
    });

    btn1610.addEventListener("click", async () => {
      await setFormat("16:10");
      requestFullscreen();
      await rebuildWall();
    });

    function getTask(asset){
      const taskId = asset?.context?.custom?.task_id || "";
      const tasks = Array.isArray(APP_CONFIG?.tasks) ? APP_CONFIG.tasks : [];
      return tasks.find(t => t.id === taskId) || null;
    }

    function getCardMeta(asset){
      const task = getTask(asset);
      const caption = (
        asset?.context?.custom?.caption ||
        asset?.context?.custom?.spruch ||
        asset?.context?.caption ||
        "Fotochallenge"
      ).trim();

      return {
        caption,
        color: task?.color || "#dfeaf4"
      };
    }

    function rememberShown(publicId){
      recentlyShown.push(publicId);
      while(recentlyShown.length > MAX_RECENT_TRACK){
        recentlyShown.shift();
      }
    }

    function markShown(publicId){
      showCounts.set(publicId, (showCounts.get(publicId) || 0) + 1);
      rememberShown(publicId);
    }

    function fetchAssets(){
      return fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`)
        .then(response => {
          if(!response.ok){
            throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
          }
          return response.json();
        })
        .then(data => {
          const resources = Array.isArray(data.resources) ? data.resources : [];
          const onlyImages = resources.filter(asset => {
            const format = String(asset.format || "").toLowerCase();
            return ["jpg","jpeg","png","webp","heic"].includes(format);
          });

          sortByUploadOrder(onlyImages).forEach(asset => {
            if(!assetIds.has(asset.public_id)){
              assetIds.add(asset.public_id);
              allAssets.push(asset);
            }
          });

          if(allAssets.length > 0){
            emptyNote.style.display = "none";
          }
        })
        .catch(error => console.error(error));
    }

    function isFreshAsset(asset){
      const uploadMs = Number(asset.version || 0) * 1000;
      return uploadMs > (Date.now() - 5 * 60 * 1000);
    }

    function estimateCaptionMinWidth(caption){
      const len = caption.length;
      if(len <= 18) return 13.5;
      if(len <= 28) return 15.5;
      if(len <= 38) return 17.0;
      return 18.5;
    }

    function pickBalancedVariant(currentSlotIds = []){
      const currentSet = new Set(currentSlotIds);

      const ranked = SLOT_VARIANTS.map(v => {
        const overlap = v.filter(id => currentSet.has(id)).length;
        const score =
          overlap * 4 +
          rand(0, 1.4);
        return { variant:v, score };
      });

      /*
        Gewünschtes Verhalten:
        - max 3 Fotos
        - min 2 Fotos
        - nicht immer dieselben Slots
        - aber auch nicht alles komplett neu
      */
      const filtered = ranked.filter(item => {
        if(currentSlotIds.length === 0) return true;
        const overlap = item.variant.filter(id => currentSet.has(id)).length;
        return overlap >= Math.max(0, currentSlotIds.length - 2) && overlap < currentSlotIds.length;
      });

      const pool = filtered.length ? filtered : ranked;
      pool.sort((a,b) => b.score - a.score);

      return pick(pool.slice(0, Math.min(8, pool.length))).variant.slice();
    }

    function chooseAssets(count){
      const currentIds = new Set(currentCards.map(c => c.asset.public_id));
      const chosen = [];
      const excluded = new Set(currentIds);

      let freshUsed = 0;

      for(let i = 0; i < count; i++){
        let candidates = allAssets.filter(a => !excluded.has(a.public_id));
        if(!candidates.length) break;

        const fresh = candidates.filter(a => isFreshAsset(a));
        if(fresh.length && freshUsed < 2){
          fresh.sort((a,b) => (showCounts.get(a.public_id)||0) - (showCounts.get(b.public_id)||0));
          const asset = fresh[0];
          chosen.push(asset);
          excluded.add(asset.public_id);
          freshUsed++;
          continue;
        }

        candidates = candidates
          .map(asset => ({
            asset,
            score:
              (showCounts.get(asset.public_id) || 0) +
              (recentlyShown.includes(asset.public_id) ? 2 : 0) +
              rand(0, 0.8)
          }))
          .sort((a,b) => a.score - b.score)
          .slice(0, Math.min(12, candidates.length));

        const asset = pick(candidates).asset;
        chosen.push(asset);
        excluded.add(asset.public_id);
      }

      return chosen;
    }

    function overlapArea(a, b){
      const xOverlap = Math.max(0, Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x));
      const yOverlap = Math.max(0, Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y));
      return xOverlap * yOverlap;
    }

    function buildLayout(asset, anchor, totalCount){
      const meta = getCardMeta(asset);
      const ratio = clamp(Number(asset.width || 1) / Number(asset.height || 1), 0.55, 2.5);

      const isPortrait = ratio < 0.92;
      const isLandscape = ratio > 1.20;

      /*
        Deutlich größere Fotos
      */
      let frameW = totalCount === 2 ? 20.5 : 17.8;
      if(anchor.row === "top") frameW += 0.8;
      if(isPortrait) frameW *= 0.96;
      if(isLandscape) frameW *= 1.12;

      frameW = Math.max(frameW, estimateCaptionMinWidth(meta.caption));
      frameW = clamp(frameW, 16.2, totalCount === 2 ? 24.0 : 21.0);

      const sidePad = clamp(frameW * 0.024, 0.38, 0.62);
      const topPad = clamp(frameW * 0.018, 0.26, 0.42);
      const innerW = frameW - sidePad * 2;

      let mediaH = innerW / ratio;
      mediaH = Math.max(mediaH, isPortrait ? 12.0 : 8.8);
      mediaH = Math.min(mediaH, isPortrait ? 24.0 : 15.0);

      let captionFont = clamp(frameW * 0.102, 1.0, 1.72);
      let captionH = clamp(captionFont * 1.85, 2.0, 3.25);

      const frameH = topPad + mediaH + captionH;

      return {
        meta,
        ratio,
        frameW,
        frameH,
        sidePad,
        topPad,
        mediaH,
        captionH,
        captionFont
      };
    }

    function buildGeometry(anchor, layout){
      const clipXPercent = clamp(50 + rand(-6, 6), 45, 55);

      const left = anchor.x - (layout.frameW * (clipXPercent / 100));
      const top = anchor.y;

      const restRot = rand(-5.5, 5.5);
      const finalRot = restRot + rand(-0.9, 0.9);

      return {
        clipXPercent,
        left,
        top,
        restRot,
        finalRot,
        rect:{
          x:left,
          y:top,
          w:layout.frameW,
          h:layout.frameH
        }
      };
    }

    function validatePrepared(items){
      for(let i = 0; i < items.length; i++){
        const r = items[i].geometry.rect;

        if(r.x < 1.6) return false;
        if(r.x + r.w > 98.4) return false;
        if(r.y < 4.8) return false;
        if(r.y + r.h > 92.0) return false;

        for(let j = i + 1; j < items.length; j++){
          const r2 = items[j].geometry.rect;
          const area = overlapArea(r, r2);
          const minArea = Math.min(r.w * r.h, r2.w * r2.h);
          if(area / minArea > 0.08) return false;
        }
      }
      return true;
    }

    function prepareVariant(variant, chosenAssets){
      const prepared = [];

      for(let i = 0; i < variant.length; i++){
        const anchor = getAnchor(variant[i]);
        const asset = chosenAssets[i];
        const layout = buildLayout(asset, anchor, variant.length);
        const geometry = buildGeometry(anchor, layout);

        prepared.push({
          slotId: variant[i],
          anchor,
          asset,
          layout,
          geometry
        });
      }

      return validatePrepared(prepared) ? prepared : null;
    }

    function createCard(prepared, attachDelay = 0){
      const { asset, layout, geometry } = prepared;
      const meta = layout.meta;

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card";
      wrapper.style.left = `${geometry.left}%`;
      wrapper.style.top = `${geometry.top}%`;
      wrapper.style.width = `${layout.frameW}%`;
      wrapper.style.opacity = "0";

      const frame = document.createElement("div");
      frame.className = "photo-frame";
      frame.style.width = "100%";
      frame.style.padding = `${layout.topPad}% ${layout.sidePad}% 0 ${layout.sidePad}%`;
      frame.style.background = meta.color;

      const photoTop = document.createElement("div");
      photoTop.className = "photo-top";
      photoTop.style.height = `${layout.mediaH}%`;
      photoTop.style.background = "#fff";

      const img = document.createElement("img");
      img.className = "photo-image";
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_2600,h_2600,q_auto,f_auto/${asset.public_id}`;
      img.alt = meta.caption;

      const captionStrip = document.createElement("div");
      captionStrip.className = "caption-strip";
      captionStrip.style.background = meta.color;
      captionStrip.style.height = `${layout.captionH}%`;
      captionStrip.style.padding = "0.20em 0.50em 0.34em";
      captionStrip.style.fontSize = `${layout.captionFont}vw`;

      const captionInner = document.createElement("div");
      captionInner.className = "caption-inner";
      captionInner.textContent = meta.caption;

      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = pick(CLIP_IMAGES);
      clip.onerror = function(){
        this.style.display = "none";
      };

      /*
        Klammern deutlich größer und einheitlicher
      */
      const clipHeight = 5.8; // % von Stage-Höhe durch absolute Positionierung im Wrapper-Kontext
      clip.style.height = `${clipHeight}%`;
      clip.style.width = "auto";
      clip.style.left = `${geometry.clipXPercent}%`;
      clip.style.top = `-4.4%`;

      const photoRestRot = `${geometry.restRot.toFixed(2)}deg`;
      const photoFinalRot = `${geometry.finalRot.toFixed(2)}deg`;

      const clipRestRot = `${rand(-9, 9).toFixed(2)}deg`;
      const clipStartRot = `${(parseFloat(clipRestRot) + rand(-4, 4)).toFixed(2)}deg`;

      const photoMode = pick(["below","below-left","below-right","left","right"]);
      let psx = 0, psy = 0;

      if(photoMode === "below"){
        psx = rand(-8,8); psy = rand(14,22);
      }else if(photoMode === "below-left"){
        psx = rand(-14,-7); psy = rand(14,22);
      }else if(photoMode === "below-right"){
        psx = rand(7,14); psy = rand(14,22);
      }else if(photoMode === "left"){
        psx = rand(-16,-10); psy = rand(5,14);
      }else{
        psx = rand(10,16); psy = rand(5,14);
      }

      const clipMode = pick(["top","diag-left","diag-right"]);
      let csx = 0, csy = 0;
      if(clipMode === "top"){
        csx = rand(-2,2); csy = rand(-18,-12);
      }else if(clipMode === "diag-left"){
        csx = rand(-10,-5); csy = rand(-18,-12);
      }else{
        csx = rand(5,10); csy = rand(-18,-12);
      }

      wrapper.style.setProperty("--attach-duration", "1s");

      wrapper.style.setProperty("--photo-start-x", `${psx}px`);
      wrapper.style.setProperty("--photo-start-y", `${psy}px`);
      wrapper.style.setProperty("--photo-start-rot", `${rand(-2.0,2.0).toFixed(2)}deg`);
      wrapper.style.setProperty("--photo-rest-rot", photoRestRot);
      wrapper.style.setProperty("--photo-final-rot", photoFinalRot);

      wrapper.style.setProperty("--clip-start-x", `${csx}px`);
      wrapper.style.setProperty("--clip-start-y", `${csy}px`);
      wrapper.style.setProperty("--clip-start-rot", clipStartRot);
      wrapper.style.setProperty("--clip-rest-rot", clipRestRot);

      wrapper.style.setProperty("--sway-duration", `${rand(2.05, 2.85).toFixed(2)}s`);
      wrapper.style.setProperty("--sway-r1", `${rand(1.3, 2.1).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r2", `${rand(0.85, 1.45).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r3", `${rand(0.45, 0.85).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r4", `${rand(0.20, 0.45).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r5", `${rand(0.07, 0.20).toFixed(2)}deg`);

      wrapper.style.setProperty("--sway-x1", `${rand(-0.9, 0.9).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y1", `${rand(-0.4, 0.4).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x2", `${rand(-0.6, 0.6).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y2", `${rand(-0.25, 0.25).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x3", `${rand(-0.35, 0.35).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y3", `${rand(-0.15, 0.15).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x4", `${rand(-0.18, 0.18).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y4", `${rand(-0.08, 0.08).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x5", `${rand(-0.08, 0.08).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y5", `${rand(-0.04, 0.04).toFixed(2)}px`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-8,8).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-y", `${rand(14,20).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-2.0,2.0).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-end-x", `${rand(-8,8).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-y", `${rand(-16,-10).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-6,6).toFixed(2)}deg`);

      photoTop.appendChild(img);
      captionStrip.appendChild(captionInner);
      frame.appendChild(photoTop);
      frame.appendChild(captionStrip);
      wrapper.appendChild(frame);
      wrapper.appendChild(clip);
      stage.appendChild(wrapper);

      const cardObj = {
        slotId: prepared.slotId,
        asset,
        el: wrapper,
        mountedAt: Date.now()
      };
      currentCards.push(cardObj);
      markShown(asset.public_id);

      setTimeout(() => {
        wrapper.style.opacity = "1";
        wrapper.classList.add("attaching");
      }, attachDelay);

      setTimeout(() => {
        wrapper.classList.remove("attaching");
        wrapper.classList.add("swinging");
      }, attachDelay + 1020);

      setTimeout(() => {
        wrapper.classList.remove("swinging");
      }, attachDelay + 1020 + 2900);

      return cardObj;
    }

    function detachCard(cardObj, delay = 0){
      return new Promise(resolve => {
        setTimeout(() => {
          cardObj.el.classList.remove("attaching", "swinging");
          cardObj.el.classList.add("detaching");

          setTimeout(() => {
            cardObj.el.remove();
            const idx = currentCards.indexOf(cardObj);
            if(idx >= 0) currentCards.splice(idx, 1);
            resolve(cardObj.slotId);
          }, 980);
        }, delay);
      });
    }

    function chooseInitialVariant(){
      const preferred = SLOT_VARIANTS.filter(v => v.length === 3);
      return pick(preferred).slice();
    }

    function getCurrentSlotIds(){
      return currentCards.map(c => c.slotId);
    }

    function chooseNextVariant(){
      const currentSlots = getCurrentSlotIds();
      return pickBalancedVariant(currentSlots);
    }

    function prepareChosenVariant(variant){
      for(let attempt = 0; attempt < 80; attempt++){
        const assets = chooseAssets(variant.length);
        if(assets.length !== variant.length) return null;

        const prepared = prepareVariant(variant, assets);
        if(prepared) return prepared;
      }
      return null;
    }

    async function initialRender(){
      if(!allAssets.length){
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const variant = chooseInitialVariant();
      const prepared = prepareChosenVariant(variant);
      if(!prepared) return;

      prepared.forEach((item, index) => createCard(item, index * 500));
    }

    function scheduleNextCycle(delayMs){
      clearTimeout(nextTimer);
      nextTimer = setTimeout(runCycle, delayMs);
    }

    async function runCycle(){
      if(!allAssets.length || !currentCards.length){
        scheduleNextCycle(5000);
        return;
      }

      const nextVariant = chooseNextVariant();
      const currentSet = new Set(getCurrentSlotIds());
      const nextSet = new Set(nextVariant);

      const toRemove = currentCards.filter(c => !nextSet.has(c.slotId));
      const toKeepIds = currentCards.filter(c => nextSet.has(c.slotId)).map(c => c.slotId);
      const toAddIds = nextVariant.filter(id => !currentSet.has(id));

      // Falls die neue Variante identisch wäre, erzwingen wir Wechsel
      if(toRemove.length === 0 && toAddIds.length === 0){
        scheduleNextCycle(6000);
        return;
      }

      const prepared = prepareChosenVariant(toAddIds);
      if(toAddIds.length && !prepared){
        scheduleNextCycle(6000);
        return;
      }

      await Promise.all(
        toRemove.map((card, i) => detachCard(card, i * 140))
      );

      await new Promise(resolve => setTimeout(resolve, 260));

      if(prepared){
        prepared.forEach((item, index) => createCard(item, index * 500));
      }

      const addedCount = prepared ? prepared.length : 0;
      const attachEnd = addedCount ? 1000 + ((addedCount - 1) * 500) : 0;

      // min. 5 s sichtbar nach Anbringung
      scheduleNextCycle(attachEnd + 5200);
    }

    async function rebuildWall(){
      clearTimeout(nextTimer);

      while(currentCards.length){
        const card = currentCards.pop();
        card.el.remove();
      }

      await initialRender();
      scheduleNextCycle(6500);
    }

    async function boot(){
      await setFormat("16:9");
      await fetchAssets();
      await initialRender();

      clearInterval(fetchTimer);
      fetchTimer = setInterval(fetchAssets, 10000);

      scheduleNextCycle(6500);
      updateControlVisibility();
    }

    boot();
  </script>
</body>
</html>
