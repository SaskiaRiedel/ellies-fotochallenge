<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    :root{
      --wall-bg:#e9e4db;
      --shadow:0 14px 32px rgba(0,0,0,.22);
      --caption-text:#111;
      --aspect-num:16;
      --aspect-den:9;
      --card-side-pad:14px;
      --card-top-pad:14px;
      --card-bottom-pad:18px;
      --caption-h:68px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      position:relative;
    }

    .viewport{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#111;
      overflow:hidden;
    }

    .stage-shell{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#111;
    }

    .stage{
      position:relative;
      width:min(100vw, calc(100vh * (var(--aspect-num) / var(--aspect-den))));
      height:min(100vh, calc(100vw * (var(--aspect-den) / var(--aspect-num))));
      overflow:hidden;
      background:var(--wall-bg);
    }

    .bg-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background-color:var(--wall-bg);
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
    }

    .empty-note{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:rgba(0,0,0,.45);
      font-size:clamp(1.1rem,2vw,1.6rem);
      text-align:center;
      padding:24px;
      z-index:20;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:200;
      display:flex;
      gap:10px;
    }

    .control-btn{
      border:none;
      border-radius:999px;
      padding:10px 16px;
      background:rgba(255,255,255,.72);
      color:#4b4b4b;
      cursor:pointer;
      font-size:.95rem;
      font-weight:700;
      backdrop-filter:blur(6px);
      box-shadow:0 6px 18px rgba(0,0,0,.14);
      min-width:68px;
    }

    .control-btn.active{
      background:rgba(255,255,255,.95);
      color:#222;
    }

    .photo-card{
      position:absolute;
      z-index:30;
      pointer-events:none;
    }

    .photo-frame{
      position:relative;
      width:100%;
      height:100%;
      background:#fff;
      box-shadow:var(--shadow);
      border-radius:2px;
      transform-origin:top center;
      overflow:visible;
    }

    .media{
      position:absolute;
      left:var(--card-side-pad);
      right:var(--card-side-pad);
      top:var(--card-top-pad);
      overflow:hidden;
      background:#fff;
      border-radius:1px;
    }

    .media img{
      display:block;
      width:100%;
      height:100%;
      object-fit:fill;
      background:#fff;
    }

    .caption{
      position:absolute;
      left:var(--card-side-pad);
      right:var(--card-side-pad);
      bottom:var(--card-bottom-pad);
      height:var(--caption-h);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:8px 12px;
      font-size:1rem;
      line-height:1.12;
      font-weight:700;
      color:var(--caption-text);
      overflow:hidden;
    }

    .clip{
      position:absolute;
      top:-28px;
      height:42px;
      width:auto;
      z-index:5;
      transform-origin:center top;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.18));
    }

    .photo-card.attaching .photo-frame{
      animation:attachPhoto 1.55s ease forwards;
    }

    .photo-card.attaching .clip{
      animation:attachClip 1.25s ease forwards;
    }

    .photo-card.swinging .photo-frame{
      animation:swayPhoto var(--sway-duration,1.7s) ease-in-out 1;
    }

    .photo-card.detaching .photo-frame{
      animation:detachPhoto 1.45s ease forwards;
    }

    .photo-card.detaching .clip{
      animation:detachClip 1.05s ease forwards;
    }

    @keyframes attachPhoto{
      0%{
        opacity:0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(.94);
      }
      100%{
        opacity:1;
        transform:rotate(var(--photo-rot)) translateY(0) scale(1);
      }
    }

    @keyframes attachClip{
      0%{
        opacity:0;
        transform:
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(.9);
      }
      100%{
        opacity:1;
        transform:rotate(var(--clip-rot)) scale(1);
      }
    }

    @keyframes swayPhoto{
      0%{
        transform:rotate(var(--photo-rot)) translateY(0);
      }
      22%{
        transform:rotate(calc(var(--photo-rot) + var(--sway-r1))) translateY(var(--sway-y1));
      }
      48%{
        transform:rotate(calc(var(--photo-rot) - var(--sway-r2))) translateY(var(--sway-y2));
      }
      72%{
        transform:rotate(calc(var(--photo-rot) + var(--sway-r3))) translateY(var(--sway-y3));
      }
      100%{
        transform:rotate(var(--photo-rot)) translateY(0);
      }
    }

    @keyframes detachPhoto{
      0%{
        opacity:1;
        transform:rotate(var(--photo-rot)) translateY(0) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--photo-end-x), 180px)
          rotate(calc(var(--photo-rot) + var(--photo-end-rot)))
          scale(.94);
      }
    }

    @keyframes detachClip{
      0%{
        opacity:1;
        transform:rotate(var(--clip-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rot) + var(--clip-end-rot)))
          scale(.92);
      }
    }

    @media (max-width: 1400px){
      .caption{font-size:.9rem}
      .clip{height:38px}
    }

    @media (max-width: 1100px){
      .caption{font-size:.82rem}
      .clip{height:34px}
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell">
      <div class="stage" id="stage">
        <div id="bgLayer" class="bg-layer"></div>
        <div id="emptyNote" class="empty-note">Noch keine Bilder in der Fotowand gefunden.</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="btn43" class="control-btn" type="button">4:3</button>
    <button id="btn169" class="control-btn active" type="button">16:9</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const bgLayer = document.getElementById("bgLayer");
    const emptyNote = document.getElementById("emptyNote");
    const btn43 = document.getElementById("btn43");
    const btn169 = document.getElementById("btn169");

    const CACHE_BUSTER = "v=20260307b";

    function assetUrl(filename){
      return new URL(`assets/${filename}?${CACHE_BUSTER}`, window.location.href).href;
    }

    const CLIP_IMAGES = [
      assetUrl("klammer1_uhd.png"),
      assetUrl("klammer2_uhd.png"),
      assetUrl("klammer3_uhd.png")
    ];

    const BG_IMAGES = {
      "16:9": assetUrl("fotowand_bg_uhd_16x9.png"),
      "4:3": assetUrl("fotowand_uhd_4x3.png")
    };

    const allAssets = [];
    const assetIds = new Set();
    const currentCards = [];
    const recentlyShown = [];
    const MAX_RECENT_TRACK = 30;

    let currentFormat = "16:9";
    let nextTimer = null;

    // dichter, größer und gleichmäßiger verteilt
    const slotSets = {
      "16:9": [
        { id:"A", x:17, y:10, maxW:29, maxH:30 },
        { id:"B", x:40, y:10, maxW:24, maxH:31 },
        { id:"C", x:64, y:10, maxW:24, maxH:30 },
        { id:"D", x:86, y:11, maxW:22, maxH:29 },

        { id:"E", x:16, y:39, maxW:26, maxH:28 },
        { id:"F", x:39, y:39, maxW:24, maxH:30 },
        { id:"G", x:62, y:39, maxW:24, maxH:30 },
        { id:"H", x:84, y:40, maxW:22, maxH:30 },

        { id:"I", x:18, y:69, maxW:26, maxH:28 },
        { id:"J", x:42, y:68, maxW:24, maxH:30 },
        { id:"K", x:66, y:69, maxW:24, maxH:30 },
        { id:"L", x:86, y:70, maxW:22, maxH:29 }
      ],
      "4:3": [
        { id:"A", x:16, y:10, maxW:27, maxH:29 },
        { id:"B", x:38, y:10, maxW:24, maxH:31 },
        { id:"C", x:62, y:10, maxW:24, maxH:30 },
        { id:"D", x:84, y:11, maxW:22, maxH:29 },

        { id:"E", x:16, y:39, maxW:26, maxH:28 },
        { id:"F", x:39, y:39, maxW:24, maxH:30 },
        { id:"G", x:62, y:39, maxW:24, maxH:30 },
        { id:"H", x:84, y:40, maxW:22, maxH:30 },

        { id:"I", x:18, y:69, maxW:26, maxH:28 },
        { id:"J", x:42, y:68, maxW:24, maxH:30 },
        { id:"K", x:66, y:69, maxW:24, maxH:30 },
        { id:"L", x:86, y:70, maxW:22, maxH:29 }
      ]
    };

    const initialPatterns = {
      3: [
        ["B","F","J"],
        ["C","G","K"],
        ["A","G","L"]
      ],
      4: [
        ["A","D","F","K"],
        ["B","E","H","L"],
        ["A","C","G","K"]
      ],
      5: [
        ["A","C","F","H","K"],
        ["B","D","F","I","L"],
        ["A","D","G","J","L"]
      ],
      6: [
        ["A","C","E","G","J","L"],
        ["B","D","F","H","I","K"],
        ["A","D","F","G","J","L"]
      ]
    };

    function setFormat(format){
      currentFormat = format;

      if(format === "4:3"){
        document.documentElement.style.setProperty("--aspect-num", "4");
        document.documentElement.style.setProperty("--aspect-den", "3");
      } else {
        document.documentElement.style.setProperty("--aspect-num", "16");
        document.documentElement.style.setProperty("--aspect-den", "9");
      }

      bgLayer.style.backgroundImage = `url("${BG_IMAGES[format]}")`;

      btn43.classList.toggle("active", format === "4:3");
      btn169.classList.toggle("active", format === "16:9");
    }

    function requestFullscreen(){
      const el = document.documentElement;
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.msRequestFullscreen) el.msRequestFullscreen();
    }

    btn43.addEventListener("click", async () => {
      setFormat("4:3");
      requestFullscreen();
      await rebuildWall();
    });

    btn169.addEventListener("click", async () => {
      setFormat("16:9");
      requestFullscreen();
      await rebuildWall();
    });

    setFormat("16:9");

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sortByUploadOrder(list){
      return list.sort((a, b) => Number(a.version || 0) - Number(b.version || 0));
    }

    function getTaskStyle(asset){
      const taskId = asset?.context?.custom?.task_id || "";
      const task = APP_CONFIG.tasks.find(t => t.id === taskId);

      return {
        caption: asset?.context?.custom?.caption || "Fotochallenge",
        color: task?.color || "#f3f3f3"
      };
    }

    function rememberShown(publicId){
      recentlyShown.push(publicId);
      while(recentlyShown.length > MAX_RECENT_TRACK){
        recentlyShown.shift();
      }
    }

    function getSlotById(id){
      return slotSets[currentFormat].find(s => s.id === id);
    }

    function availableSlots(){
      const usedIds = new Set(currentCards.map(c => c.slot.id));
      return slotSets[currentFormat].filter(s => !usedIds.has(s.id));
    }

    function chooseInitialSlots(count){
      const patterns = initialPatterns[count] || initialPatterns[5];
      const ids = pick(patterns);
      return ids.map(getSlotById);
    }

    function fetchAssets(){
      return fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`)
        .then(response => {
          if(!response.ok){
            throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
          }
          return response.json();
        })
        .then(data => {
          const resources = Array.isArray(data.resources) ? data.resources : [];

          const onlyImages = resources.filter(asset => {
            const format = (asset.format || "").toLowerCase();
            return ["jpg","jpeg","png","webp","heic"].includes(format);
          });

          sortByUploadOrder(onlyImages).forEach(asset => {
            if(!assetIds.has(asset.public_id)){
              assetIds.add(asset.public_id);
              allAssets.push(asset);
            }
          });

          if(allAssets.length > 0){
            emptyNote.style.display = "none";
          }
        })
        .catch(error => {
          console.error(error);
        });
    }

    function getRecentAssets(limit = 12){
      return [...allAssets]
        .sort((a, b) => Number(b.version || 0) - Number(a.version || 0))
        .slice(0, limit);
    }

    function pickAssetForSlot(slot, extraExcluded = []){
      const shownIds = new Set(currentCards.map(c => c.asset.public_id));
      const excluded = new Set([...shownIds, ...extraExcluded]);

      const recents = getRecentAssets(12).filter(a => !excluded.has(a.public_id));
      if(recents.length) return recents[0];

      const older = shuffle(
        allAssets.filter(a =>
          !excluded.has(a.public_id) &&
          !recentlyShown.includes(a.public_id)
        )
      );
      if(older.length) return older[0];

      const fallback = shuffle(
        allAssets.filter(a => !excluded.has(a.public_id))
      );
      return fallback[0] || null;
    }

    function computeCardSize(asset, slot){
      const ratio = Math.max(0.45, Math.min(2.4, Number(asset.width || 1) / Number(asset.height || 1)));

      const sidePad = 1.7;
      const topPad = 1.7;
      const bottomPad = 8.7;

      let mediaW;
      let mediaH;

      // Foto bestimmt die Rahmenform
      if(ratio >= 1){
        mediaW = slot.maxW;
        mediaH = mediaW / ratio;
        if(mediaH > slot.maxH - bottomPad){
          mediaH = slot.maxH - bottomPad;
          mediaW = mediaH * ratio;
        }
      } else {
        mediaH = slot.maxH - bottomPad;
        mediaW = mediaH * ratio;
        if(mediaW > slot.maxW){
          mediaW = slot.maxW;
          mediaH = mediaW / ratio;
        }
      }

      const frameW = mediaW + sidePad * 2;
      const frameH = mediaH + topPad + bottomPad;

      return {
        mediaW,
        mediaH,
        frameW,
        frameH
      };
    }

    function createCard(asset, slot){
      const style = getTaskStyle(asset);
      const size = computeCardSize(asset, slot);

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card attaching";
      wrapper.style.width = `${size.frameW}%`;
      wrapper.style.height = `${size.frameH}%`;
      wrapper.style.left = `calc(${slot.x}% - ${size.frameW / 2}%)`;
      wrapper.style.top = `${slot.y}%`;

      const frame = document.createElement("div");
      frame.className = "photo-frame";

      const media = document.createElement("div");
      media.className = "media";
      media.style.left = "14px";
      media.style.right = "14px";
      media.style.top = "14px";
      media.style.height = `calc(100% - 14px - 18px - 68px)`;
      media.style.border = `8px solid ${style.color}`;
      media.style.borderBottom = "0";

      const img = document.createElement("img");
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_2600,h_2600,q_auto,f_auto/${asset.public_id}`;
      img.alt = style.caption;

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.style.background = style.color;
      caption.textContent = style.caption;

      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = pick(CLIP_IMAGES);
      clip.onerror = function(){
        this.style.display = "none";
      };

      const photoRot = rand(-5.5, 5.5).toFixed(2) + "deg";
      const clipRot = rand(-9, 9).toFixed(2) + "deg";
      const clipLeft = rand(46, 54).toFixed(1) + "%";

      wrapper.style.setProperty("--photo-rot", photoRot);
      wrapper.style.setProperty("--clip-rot", clipRot);

      wrapper.style.setProperty("--photo-start-x", `${rand(-18, 18).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-start-y", `${rand(48, 82).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-start-rot", `${rand(-9, 9).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-start-x", `${rand(-12, 12).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-start-y", `${rand(-46, -24).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-start-rot", `${rand(-15, 15).toFixed(2)}deg`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-22, 22).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-16, 16).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-end-x", `${rand(-18, 18).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-y", `${rand(-22, -6).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-18, 18).toFixed(2)}deg`);

      wrapper.style.setProperty("--sway-duration", `${rand(1.1, 2.2).toFixed(2)}s`);
      wrapper.style.setProperty("--sway-r1", `${rand(0.15, 2.2).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r2", `${rand(0.1, 1.9).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r3", `${rand(0.1, 1.4).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-y1", `${rand(-1.4, 1.4).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y2", `${rand(-1.8, 1.8).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y3", `${rand(-1.0, 1.0).toFixed(2)}px`);

      clip.style.left = clipLeft;

      media.appendChild(img);
      frame.appendChild(media);
      frame.appendChild(caption);
      wrapper.appendChild(frame);
      wrapper.appendChild(clip);
      stage.appendChild(wrapper);

      const cardObj = {
        asset,
        slot,
        el: wrapper,
        mountedAt: Date.now()
      };

      wrapper.addEventListener("animationend", () => {
        wrapper.classList.remove("attaching");
        wrapper.classList.add("swinging");
        setTimeout(() => wrapper.classList.remove("swinging"), 2300);
      }, { once:true });

      currentCards.push(cardObj);
      rememberShown(asset.public_id);

      return cardObj;
    }

    function detachCard(cardObj){
      return new Promise(resolve => {
        cardObj.el.classList.remove("attaching", "swinging");
        cardObj.el.classList.add("detaching");

        setTimeout(() => {
          cardObj.el.remove();
          const idx = currentCards.indexOf(cardObj);
          if(idx >= 0) currentCards.splice(idx, 1);
          resolve(cardObj.slot);
        }, 1450);
      });
    }

    function oldestCards(count){
      return [...currentCards]
        .sort((a, b) => a.mountedAt - b.mountedAt)
        .slice(0, count);
    }

    async function initialRender(){
      if(!allAssets.length){
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const startCount = Math.min(5, Math.max(3, allAssets.length >= 5 ? 5 : allAssets.length));
      const startSlots = chooseInitialSlots(startCount);
      const used = [];

      for(const slot of startSlots){
        const asset = pickAssetForSlot(slot, used);
        if(!asset) continue;
        used.push(asset.public_id);
        createCard(asset, slot);
      }
    }

    function chooseExchangePlan(){
      const currentCount = currentCards.length;

      const plans = [
        { remove:1, add:1 },
        { remove:1, add:2 },
        { remove:2, add:1 },
        { remove:2, add:2 },
        { remove:2, add:3 },
        { remove:3, add:2 },
        { remove:3, add:3 }
      ];

      const valid = plans.filter(plan => {
        const nextCount = currentCount - plan.remove + plan.add;
        return nextCount >= 3 && nextCount <= 6;
      });

      return pick(valid);
    }

    function scheduleNextCycle(delayMs){
      clearTimeout(nextTimer);
      nextTimer = setTimeout(runCycle, delayMs);
    }

    async function runCycle(){
      if(!allAssets.length || !currentCards.length){
        scheduleNextCycle(5000);
        return;
      }

      const plan = chooseExchangePlan();
      const toRemove = oldestCards(plan.remove);
      const removedSlots = await Promise.all(toRemove.map(detachCard));

      await new Promise(resolve => setTimeout(resolve, 2000));

      const stillFree = availableSlots();
      const preferredSlots = [...removedSlots, ...stillFree.filter(s => !removedSlots.some(r => r.id === s.id))];
      const slotsForNewCards = preferredSlots.slice(0, plan.add);
      const usedNewIds = [];

      for(const slot of slotsForNewCards){
        const asset = pickAssetForSlot(slot, usedNewIds);
        if(!asset) continue;
        usedNewIds.push(asset.public_id);
        createCard(asset, slot);
      }

      const delay = plan.remove === 1 ? 5000 : plan.remove === 2 ? 10000 : 15000;
      scheduleNextCycle(delay);
    }

    async function rebuildWall(){
      clearTimeout(nextTimer);

      while(currentCards.length){
        const card = currentCards.pop();
        card.el.remove();
      }

      await initialRender();
      scheduleNextCycle(8000);
    }

    async function boot(){
      await fetchAssets();
      await initialRender();
      setInterval(fetchAssets, 10000);
      scheduleNextCycle(8000);
    }

    boot();
  </script>
</body>
</html>
