<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>
  <style>
    :root{
      --page-bg:#000;
      --wall-bg:#ece7dc;
      --btn-bg:rgba(255,255,255,.72);
      --btn-bg-active:rgba(255,255,255,.92);
      --btn-text:#3f352d;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--page-bg);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #app{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    #stage{
      position:absolute;
      inset:0;
      margin:auto;
      overflow:hidden;
      background:#ece7dc;
      transform-origin:center center;
    }

    #wall{
      position:absolute;
      inset:0;
      background:#ece7dc url("assets/bg_16_9.png") center center / 100% 100% no-repeat;
      pointer-events:none;
    }

    #cards{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .polaroid{
      position:absolute;
      transform-origin:50% 0%;
      will-change:transform, opacity;
      opacity:1;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.16));
    }

    .polaroid.entering{
      opacity:0;
    }

    .card{
      position:relative;
      width:100%;
      height:100%;
      overflow:visible;
      border-radius:2px;
      box-shadow:0 10px 22px rgba(0,0,0,.14);
    }

    .inner{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:2px;
    }

    .photo-wrap{
      position:relative;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .photo-wrap img{
      display:block;
      width:auto;
      height:auto;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .caption{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:700;
      color:#111;
      overflow:hidden;
      line-height:1.07;
      padding:0 .4em;
      word-break:break-word;
      hyphens:auto;
    }

    .caption-text{
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
      line-clamp:2;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .clip{
      position:absolute;
      left:50%;
      top:0;
      transform-origin:center top;
      z-index:10;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      display:block;
      width:auto;
      height:auto;
    }

    #controls{
      position:absolute;
      right:9px;
      bottom:9px;
      z-index:999;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:5px;
      transition:opacity .25s ease;
    }

    #controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .fmt-btn{
      appearance:none;
      border:none;
      border-radius:999px;
      background:var(--btn-bg);
      color:var(--btn-text);
      font-size:11px;
      font-weight:700;
      line-height:1;
      padding:7px 11px;
      min-width:52px;
      cursor:pointer;
      backdrop-filter:blur(3px);
      box-shadow:0 2px 7px rgba(0,0,0,.08);
      transition:.18s ease;
    }

    .fmt-btn:hover{ background:rgba(255,255,255,.84); }
    .fmt-btn.active{ background:var(--btn-bg-active); }

    @keyframes cardIn{
      0%{
        opacity:0;
        transform:
          translate(var(--in-x0), var(--in-y0))
          rotate(var(--in-r0))
          scale(.94);
      }
      18%{ opacity:.75; }
      45%{
        opacity:1;
        transform:
          translate(var(--in-x1), var(--in-y1))
          rotate(var(--in-r1))
          scale(1.012);
      }
      72%{
        transform:
          translate(var(--in-x2), var(--in-y2))
          rotate(var(--in-r2))
          scale(1);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--rest-r))
          scale(1);
      }
    }

    @keyframes clipIn{
      0%{
        opacity:0;
        transform:
          translate(-50%,0)
          translate(var(--clip-x0), var(--clip-y0))
          rotate(var(--clip-r0))
          scale(.94);
      }
      50%{
        opacity:1;
        transform:
          translate(-50%,0)
          translate(var(--clip-x1), var(--clip-y1))
          rotate(var(--clip-r1))
          scale(1.01);
      }
      100%{
        opacity:1;
        transform:
          translate(-50%,0)
          translate(var(--clip-xf), var(--clip-yf))
          rotate(var(--clip-rf))
          scale(1);
      }
    }

    @keyframes cardOut{
      0%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--rest-r));
      }
      100%{
        opacity:0;
        transform:
          translate(var(--out-x), var(--out-y))
          rotate(calc(var(--rest-r) + var(--out-r)))
          scale(.92);
      }
    }

    @keyframes clipOut{
      0%{
        opacity:1;
        transform:
          translate(-50%,0)
          translate(var(--clip-xf), var(--clip-yf))
          rotate(var(--clip-rf))
          scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(-50%,0)
          translate(var(--clip-ox), var(--clip-oy))
          rotate(calc(var(--clip-rf) + var(--clip-or)))
          scale(.92);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="wall"></div>
      <div id="cards"></div>
    </div>

    <div id="controls">
      <button class="fmt-btn" data-format="4:3">4:3</button>
      <button class="fmt-btn active" data-format="16:9">16:9</button>
      <button class="fmt-btn" data-format="16:10">16:10</button>
      <button class="fmt-btn" data-format="7:5">7:5</button>
    </div>
  </div>

  <script>
    (() => {
      const stageEl = document.getElementById("stage");
      const wallEl = document.getElementById("wall");
      const cardsEl = document.getElementById("cards");
      const controlsEl = document.getElementById("controls");

      const FORMATS = {
        "4:3":   { w:4,  h:3  },
        "16:9":  { w:16, h:9  },
        "16:10": { w:16, h:10 },
        "7:5":   { w:7,  h:5  }
      };

      const CLIP_PATHS = [
        "assets/klammer1_uhd.png",
        "assets/klammer2_uhd.png",
        "assets/klammer3_uhd.png"
      ];

      const MIN_VISIBLE = 2;
      const MAX_VISIBLE = 5;
      const FETCH_INTERVAL = 15000;

      let currentFormat = "16:9";
      let resources = [];
      let activeCards = [];
      let fetchTimer = null;
      let cycleTimer = null;
      let cycleIndex = 0;
      const slotMemory = new Map();

      function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
      function rand(min, max){ return min + Math.random() * (max - min); }
      function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
      function shuffle(arr){
        const a = [...arr];
        for(let i = a.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function toTime(v){
        const t = new Date(v).getTime();
        return Number.isFinite(t) ? t : 0;
      }

      function stageSize(){
        return { w: stageEl.clientWidth, h: stageEl.clientHeight };
      }

      function resizeStage(){
        const fmt = FORMATS[currentFormat];
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let w = vw;
        let h = w * fmt.h / fmt.w;

        if(h > vh){
          h = vh;
          w = h * fmt.w / fmt.h;
        }

        stageEl.style.width = `${Math.round(w)}px`;
        stageEl.style.height = `${Math.round(h)}px`;
      }

      function enterFullscreen(){
        const el = document.documentElement;
        if(!document.fullscreenElement && el.requestFullscreen){
          el.requestFullscreen().catch(() => {});
        }
      }

      function updateControlsVisibility(){
        if(document.fullscreenElement){
          controlsEl.classList.add("hidden");
        } else {
          controlsEl.classList.remove("hidden");
        }
      }

      document.addEventListener("fullscreenchange", updateControlsVisibility);

      document.querySelectorAll(".fmt-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".fmt-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentFormat = btn.dataset.format;
          resizeStage();
          relayoutAll();
          enterFullscreen();
        });
      });

      window.addEventListener("resize", () => {
        resizeStage();
        relayoutAll();
      });

      function ropeY(row, xNorm){
        const x = xNorm;

        if(row === 1){
          return 0.040 + 0.31 * Math.pow(x - 0.5, 2);
        }
        if(row === 2){
          return 0.382 + 0.37 * Math.pow(x - 0.5, 2);
        }
        return 0.723 + 0.39 * Math.pow(x - 0.5, 2);
      }

      function buildSlots(){
        // enger an den realen Seilverlauf angepasst
        const base = [
          { row:1, x:0.11 }, { row:1, x:0.28 }, { row:1, x:0.46 }, { row:1, x:0.64 }, { row:1, x:0.84 },
          { row:2, x:0.12 }, { row:2, x:0.31 }, { row:2, x:0.50 }, { row:2, x:0.69 }, { row:2, x:0.86 },
          { row:3, x:0.14 }, { row:3, x:0.33 }, { row:3, x:0.52 }, { row:3, x:0.72 }, { row:3, x:0.87 }
        ];

        return base.map((s, i) => {
          const id = `slot_${s.row}_${i}`;
          const mem = slotMemory.get(id) || { lastUsed:-999, hits:0 };
          return {
            ...s,
            id,
            y: ropeY(s.row, s.x),
            lastUsed: mem.lastUsed,
            hits: mem.hits
          };
        });
      }

      function getOrientation(res){
        const ar = res.width / res.height;
        if(ar > 1.18) return "landscape";
        if(ar < 0.86) return "portrait";
        return "square";
      }

      function getTaskMeta(taskId, fallbackTitle){
        const t = (APP_CONFIG.tasks || []).find(x => x.id === taskId);
        return {
          title: t?.title || fallbackTitle || "Fotochallenge",
          color: t?.color || "#dbe8f4"
        };
      }

      function normalizeResource(r){
        const custom = r.context?.custom || {};
        const meta = getTaskMeta(custom.task_id, custom.task_title);

        return {
          assetId: r.asset_id,
          publicId: r.public_id,
          width: Number(r.width) || 1000,
          height: Number(r.height) || 1000,
          createdAt: custom.created_at || r.created_at,
          createdNum: toTime(custom.created_at || r.created_at),
          secureUrl: `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/${r.public_id}.${r.format || "jpg"}`,
          taskId: custom.task_id || "sammelordner",
          title: meta.title,
          color: meta.color,
          orientation: getOrientation(r),
          usedCount: 0,
          recentBoost: false
        };
      }

      async function fetchResources(){
        try{
          const url = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/${APP_CONFIG.eventTag}.json?_=${Date.now()}`;
          const res = await fetch(url, { cache:"no-store" });
          if(!res.ok) return;

          const data = await res.json();
          const incoming = (data.resources || [])
            .filter(r => r.type === "upload")
            .map(normalizeResource)
            .sort((a,b) => b.createdNum - a.createdNum);

          const newestIds = new Set(incoming.slice(0, 6).map(x => x.assetId));
          incoming.forEach(x => x.recentBoost = newestIds.has(x.assetId));

          incoming.forEach(x => {
            const old = resources.find(r => r.assetId === x.assetId);
            if(old) x.usedCount = old.usedCount || 0;
          });

          resources = incoming;
        } catch(err){
          console.error("Cloudinary list fetch failed:", err);
        }
      }

      function estimateTitleWidth(title, fontSize){
        const chars = title.length;
        return chars * fontSize * 0.56;
      }

      function getCaptionFont(baseW, title){
        let fs = clamp(baseW * 0.067, 16, 24);
        if(title.length > 26) fs *= 0.94;
        if(title.length > 36) fs *= 0.88;
        if(title.length > 48) fs *= 0.82;
        if(title.length > 60) fs *= 0.77;
        return Math.round(fs);
      }

      function getCardMetrics(resource){
        const { w: stageW, h: stageH } = stageSize();
        const o = resource.orientation;
        const ar = resource.width / resource.height;

        const outerBorder = Math.round(stageW * 0.0024);
        const innerPadX = Math.round(stageW * 0.0054);
        const innerPadTop = Math.round(stageH * 0.0065);

        let photoW, photoH, minCardW;

        if(o === "landscape"){
          photoW = stageW * 0.225;
          photoH = photoW / ar;
          minCardW = stageW * 0.18;
        } else if(o === "portrait"){
          photoH = stageH * 0.285;
          photoW = photoH * ar;
          minCardW = stageW * 0.155;
        } else {
          photoW = stageW * 0.198;
          photoH = photoW;
          minCardW = stageW * 0.17;
        }

        const baseW = Math.max(photoW + innerPadX * 2, minCardW);
        let captionFont = getCaptionFont(baseW, resource.title);

        let estimatedNeededW =
          estimateTitleWidth(resource.title, captionFont) / 2 + stageW * 0.028;

        estimatedNeededW = clamp(
          estimatedNeededW,
          minCardW,
          o === "portrait" ? stageW * 0.215 : stageW * 0.29
        );

        const cardW = Math.round(Math.max(baseW, estimatedNeededW));

        captionFont = getCaptionFont(cardW, resource.title);
        const captionPadY = Math.round(captionFont * 0.30);
        const captionH = Math.round(captionFont * 2.22 + captionPadY * 2);

        const cardH = Math.round(
          outerBorder * 2 +
          innerPadTop +
          photoH +
          captionH
        );

        const clipH = Math.round(stageH * 0.138);

        return {
          photoW: Math.round(photoW),
          photoH: Math.round(photoH),
          cardW,
          cardH,
          outerBorder,
          innerPadX,
          innerPadTop,
          captionH,
          captionFont,
          clipH
        };
      }

      function slotCompatible(slot, orientation){
        if(orientation === "portrait" && slot.row === 3) return false;
        return true;
      }

      function scoreSlot(slot, orientation, metrics){
        let score = (cycleIndex - slot.lastUsed) * 10;
        score -= slot.hits * 18;
        score += rand(0, 4);

        if(orientation === "portrait"){
          if(slot.row === 1) score += 14;
          if(slot.row === 2) score += 8;
          if(slot.row === 3) score -= 200;
        } else if(orientation === "landscape"){
          if(slot.row === 2) score += 12;
          if(slot.row === 1) score += 7;
          if(slot.row === 3) score += 4;
        } else {
          if(slot.row === 2) score += 9;
          if(slot.row === 1) score += 7;
          if(slot.row === 3) score += 4;
        }

        if(metrics.cardW > stageEl.clientWidth * 0.22 && slot.x > 0.78) score -= 7;
        if(metrics.cardW > stageEl.clientWidth * 0.22 && slot.x < 0.22) score -= 7;

        return score;
      }

      function getTopLeftFromSlot(slot, metrics){
        const { w, h } = stageSize();
        const ropeX = slot.x * w;
        const ropeYpx = slot.y * h;

        const clipOverlapIntoCard = metrics.clipH * 0.11;
        const cardTop = ropeYpx - clipOverlapIntoCard;

        return {
          x: ropeX - metrics.cardW / 2,
          y: cardTop
        };
      }

      function getBBox(x, y, w, h, angleDeg){
        const a = Math.abs(angleDeg) * Math.PI / 180;
        const bw = Math.abs(Math.cos(a) * w) + Math.abs(Math.sin(a) * h);
        const bh = Math.abs(Math.sin(a) * w) + Math.abs(Math.cos(a) * h);

        return {
          left: x - (bw - w) / 2,
          top: y - (bh - h) / 2,
          right: x + w + (bw - w) / 2,
          bottom: y + h + (bh - h) / 2
        };
      }

      function overlaps(a, b, pad = 18){
        return !(
          a.right < b.left + pad ||
          a.left > b.right - pad ||
          a.bottom < b.top + pad ||
          a.top > b.bottom - pad
        );
      }

      function choosePlacement(resource, previewPlacements = []){
        const { w: stageW, h: stageH } = stageSize();
        const metrics = getCardMetrics(resource);

        const slots = buildSlots()
          .filter(s => slotCompatible(s, resource.orientation))
          .filter(s => !activeCards.some(c => c.slotId === s.id))
          .filter(s => !previewPlacements.some(p => p.slotId === s.id))
          .sort((a,b) => scoreSlot(b, resource.orientation, metrics) - scoreSlot(a, resource.orientation, metrics));

        const anglePool =
          resource.orientation === "portrait"
            ? [-8,-7,-6,-5,-4,4,5,6,7,8]
            : resource.orientation === "square"
              ? [-8,-7,-6,-5,5,6,7,8]
              : [-7,-6,-5,-4,4,5,6,7];

        let best = null;

        for(const slot of slots){
          const angles = shuffle(anglePool);

          for(const angle of angles){
            const pos = getTopLeftFromSlot(slot, metrics);
            const box = getBBox(pos.x, pos.y, metrics.cardW, metrics.cardH, angle);

            if(box.left < 8 || box.right > stageW - 8) continue;
            if(box.top < 6) continue;
            if(box.bottom > stageH - 8) continue;

            let collisionCount = 0;
            activeCards.forEach(c => { if(overlaps(box, c.bbox, 28)) collisionCount++; });
            previewPlacements.forEach(p => { if(overlaps(box, p.bbox, 28)) collisionCount++; });

            if(collisionCount === 0){
              return {
                slotId: slot.id,
                row: slot.row,
                xNorm: slot.x,
                yNorm: slot.y,
                x: pos.x,
                y: pos.y,
                angle,
                metrics,
                bbox: box
              };
            }

            if(!best || collisionCount < best.collisionCount){
              best = {
                slotId: slot.id,
                row: slot.row,
                xNorm: slot.x,
                yNorm: slot.y,
                x: pos.x,
                y: pos.y,
                angle,
                metrics,
                bbox: box,
                collisionCount
              };
            }
          }
        }

        return best && best.collisionCount <= 1 ? best : null;
      }

      function createCard(resource, placement){
        const wrap = document.createElement("div");
        wrap.className = "polaroid entering";
        wrap.style.left = `${placement.x}px`;
        wrap.style.top = `${placement.y}px`;
        wrap.style.width = `${placement.metrics.cardW}px`;
        wrap.style.height = `${placement.metrics.cardH}px`;
        wrap.style.setProperty("--rest-r", `${placement.angle}deg`);

        const card = document.createElement("div");
        card.className = "card";
        card.style.background = "#fff";
        card.style.border = `${placement.metrics.outerBorder}px solid rgba(255,255,255,.98)`;

        const inner = document.createElement("div");
        inner.className = "inner";
        inner.style.background = resource.color;
        inner.style.padding = `${placement.metrics.innerPadTop}px ${placement.metrics.innerPadX}px 0`;

        const photoWrap = document.createElement("div");
        photoWrap.className = "photo-wrap";
        photoWrap.style.height = `${placement.metrics.photoH}px`;
        photoWrap.style.marginBottom = `0px`;

        const img = document.createElement("img");
        img.src = resource.secureUrl;
        img.alt = resource.title;
        img.style.width = `${placement.metrics.photoW}px`;
        img.style.height = `${placement.metrics.photoH}px`;

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.style.background = resource.color;
        caption.style.minHeight = `${placement.metrics.captionH}px`;
        caption.style.maxHeight = `${placement.metrics.captionH}px`;
        caption.style.fontSize = `${placement.metrics.captionFont}px`;

        const captionText = document.createElement("div");
        captionText.className = "caption-text";
        captionText.textContent = resource.title;

        photoWrap.appendChild(img);
        caption.appendChild(captionText);
        inner.appendChild(photoWrap);
        inner.appendChild(caption);
        card.appendChild(inner);

        const clip = document.createElement("img");
        clip.className = "clip";
        clip.src = pick(CLIP_PATHS);
        clip.alt = "";
        clip.style.height = `${placement.metrics.clipH}px`;
        clip.style.maxHeight = `${placement.metrics.clipH}px`;

        const clipX = rand(-placement.metrics.cardW * 0.07, placement.metrics.cardW * 0.07);
        const clipY = -placement.metrics.clipH * 0.83;
        clip.style.setProperty("--clip-xf", `${clipX}px`);
        clip.style.setProperty("--clip-yf", `${clipY}px`);
        clip.style.setProperty("--clip-rf", `${rand(-7,7)}deg`);
        clip.style.transform = `translate(-50%,0) translate(${clipX}px, ${clipY}px) rotate(${rand(-7,7)}deg)`;

        wrap.appendChild(card);
        wrap.appendChild(clip);

        return { wrap, card, clip };
      }

      function setEnterAnimation(dom, finalAngle, delayMs){
        dom.wrap.style.setProperty("--in-x0", `${rand(-8, 8)}px`);
        dom.wrap.style.setProperty("--in-y0", `${rand(26, 42)}px`);
        dom.wrap.style.setProperty("--in-r0", `${finalAngle + rand(-16,16)}deg`);
        dom.wrap.style.setProperty("--in-x1", `${rand(-5, 5)}px`);
        dom.wrap.style.setProperty("--in-y1", `${rand(-3, 4)}px`);
        dom.wrap.style.setProperty("--in-r1", `${finalAngle - rand(4,7)}deg`);
        dom.wrap.style.setProperty("--in-x2", `${rand(-3, 3)}px`);
        dom.wrap.style.setProperty("--in-y2", `${rand(-2, 2)}px`);
        dom.wrap.style.setProperty("--in-r2", `${finalAngle + rand(1,3)}deg`);

        // kein Sprung mehr nach oben kurz vor Schluss
        dom.clip.style.setProperty("--clip-x0", `${rand(-4,4)}px`);
        dom.clip.style.setProperty("--clip-y0", `${rand(-6,2)}px`);
        dom.clip.style.setProperty("--clip-r0", `${rand(-12,12)}deg`);
        dom.clip.style.setProperty("--clip-x1", `${rand(-2,2)}px`);
        dom.clip.style.setProperty("--clip-y1", `${rand(-2,2)}px`);
        dom.clip.style.setProperty("--clip-r1", `${rand(-6,6)}deg`);

        dom.wrap.style.animation = `cardIn 2.45s cubic-bezier(.18,.82,.18,1) ${delayMs}ms forwards`;
        dom.clip.style.animation = `clipIn 2s cubic-bezier(.18,.82,.18,1) ${delayMs}ms forwards`;
      }

      function setLeaveAnimation(state){
        state.dom.wrap.style.setProperty("--out-x", `${rand(-35,35)}px`);
        state.dom.wrap.style.setProperty("--out-y", `${rand(58,96)}px`);
        state.dom.wrap.style.setProperty("--out-r", `${rand(-10,10)}deg`);

        state.dom.clip.style.setProperty("--clip-ox", `${rand(-16,16)}px`);
        state.dom.clip.style.setProperty("--clip-oy", `${rand(-22,-8)}px`);
        state.dom.clip.style.setProperty("--clip-or", `${rand(-16,16)}deg`);

        state.dom.wrap.style.animation = `cardOut 1.2s ease-in forwards`;
        state.dom.clip.style.animation = `clipOut .8s ease-in forwards`;
      }

      function addCard(resource, placement, delayMs){
        const dom = createCard(resource, placement);
        cardsEl.appendChild(dom.wrap);

        setEnterAnimation(dom, placement.angle, delayMs);

        const state = {
          id: resource.assetId,
          resource,
          slotId: placement.slotId,
          row: placement.row,
          angle: placement.angle,
          x: placement.x,
          y: placement.y,
          bbox: placement.bbox,
          dom,
          bornAt: Date.now(),
          bornCycle: cycleIndex
        };

        activeCards.push(state);

        slotMemory.set(placement.slotId, {
          lastUsed: cycleIndex,
          hits: clamp((slotMemory.get(placement.slotId)?.hits || 0) + 1, 0, 5)
        });

        resources = resources.map(r => r.assetId === resource.assetId
          ? { ...r, usedCount:(r.usedCount || 0) + 1 }
          : r
        );

        setTimeout(() => {
          dom.wrap.classList.remove("entering");
        }, delayMs + 2600);
      }

      function removeCards(cardsToRemove){
        return new Promise(resolve => {
          if(!cardsToRemove.length){
            resolve();
            return;
          }

          cardsToRemove.forEach(setLeaveAnimation);

          setTimeout(() => {
            cardsToRemove.forEach(c => {
              c.dom.wrap.remove();
              activeCards = activeCards.filter(x => x.id !== c.id);
            });
            resolve();
          }, 1300);
        });
      }

      function availableResources(){
        const activeIds = new Set(activeCards.map(c => c.id));
        const pool = resources.filter(r => !activeIds.has(r.assetId));
        return pool.length ? pool : resources;
      }

      function chooseResources(n){
        const pool = availableResources();
        if(!pool.length) return [];

        return pool
          .map(r => {
            let score = rand(0, 4);
            if(r.recentBoost) score += 18;
            score += Math.max(0, 8 - (r.usedCount || 0) * 2);
            score += (Date.now() - r.createdNum < 180000) ? 8 : 0;
            return { r, score };
          })
          .sort((a,b) => b.score - a.score)
          .slice(0, n)
          .map(x => x.r);
      }

      function chooseRemoveCount(currentCount){
        const possible = [1,2,3].filter(n => currentCount - n >= MIN_VISIBLE);
        if(!possible.length) return 0;
        return pick(possible.flatMap(n => n === 2 ? [2,2,2] : n === 3 ? [3,3] : [1]));
      }

      function chooseAddCount(afterRemove){
        const possible = [1,2,3].filter(n => afterRemove + n <= MAX_VISIBLE);
        if(!possible.length) return 0;
        return pick(possible.flatMap(n => n === 2 ? [2,2,2] : n === 3 ? [3,3] : [1]));
      }

      function chooseRemovalCards(n){
        return [...activeCards]
          .sort((a,b) => a.bornAt - b.bornAt || a.bornCycle - b.bornCycle)
          .slice(0, n);
      }

      function decaySlotMemory(){
        for(const [k,v] of slotMemory.entries()){
          slotMemory.set(k, {
            lastUsed: v.lastUsed,
            hits: Math.max(0, (v.hits || 0) - 1)
          });
        }
      }

      function relayoutAll(){
        const old = [...activeCards];
        cardsEl.innerHTML = "";
        activeCards = [];

        const preview = [];
        old.forEach((c, i) => {
          const placement = choosePlacement(c.resource, preview);
          if(!placement) return;
          preview.push(placement);
          addCard(c.resource, placement, i * 160);
        });
      }

      async function initialFill(){
        if(!resources.length) return;

        const wanted = clamp(Math.min(4, resources.length), MIN_VISIBLE, MAX_VISIBLE);
        const chosen = chooseResources(wanted);
        const preview = [];

        chosen.forEach((res, i) => {
          const placement = choosePlacement(res, preview);
          if(!placement) return;
          preview.push(placement);
          addCard(res, placement, i * 500);
        });

        scheduleNext(9000);
      }

      function scheduleNext(ms){
        clearTimeout(cycleTimer);
        cycleTimer = setTimeout(runCycle, ms);
      }

      async function runCycle(){
        cycleIndex++;
        decaySlotMemory();

        if(!resources.length){
          scheduleNext(5000);
          return;
        }

        if(activeCards.length < MIN_VISIBLE){
          const need = MIN_VISIBLE - activeCards.length;
          const preview = [];
          chooseResources(need).forEach((res, i) => {
            const placement = choosePlacement(res, preview);
            if(!placement) return;
            preview.push(placement);
            addCard(res, placement, i * 500);
          });
          scheduleNext(7000);
          return;
        }

        const removeCount = chooseRemoveCount(activeCards.length);
        const toRemove = chooseRemovalCards(removeCount);
        const afterRemove = activeCards.length - toRemove.length;
        const addCount = chooseAddCount(afterRemove);

        const chosen = chooseResources(addCount);
        const preview = [];
        const planned = [];

        chosen.forEach(res => {
          const placement = choosePlacement(res, preview);
          if(!placement) return;
          preview.push(placement);
          planned.push({ res, placement });
        });

        await removeCards(toRemove);
        await new Promise(r => setTimeout(r, 700));

        planned.forEach((p, i) => addCard(p.res, p.placement, i * 500));

        const delay =
          planned.length >= 3 ? 15000 :
          planned.length === 2 ? 10000 :
          5000;

        scheduleNext(delay + rand(300, 1200));
      }

      function startFetchLoop(){
        clearInterval(fetchTimer);
        fetchTimer = setInterval(fetchResources, FETCH_INTERVAL);
      }

      async function init(){
        resizeStage();
        await fetchResources();
        await initialFill();
        startFetchLoop();
        updateControlsVisibility();
      }

      init();
    })();
  </script>
