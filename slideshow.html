<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Fotochallenge</title>

<script src="config.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:#222;
font-family:Arial;
}

#stage{
position:relative;
width:100vw;
height:100vh;
}

.polaroid{
position:absolute;
width:280px;
background:white;
padding:15px 15px 70px 15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
animation:drop 0.8s ease;
}

.photo{
width:100%;
height:260px;
object-fit:cover;
}

.caption{
position:absolute;
bottom:0;
left:0;
right:0;
padding:15px;
font-weight:bold;
text-align:center;
}

.tape{
position:absolute;
top:-12px;
left:50%;
width:90px;
height:24px;
background:#d9c9a3;
transform:translateX(-50%) rotate(-5deg);
opacity:0.9;
}

@keyframes drop{
0%{
transform:translateY(-300px) rotate(-10deg);
opacity:0;
}
100%{
opacity:1;
}
}

</style>

</head>

<body>

<div id="stage"></div>

<script>

const shown = new Set()

function loadImages(){

fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`)

.then(r=>r.json())

.then(data=>{

data.resources.forEach(asset=>{

if(shown.has(asset.public_id)) return

shown.add(asset.public_id)

addImage(asset)

})

})

}

function addImage(asset){

const stage = document.getElementById("stage")

const card = document.createElement("div")
card.className = "polaroid"

const left = Math.random()*70 + 10
const top = Math.random()*60 + 10
const angle = Math.random()*20 - 10

card.style.left = left+"%"
card.style.top = top+"%"
card.style.transform = `rotate(${angle}deg)`

const tape = document.createElement("div")
tape.className = "tape"

const img = document.createElement("img")
img.className = "photo"
img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_fill,w_800,h_800/${asset.public_id}`

const caption = document.createElement("div")
caption.className = "caption"

let text = "Fotochallenge"

if(asset.context && asset.context.custom && asset.context.custom.caption){
text = asset.context.custom.caption
}

caption.innerText = text

card.appendChild(tape)
card.appendChild(img)
card.appendChild(caption)

stage.appendChild(card)

}

loadImages()

setInterval(loadImages,5000)

</script>

</body>
</html>
