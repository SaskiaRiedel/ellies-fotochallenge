<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    :root {
      --wall-bg: #f5efe7;
      --shadow: 0 10px 28px rgba(0, 0, 0, 0.24);
      --frame-bg: #ffffff;
      --caption-text: #111;
      --caption-height: 54px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--wall-bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: var(--wall-bg);
      background-image: url("assets/fotowand_bg.png");
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
    }

    .controls {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    .control-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.55);
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      color: #f8f8f8;
    }

    .empty-note {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(0,0,0,0.45);
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      text-align: center;
      padding: 24px;
      z-index: 20;
      pointer-events: none;
    }

    .photo-card {
      position: absolute;
      z-index: 30;
      pointer-events: none;
    }

    .photo-frame {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--frame-bg);
      border-radius: 2px;
      box-shadow: var(--shadow);
      overflow: visible;
      transform-origin: top center;
      padding: 10px 10px calc(var(--caption-height) + 10px) 10px;
    }

    .media {
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .media img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    .caption {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      height: var(--caption-height);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 10px;
      font-size: 0.92rem;
      line-height: 1.14;
      font-weight: 700;
      color: var(--caption-text);
      overflow: hidden;
    }

    .clip {
      position: absolute;
      top: -24px;
      width: 26px;
      height: auto;
      z-index: 3;
      transform-origin: center top;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.18));
    }

    .photo-card.attaching .photo-frame {
      animation: attachPhoto 1.45s ease forwards;
    }

    .photo-card.attaching .clip {
      animation: attachClip 1.2s ease forwards;
    }

    .photo-card.detaching .photo-frame {
      animation: detachPhoto 1.35s ease forwards;
    }

    .photo-card.detaching .clip {
      animation: detachClip 1s ease forwards;
    }

    @keyframes attachPhoto {
      0% {
        opacity: 0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(0.94);
      }
      100% {
        opacity: 1;
        transform: rotate(var(--photo-rot)) scale(1);
      }
    }

    @keyframes attachClip {
      0% {
        opacity: 0;
        transform:
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(0.9);
      }
      100% {
        opacity: 1;
        transform: rotate(var(--clip-rot)) scale(1);
      }
    }

    @keyframes detachPhoto {
      0% {
        opacity: 1;
        transform: rotate(var(--photo-rot)) scale(1);
      }
      100% {
        opacity: 0;
        transform:
          translate(var(--photo-end-x), 180px)
          rotate(calc(var(--photo-rot) + var(--photo-end-rot)))
          scale(0.94);
      }
    }

    @keyframes detachClip {
      0% {
        opacity: 1;
        transform: rotate(var(--clip-rot)) scale(1);
      }
      100% {
        opacity: 0;
        transform:
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rot) + var(--clip-end-rot)))
          scale(0.92);
      }
    }

    @media (max-width: 1400px) {
      .caption {
        font-size: 0.86rem;
      }
    }

    @media (max-width: 1100px) {
      .caption {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="controls">
      <button id="fullscreenBtn" class="control-btn" type="button">Vollbild</button>
    </div>

    <div class="empty-note" id="emptyNote">
      Noch keine Bilder in der Fotowand gefunden.
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const emptyNote = document.getElementById("emptyNote");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    const CLIP_IMAGES = [
      "assets/klammer1.png",
      "assets/klammer2.png",
      "assets/klammer3.png"
    ];

    const allAssets = [];
    const assetIds = new Set();
    const currentCards = [];
    const recentlyShown = [];
    const MAX_RECENT_TRACK = 30;

    // 9 feste, an die Hintergrund-Fäden angepasste Slots.
    // Keine Überlappung, saubere Ausrichtung am oberen Fotorand.
    const slots = [
      { id: "A", left: 4.5,  top: 10.3, width: 21.0, height: 18.0, type: "landscape" },
      { id: "B", left: 29.0, top: 8.2,  width: 13.8, height: 24.8, type: "portrait" },
      { id: "C", left: 55.0, top: 10.0, width: 19.8, height: 17.0, type: "landscape" },

      { id: "D", left: 6.0,  top: 38.8, width: 19.5, height: 16.2, type: "landscape" },
      { id: "E", left: 33.0, top: 34.8, width: 15.8, height: 22.4, type: "square" },
      { id: "F", left: 60.0, top: 33.8, width: 14.0, height: 25.0, type: "portrait" },

      { id: "G", left: 5.0,  top: 69.6, width: 19.5, height: 16.4, type: "landscape" },
      { id: "H", left: 34.5, top: 64.0, width: 14.0, height: 25.2, type: "portrait" },
      { id: "I", left: 58.0, top: 70.0, width: 19.8, height: 16.2, type: "landscape" }
    ];

    const initialPatterns = {
      3: [
        ["A", "E", "I"],
        ["B", "D", "I"],
        ["A", "F", "G"]
      ],
      4: [
        ["A", "C", "E", "H"],
        ["B", "D", "F", "I"],
        ["A", "E", "G", "I"]
      ],
      5: [
        ["A", "C", "E", "G", "I"],
        ["B", "D", "E", "F", "I"],
        ["A", "B", "E", "F", "G"]
      ],
      6: [
        ["A", "B", "C", "D", "E", "I"],
        ["A", "C", "D", "E", "F", "G"],
        ["B", "C", "D", "E", "H", "I"]
      ]
    };

    function requestFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    fullscreenBtn.addEventListener("click", requestFullscreen);

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function classifyAsset(asset) {
      const w = Number(asset.width || 0);
      const h = Number(asset.height || 0);
      if (!w || !h) return "square";
      const ratio = w / h;
      if (ratio > 1.18) return "landscape";
      if (ratio < 0.84) return "portrait";
      return "square";
    }

    function sortByUploadOrder(list) {
      return list.sort((a, b) => Number(a.version || 0) - Number(b.version || 0));
    }

    function getTaskStyle(asset) {
      const taskId = asset?.context?.custom?.task_id || "";
      const task = APP_CONFIG.tasks.find(t => t.id === taskId);

      return {
        caption: asset?.context?.custom?.caption || "Fotochallenge",
        color: task?.color || "#f3f3f3"
      };
    }

    function rememberShown(publicId) {
      recentlyShown.push(publicId);
      while (recentlyShown.length > MAX_RECENT_TRACK) {
        recentlyShown.shift();
      }
    }

    function getSlotById(id) {
      return slots.find(s => s.id === id);
    }

    function availableSlots() {
      const usedIds = new Set(currentCards.map(c => c.slot.id));
      return slots.filter(s => !usedIds.has(s.id));
    }

    function chooseInitialSlots(count) {
      const patterns = initialPatterns[count] || initialPatterns[5];
      const ids = pick(patterns);
      return ids.map(getSlotById);
    }

    function fetchAssets() {
      return fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`)
        .then(response => {
          if (!response.ok) {
            throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
          }
          return response.json();
        })
        .then(data => {
          const resources = Array.isArray(data.resources) ? data.resources : [];

          const onlyImages = resources.filter(asset => {
            const format = (asset.format || "").toLowerCase();
            return ["jpg", "jpeg", "png", "webp", "heic"].includes(format);
          });

          sortByUploadOrder(onlyImages).forEach(asset => {
            if (!assetIds.has(asset.public_id)) {
              assetIds.add(asset.public_id);
              allAssets.push(asset);
            }
          });

          if (allAssets.length > 0) {
            emptyNote.style.display = "none";
          }
        })
        .catch(error => {
          console.error(error);
        });
    }

    function getRecentAssets(limit = 8) {
      return [...allAssets]
        .sort((a, b) => Number(b.version || 0) - Number(a.version || 0))
        .slice(0, limit);
    }

    function pickAssetForSlot(slot, extraExcluded = []) {
      const shownIds = new Set(currentCards.map(c => c.asset.public_id));
      const excluded = new Set([...shownIds, ...extraExcluded]);
      const slotType = slot.type;

      const recents = getRecentAssets(10).filter(a => !excluded.has(a.public_id));
      const recentTyped = recents.filter(a => classifyAsset(a) === slotType);

      if (recentTyped.length) return recentTyped[0];
      if (recents.length) return recents[0];

      const olderTyped = shuffle(
        allAssets.filter(a =>
          !excluded.has(a.public_id) &&
          !recentlyShown.includes(a.public_id) &&
          classifyAsset(a) === slotType
        )
      );
      if (olderTyped.length) return olderTyped[0];

      const olderAny = shuffle(
        allAssets.filter(a =>
          !excluded.has(a.public_id) &&
          !recentlyShown.includes(a.public_id)
        )
      );
      if (olderAny.length) return olderAny[0];

      const fallbackTyped = shuffle(
        allAssets.filter(a =>
          !excluded.has(a.public_id) &&
          classifyAsset(a) === slotType
        )
      );
      if (fallbackTyped.length) return fallbackTyped[0];

      const fallbackAny = shuffle(
        allAssets.filter(a => !excluded.has(a.public_id))
      );
      return fallbackAny[0] || null;
    }

    function createCard(asset, slot) {
      const style = getTaskStyle(asset);

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card attaching";
      wrapper.style.left = `${slot.left}%`;
      wrapper.style.top = `${slot.top}%`;
      wrapper.style.width = `${slot.width}%`;
      wrapper.style.height = `${slot.height}%`;

      const frame = document.createElement("div");
      frame.className = "photo-frame";

      const media = document.createElement("div");
      media.className = "media";

      const img = document.createElement("img");
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_1200,h_1200,q_auto,f_auto/${asset.public_id}`;
      img.alt = style.caption;

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.style.background = style.color;
      caption.textContent = style.caption;

      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = pick(CLIP_IMAGES);

      const photoRot = rand(-7, 7).toFixed(2) + "deg";
      const clipRot = rand(-9, 9).toFixed(2) + "deg";
      const clipLeft = rand(26, 72).toFixed(1) + "%";

      wrapper.style.setProperty("--photo-rot", photoRot);
      wrapper.style.setProperty("--clip-rot", clipRot);

      wrapper.style.setProperty("--photo-start-x", `${rand(-26, 26).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-start-y", `${rand(55, 95).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-start-rot", `${rand(-10, 10).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-start-x", `${rand(-20, 20).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-start-y", `${rand(-55, -28).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-start-rot", `${rand(-18, 18).toFixed(2)}deg`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-32, 32).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-18, 18).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-end-x", `${rand(-24, 24).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-y", `${rand(-24, -8).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-22, 22).toFixed(2)}deg`);

      clip.style.left = clipLeft;

      media.appendChild(img);
      frame.appendChild(media);
      frame.appendChild(caption);
      wrapper.appendChild(frame);
      wrapper.appendChild(clip);

      stage.appendChild(wrapper);

      const cardObj = {
        asset,
        slot,
        el: wrapper,
        mountedAt: Date.now()
      };

      wrapper.addEventListener("animationend", () => {
        wrapper.classList.remove("attaching");
      }, { once: true });

      currentCards.push(cardObj);
      rememberShown(asset.public_id);

      return cardObj;
    }

    function detachCard(cardObj) {
      return new Promise(resolve => {
        cardObj.el.classList.remove("attaching");
        cardObj.el.classList.add("detaching");

        setTimeout(() => {
          cardObj.el.remove();
          const idx = currentCards.indexOf(cardObj);
          if (idx >= 0) currentCards.splice(idx, 1);
          resolve(cardObj.slot);
        }, 1400);
      });
    }

    function oldestCards(count) {
      return [...currentCards]
        .sort((a, b) => a.mountedAt - b.mountedAt)
        .slice(0, count);
    }

    async function initialRender() {
      if (!allAssets.length) {
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const startCount = Math.min(5, Math.max(3, allAssets.length >= 5 ? 5 : allAssets.length));
      const startSlots = chooseInitialSlots(startCount);
      const used = [];

      for (const slot of startSlots) {
        const asset = pickAssetForSlot(slot, used);
        if (!asset) continue;
        used.push(asset.public_id);
        createCard(asset, slot);
      }
    }

    function chooseExchangePlan() {
      const currentCount = currentCards.length;

      const plans = [
        { remove: 1, add: 1 },
        { remove: 1, add: 2 },
        { remove: 2, add: 1 },
        { remove: 2, add: 2 },
        { remove: 2, add: 3 },
        { remove: 3, add: 2 },
        { remove: 3, add: 3 }
      ];

      const valid = plans.filter(plan => {
        const nextCount = currentCount - plan.remove + plan.add;
        return nextCount >= 3 && nextCount <= 6;
      });

      return pick(valid);
    }

    let nextTimer = null;

    function scheduleNextCycle(delayMs) {
      clearTimeout(nextTimer);
      nextTimer = setTimeout(runCycle, delayMs);
    }

    async function runCycle() {
      if (!allAssets.length || !currentCards.length) {
        scheduleNextCycle(5000);
        return;
      }

      const plan = chooseExchangePlan();
      const toRemove = oldestCards(plan.remove);

      const removedSlots = await Promise.all(toRemove.map(detachCard));

      // 2 Sekunden Pause nach dem Abnehmen
      await new Promise(resolve => setTimeout(resolve, 2000));

      const stillFree = availableSlots();
      const preferredSlots = [...removedSlots, ...stillFree.filter(s => !removedSlots.some(r => r.id === s.id))];

      const slotsForNewCards = preferredSlots.slice(0, plan.add);
      const usedNewIds = [];

      for (const slot of slotsForNewCards) {
        const asset = pickAssetForSlot(slot, usedNewIds);
        if (!asset) continue;
        usedNewIds.push(asset.public_id);
        createCard(asset, slot);
      }

      // Nächster Wechsel:
      // 1 Foto -> 4s
      // 2 Fotos -> 8s
      // 3 Fotos -> 12s
      const delay = plan.remove * 4000;
      scheduleNextCycle(delay);
    }

    async function boot() {
      await fetchAssets();
      await initialRender();

      // neue Uploads regelmäßig nachladen
      setInterval(fetchAssets, 10000);

      // erster Wechsel erst nach etwas Ruhe
      scheduleNextCycle(8000);
    }

    boot();
  </script>
</body>
</html>
