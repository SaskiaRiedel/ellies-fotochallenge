<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --wall-bg:#efe7dc;
      --shadow:0 16px 30px rgba(0,0,0,.18);
      --aspect-num:16;
      --aspect-den:9;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{ position:relative; }

    .viewport{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#111;
      overflow:hidden;
    }

    .stage-shell{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#111;
    }

    .stage{
      position:relative;
      width:min(100vw, calc(100vh * (var(--aspect-num) / var(--aspect-den))));
      height:min(100vh, calc(100vw * (var(--aspect-den) / var(--aspect-num))));
      overflow:hidden;
      background:var(--wall-bg);
      user-select:none;
    }

    .bg-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background-color:var(--wall-bg);
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
    }

    .empty-note{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:rgba(0,0,0,.45);
      font-size:clamp(1.1rem,2vw,1.6rem);
      text-align:center;
      padding:24px;
      z-index:10;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      right:12px;
      bottom:12px;
      z-index:300;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:8px;
      transition:opacity .25s ease;
    }

    .controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .control-btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      min-width:62px;
      background:rgba(255,255,255,.74);
      color:#333;
      cursor:pointer;
      font-size:.88rem;
      font-weight:700;
      box-shadow:0 4px 10px rgba(0,0,0,.12);
      backdrop-filter:blur(4px);
    }

    .control-btn.active{
      background:rgba(255,255,255,.96);
      color:#111;
    }

    .photo-card{
      position:absolute;
      z-index:30;
      pointer-events:none;
      will-change:transform, opacity;
    }

    .photo-frame{
      position:relative;
      width:100%;
      height:100%;
      background:#fff;
      box-shadow:var(--shadow);
      overflow:visible;
      transform-origin:var(--pin-x) 0px;
      will-change:transform, opacity;
    }

    .media-wrap{
      width:100%;
      overflow:hidden;
      background:#fff;
    }

    .media-img{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:#fff;
    }

    .caption{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#111;
      font-family:'Kalam', cursive;
      font-weight:700;
      line-height:1.02;
      overflow:hidden;
      padding:0 10px;
      word-break:break-word;
    }

    .clip{
      position:absolute;
      z-index:8;
      left:var(--clip-x);
      top:calc(var(--clip-h) * -0.80); /* nur ca. 1/5 unter dem Faden */
      height:var(--clip-h);
      width:auto;
      transform:translateX(-50%) rotate(var(--clip-rot));
      transform-origin:center top;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
      will-change:transform, opacity;
    }

    .photo-card.attaching .photo-frame{
      animation:attachPhoto var(--attach-duration,1s) cubic-bezier(.22,.7,.2,1) forwards;
    }

    .photo-card.attaching .clip{
      animation:attachClip var(--clip-attach-duration,1s) cubic-bezier(.22,.7,.2,1) forwards;
    }

    .photo-card.swinging .photo-frame{
      animation:swingToRest var(--swing-duration,2.5s) ease-out forwards;
    }

    .photo-card.detaching .photo-frame{
      animation:detachPhoto .95s ease forwards;
    }

    .photo-card.detaching .clip{
      animation:detachClip .78s ease forwards;
    }

    @keyframes attachPhoto{
      0%{
        opacity:0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(.985);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(calc(var(--rest-rot) + var(--swing-start)));
      }
    }

    @keyframes attachClip{
      0%{
        opacity:0;
        transform:
          translateX(-50%)
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(.98);
      }
      100%{
        opacity:1;
        transform:
          translateX(-50%)
          rotate(var(--clip-rot))
          scale(1);
      }
    }

    @keyframes swingToRest{
      0%{
        transform:translate(0,0) rotate(calc(var(--rest-rot) + var(--swing-start)));
      }
      18%{
        transform:translate(var(--swing-x1), var(--swing-y1)) rotate(calc(var(--rest-rot) - var(--swing-b)));
      }
      36%{
        transform:translate(var(--swing-x2), var(--swing-y2)) rotate(calc(var(--rest-rot) + var(--swing-c)));
      }
      56%{
        transform:translate(var(--swing-x3), var(--swing-y3)) rotate(calc(var(--rest-rot) - var(--swing-d)));
      }
      76%{
        transform:translate(var(--swing-x4), var(--swing-y4)) rotate(calc(var(--rest-rot) + var(--swing-e)));
      }
      90%{
        transform:translate(var(--swing-x5), var(--swing-y5)) rotate(calc(var(--rest-rot) - var(--swing-f)));
      }
      100%{
        transform:translate(0,0) rotate(var(--rest-rot));
      }
    }

    @keyframes detachPhoto{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--rest-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--photo-end-x), var(--photo-end-y))
          rotate(calc(var(--rest-rot) + var(--photo-end-rot)))
          scale(.985);
      }
    }

    @keyframes detachClip{
      0%{
        opacity:1;
        transform:translateX(-50%) rotate(var(--clip-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translateX(-50%)
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rot) + var(--clip-end-rot)))
          scale(.98);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell">
      <div class="stage" id="stage">
        <div id="bgLayer" class="bg-layer"></div>
        <div id="emptyNote" class="empty-note">Noch keine Bilder in der Fotowand gefunden.</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button id="btn43" class="control-btn" type="button">4:3</button>
    <button id="btn75" class="control-btn" type="button">7:5</button>
    <button id="btn169" class="control-btn active" type="button">16:9</button>
    <button id="btn1610" class="control-btn" type="button">16:10</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const bgLayer = document.getElementById("bgLayer");
    const emptyNote = document.getElementById("emptyNote");
    const controls = document.getElementById("controls");

    const btn43 = document.getElementById("btn43");
    const btn75 = document.getElementById("btn75");
    const btn169 = document.getElementById("btn169");
    const btn1610 = document.getElementById("btn1610");

    const REPO_BASE = "/ellies-fotochallenge/";
    const CACHE_BUSTER = "v=20260308f";

    function assetUrl(filename){
      return `${window.location.origin}${REPO_BASE}assets/${filename}?${CACHE_BUSTER}`;
    }

    const BG_IMAGE = assetUrl("bg_16_9.png");

    const CLIP_VARIANTS = [
      { src: assetUrl("klammer1_uhd.png"), scale: 1.00 },
      { src: assetUrl("klammer2_uhd.png"), scale: 1.00 },
      { src: assetUrl("klammer3_uhd.png"), scale: 0.50 } // halb so groß
    ];

    const aspectMap = {
      "4:3":   { num:4,  den:3  },
      "7:5":   { num:7,  den:5  },
      "16:9":  { num:16, den:9  },
      "16:10": { num:16, den:10 }
    };

    const state = {
      currentFormat: "16:9",
      allAssets: [],
      assetIds: new Set(),
      cards: new Map(),
      showCounts: new Map(),
      nextTimer: null,
      fetchTimer: null,
      recentPatternKeys: []
    };

    const TOP_ROPE = [
      { x: 4.8,  y: 5.1  },
      { x: 10.0, y: 6.4  },
      { x: 18.0, y: 8.8  },
      { x: 28.0, y: 10.9 },
      { x: 40.0, y: 12.0 },
      { x: 50.0, y: 12.2 },
      { x: 62.0, y: 11.8 },
      { x: 74.0, y: 10.5 },
      { x: 86.0, y: 7.8  },
      { x: 95.0, y: 4.6  }
    ];

    const MID_ROPE = [
      { x: 4.9,  y: 31.8 },
      { x: 10.0, y: 34.1 },
      { x: 18.0, y: 36.8 },
      { x: 30.0, y: 39.0 },
      { x: 42.0, y: 40.1 },
      { x: 54.0, y: 40.1 },
      { x: 66.0, y: 39.0 },
      { x: 78.0, y: 36.8 },
      { x: 88.0, y: 33.7 },
      { x: 95.0, y: 30.7 }
    ];

    function clamp(value, min, max){
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max){
      return Math.floor(rand(min, max + 1));
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function ropeY(curve, x){
      for(let i = 0; i < curve.length - 1; i++){
        const a = curve[i];
        const b = curve[i + 1];
        if(x >= a.x && x <= b.x){
          const t = (x - a.x) / (b.x - a.x);
          return a.y + (b.y - a.y) * t;
        }
      }
      return curve[curve.length - 1].y;
    }

    const SLOT_KEYS = {
      TL: { key:"TL", row:"top", x:18,  y:ropeY(TOP_ROPE,18) },
      TC: { key:"TC", row:"top", x:50,  y:ropeY(TOP_ROPE,50) },
      TR: { key:"TR", row:"top", x:82,  y:ropeY(TOP_ROPE,82) },
      ML: { key:"ML", row:"mid", x:18,  y:ropeY(MID_ROPE,18) },
      MC: { key:"MC", row:"mid", x:50,  y:ropeY(MID_ROPE,50) },
      MR: { key:"MR", row:"mid", x:82,  y:ropeY(MID_ROPE,82) }
    };

    // bewusst nur wenige, saubere Grundmuster
    const PATTERNS = [
      ["TL","TR"],
      ["TC","ML"],
      ["TC","MR"],
      ["TL","MC"],
      ["TR","MC"],
      ["ML","MR"],
      ["TL","MC","TR"],
      ["TC","ML","MR"],
      ["TL","MR","MC"],
      ["TR","ML","MC"]
    ];

    function slotOf(key){
      return SLOT_KEYS[key];
    }

    async function preloadImage(url){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    async function setFormat(format){
      state.currentFormat = format;
      const cfg = aspectMap[format];
      document.documentElement.style.setProperty("--aspect-num", String(cfg.num));
      document.documentElement.style.setProperty("--aspect-den", String(cfg.den));

      const ok = await preloadImage(BG_IMAGE);
      bgLayer.style.backgroundImage = ok ? `url("${BG_IMAGE}")` : "none";

      btn43.classList.toggle("active", format === "4:3");
      btn75.classList.toggle("active", format === "7:5");
      btn169.classList.toggle("active", format === "16:9");
      btn1610.classList.toggle("active", format === "16:10");
    }

    function requestFullscreen(){
      const el = document.documentElement;
      if(el.requestFullscreen) return el.requestFullscreen().catch(() => {});
      if(el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      if(el.msRequestFullscreen) return el.msRequestFullscreen();
      return Promise.resolve();
    }

    function updateControlsVisibility(){
      controls.classList.toggle("hidden", !!document.fullscreenElement);
    }

    document.addEventListener("fullscreenchange", updateControlsVisibility);

    async function onFormatClick(format){
      await setFormat(format);
      await requestFullscreen();
      updateControlsVisibility();
      rebuildWithCurrentCards();
    }

    btn43.addEventListener("click", () => onFormatClick("4:3"));
    btn75.addEventListener("click", () => onFormatClick("7:5"));
    btn169.addEventListener("click", () => onFormatClick("16:9"));
    btn1610.addEventListener("click", () => onFormatClick("16:10"));

    function sortByUploadOrder(list){
      return list.sort((a, b) => Number(a.version || 0) - Number(b.version || 0));
    }

    async function fetchAssets(){
      try{
        const response = await fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`);
        if(!response.ok){
          throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
        }

        const data = await response.json();
        const resources = Array.isArray(data.resources) ? data.resources : [];
        const onlyImages = resources.filter(asset => {
          const format = (asset.format || "").toLowerCase();
          return ["jpg","jpeg","png","webp","heic"].includes(format);
        });

        sortByUploadOrder(onlyImages).forEach(asset => {
          if(!state.assetIds.has(asset.public_id)){
            state.assetIds.add(asset.public_id);
            state.allAssets.push(asset);
          }
        });

        emptyNote.style.display = state.allAssets.length ? "none" : "grid";
      }catch(error){
        console.error(error);
      }
    }

    function getTaskMeta(asset){
      const taskId = asset?.context?.custom?.task_id || "";
      const task = Array.isArray(APP_CONFIG?.tasks)
        ? APP_CONFIG.tasks.find(t => t.id === taskId)
        : null;

      return {
        caption:
          asset?.context?.custom?.caption ||
          task?.subtitle ||
          task?.caption ||
          "Fotochallenge",
        color: task?.color || "#dce8f5"
      };
    }

    function getShownCount(id){
      return state.showCounts.get(id) || 0;
    }

    function markShown(id){
      state.showCounts.set(id, getShownCount(id) + 1);
    }

    function recentAssets(maxAgeSeconds = 300){
      const now = Date.now() / 1000;
      return state.allAssets.filter(a => Number(a.version || 0) >= now - maxAgeSeconds);
    }

    function getAssetPool(){
      const currentIds = new Set(Array.from(state.cards.values()).map(c => c.asset.public_id));
      const fresh = recentAssets(300)
        .filter(a => !currentIds.has(a.public_id))
        .sort((a,b) => Number(b.version || 0) - Number(a.version || 0));

      const others = state.allAssets
        .filter(a => !currentIds.has(a.public_id))
        .sort((a,b) => {
          const diff = getShownCount(a.public_id) - getShownCount(b.public_id);
          if(diff !== 0) return diff;
          return Number(a.version || 0) - Number(b.version || 0);
        });

      const result = [];
      const seen = new Set();

      for(const a of fresh.slice(0,2)){
        if(!seen.has(a.public_id)){
          seen.add(a.public_id);
          result.push(a);
        }
      }
      for(const a of others){
        if(!seen.has(a.public_id)){
          seen.add(a.public_id);
          result.push(a);
        }
      }
      return result;
    }

    function stageMetrics(){
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      const diag = Math.sqrt(w*w + h*h);
      return { w, h, diag };
    }

    function computeLayout(asset, photoCount){
      const metrics = stageMetrics();
      const ratio = Math.max(0.45, Math.min(2.8, Number(asset.width || 1) / Number(asset.height || 1)));
      const meta = getTaskMeta(asset);

      // Bilddiagonale = 35% der Bildschirmdiagonale
      let targetDiag = metrics.diag * 0.35;

      // kleine Korrektur für 3 Bilder, damit es noch sauber bleibt
      if(photoCount === 3) targetDiag *= 0.94;

      let mediaW, mediaH;
      if(ratio >= 1){
        mediaW = targetDiag / Math.sqrt(1 + (1 / (ratio * ratio)));
        mediaH = mediaW / ratio;
      }else{
        mediaH = targetDiag / Math.sqrt(1 + ratio * ratio);
        mediaW = mediaH * ratio;
      }

      // harte Grenzen gegen Übertreibung / Herauslaufen
      mediaW = clamp(mediaW, 250, metrics.w * 0.40);
      mediaH = clamp(mediaH, 220, metrics.h * 0.46);

      const outerPad = clamp(metrics.w * 0.006, 8, 14);
      const frameBorder = clamp(metrics.w * 0.0045, 5, 10);

      const frameW = mediaW + outerPad * 2;
      const captionH = clamp(mediaH * 0.20, 64, 104);
      const frameH = mediaH + outerPad * 2 + captionH;

      return {
        ratio,
        meta,
        mediaW,
        mediaH,
        frameW,
        frameH,
        outerPad,
        frameBorder,
        captionH
      };
    }

    function rectForPlacement(slotKey, layout, rotDeg){
      const slot = slotOf(slotKey);

      const stageW = stage.clientWidth;
      const stageH = stage.clientHeight;

      const anchorX = stageW * (slot.x / 100);
      const anchorY = stageH * (slot.y / 100);

      const clipXPercent = clamp(50 + rand(-7, 7), 44, 56);

      const left = anchorX - layout.frameW * (clipXPercent / 100);
      const top = anchorY;

      const pad = Math.abs(rotDeg) * 2.2 + 8;

      return {
        slotKey,
        clipXPercent,
        anchorX,
        anchorY,
        left,
        top,
        width: layout.frameW,
        height: layout.frameH,
        boxLeft: left - pad,
        boxTop: top - 4,
        boxRight: left + layout.frameW + pad,
        boxBottom: top + layout.frameH + pad
      };
    }

    function overlapRatio(a, b){
      const left = Math.max(a.boxLeft, b.boxLeft);
      const right = Math.min(a.boxRight, b.boxRight);
      const top = Math.max(a.boxTop, b.boxTop);
      const bottom = Math.min(a.boxBottom, b.boxBottom);

      if(right <= left || bottom <= top) return 0;

      const inter = (right - left) * (bottom - top);
      const areaA = (a.boxRight - a.boxLeft) * (a.boxBottom - a.boxTop);
      const areaB = (b.boxRight - b.boxLeft) * (b.boxBottom - b.boxTop);

      return inter / Math.min(areaA, areaB);
    }

    function insideStage(rect){
      return (
        rect.left >= 20 &&
        rect.top >= 18 &&
        rect.left + rect.width <= stage.clientWidth - 20 &&
        rect.top + rect.height <= stage.clientHeight - 18
      );
    }

    function fitCaption(el, maxPx, minPx = 16){
      let size = maxPx;
      el.style.fontSize = `${size}px`;
      el.style.maxHeight = "2.12em";

      while(size > minPx && el.scrollHeight > el.clientHeight + 1){
        size -= 1;
        el.style.fontSize = `${size}px`;
      }
    }

    function makePatternKey(pattern){
      return pattern.join("|");
    }

    function chooseNextPattern(){
      const current = Array.from(state.cards.keys());
      const currentSet = new Set(current);

      const candidates = PATTERNS.filter(pattern => {
        const overlap = pattern.filter(key => currentSet.has(key)).length;
        if(current.length === 0) return true;
        return overlap >= 1 && overlap <= 2;
      });

      const recent = new Set(state.recentPatternKeys.slice(-5));
      const filtered = candidates.filter(p => !recent.has(makePatternKey(p)));
      const pool = filtered.length ? filtered : candidates;

      const chosen = pick(shuffle(pool));
      state.recentPatternKeys.push(makePatternKey(chosen));
      if(state.recentPatternKeys.length > 20) state.recentPatternKeys.shift();

      return chosen;
    }

    function tryBuildAssetsForPattern(pattern){
      const keepCards = Array.from(state.cards.values()).filter(card => pattern.includes(card.slotKey));
      const assetsBySlot = {};

      for(const card of keepCards){
        assetsBySlot[card.slotKey] = card.asset;
      }

      const missing = pattern.filter(key => !assetsBySlot[key]);
      const pool = getAssetPool();

      for(const key of missing){
        let chosen = null;
        for(const asset of pool){
          const usedIds = new Set(Object.values(assetsBySlot).filter(Boolean).map(a => a.public_id));
          if(usedIds.has(asset.public_id)) continue;

          assetsBySlot[key] = asset;

          if(patternWouldFit(pattern, assetsBySlot)){
            chosen = asset;
            break;
          }
        }
        if(!chosen) return null;
      }

      return assetsBySlot;
    }

    function patternWouldFit(pattern, assetsBySlot){
      const rects = [];
      for(const slotKey of pattern){
        const asset = assetsBySlot[slotKey];
        if(!asset) return false;

        const layout = computeLayout(asset, pattern.length);
        const rot = 0;
        const rect = rectForPlacement(slotKey, layout, rot);

        if(!insideStage(rect)) return false;

        for(const other of rects){
          if(overlapRatio(rect, other) > 0.04) return false;
        }
        rects.push(rect);
      }
      return true;
    }

    function choosePatternAndAssets(){
      const tries = shuffle(PATTERNS.filter(p => p.length >= 2 && p.length <= 3));
      const currentSet = new Set(state.cards.keys());

      const sorted = tries.sort((a,b) => {
        const oa = a.filter(k => currentSet.has(k)).length;
        const ob = b.filter(k => currentSet.has(k)).length;
        return ob - oa;
      });

      for(const pattern of sorted){
        const overlap = pattern.filter(k => currentSet.has(k)).length;
        if(state.cards.size && (overlap < 1 || overlap > 2)) continue;

        const assetsBySlot = tryBuildAssetsForPattern(pattern);
        if(assetsBySlot){
          return { pattern, assetsBySlot };
        }
      }

      // Notfall
      const fallback = PATTERNS.find(p => p.length === 2) || PATTERNS[0];
      return {
        pattern: fallback,
        assetsBySlot: tryBuildAssetsForPattern(fallback)
      };
    }

    function createCard(asset, slotKey, totalCount, startDelay = 0){
      const layout = computeLayout(asset, totalCount);
      const restRot = rand(-7.5, 7.5);
      const rect = rectForPlacement(slotKey, layout, restRot);

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card";
      wrapper.style.left = `${rect.left}px`;
      wrapper.style.top = `${rect.top}px`;
      wrapper.style.width = `${layout.frameW}px`;
      wrapper.style.height = `${layout.frameH}px`;
      wrapper.style.opacity = "0";

      const frame = document.createElement("div");
      frame.className = "photo-frame";
      frame.style.setProperty("--pin-x", `${rect.clipXPercent}%`);
      frame.style.padding = `${layout.outerPad}px`;
      frame.style.border = `${layout.frameBorder}px solid #fff`;

      const mediaWrap = document.createElement("div");
      mediaWrap.className = "media-wrap";
      mediaWrap.style.height = `${layout.mediaH}px`;

      const mediaImg = document.createElement("img");
      mediaImg.className = "media-img";
      mediaImg.alt = layout.meta.caption;
      mediaImg.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_3200,h_3200,q_auto,f_auto/${asset.public_id}`;

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.style.height = `${layout.captionH}px`;
      caption.style.background = layout.meta.color;
      caption.textContent = layout.meta.caption;

      const clipDef = pick(CLIP_VARIANTS);
      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = clipDef.src;
      clip.alt = "";
      clip.style.setProperty("--clip-x", `${rect.clipXPercent}%`);

      const baseClipHeight = clamp(stage.clientWidth * 0.11, 120, 230);
      const clipHeight = baseClipHeight * clipDef.scale;
      clip.style.setProperty("--clip-h", `${clipHeight}px`);

      const clipRot = `${rand(-9, 9).toFixed(2)}deg`;
      const restRotCss = `${restRot.toFixed(2)}deg`;
      const swingStart = `${rand(2.0, 3.6).toFixed(2)}deg`;

      wrapper.style.setProperty("--rest-rot", restRotCss);
      wrapper.style.setProperty("--clip-rot", clipRot);
      wrapper.style.setProperty("--swing-start", swingStart);

      const photoFrom = pick(["left","right","bottomLeft","bottomRight"]);
      let photoStartX = 0, photoStartY = 0;

      if(photoFrom === "left"){ photoStartX = -34; photoStartY = 10; }
      if(photoFrom === "right"){ photoStartX = 34; photoStartY = 10; }
      if(photoFrom === "bottomLeft"){ photoStartX = -18; photoStartY = 28; }
      if(photoFrom === "bottomRight"){ photoStartX = 18; photoStartY = 28; }

      wrapper.style.setProperty("--photo-start-x", `${photoStartX}px`);
      wrapper.style.setProperty("--photo-start-y", `${photoStartY}px`);
      wrapper.style.setProperty("--photo-start-rot", `${(restRot + rand(-1.6, 1.6)).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-start-x", `${rand(-8,8).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-start-y", `${rand(-32,-18).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-start-rot", `${rand(-12,12).toFixed(2)}deg`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-18,18).toFixed(1)}px`);
      wrapper.style.setProperty("--photo-end-y", `${rand(16,26).toFixed(1)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-5,5).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-end-x", `${rand(-8,8).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-end-y", `${rand(-20,-8).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-10,10).toFixed(2)}deg`);

      wrapper.style.setProperty("--attach-duration", `${rand(0.95,1.05).toFixed(2)}s`);
      wrapper.style.setProperty("--clip-attach-duration", `${rand(0.90,1.00).toFixed(2)}s`);
      wrapper.style.setProperty("--swing-duration", `${rand(2.0,3.0).toFixed(2)}s`);

      wrapper.style.setProperty("--swing-b", `${rand(1.3,2.0).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-c", `${rand(0.8,1.3).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-d", `${rand(0.45,0.9).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-e", `${rand(0.20,0.45).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-f", `${rand(0.08,0.18).toFixed(2)}deg`);

      wrapper.style.setProperty("--swing-x1", `${rand(-1.2,1.2).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y1", `${rand(-0.9,0.9).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x2", `${rand(-0.8,0.8).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y2", `${rand(-0.6,0.6).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x3", `${rand(-0.45,0.45).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y3", `${rand(-0.30,0.30).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x4", `${rand(-0.25,0.25).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y4", `${rand(-0.16,0.16).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x5", `${rand(-0.10,0.10).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y5", `${rand(-0.06,0.06).toFixed(2)}px`);

      mediaWrap.appendChild(mediaImg);
      frame.appendChild(mediaWrap);
      frame.appendChild(caption);
      wrapper.appendChild(frame);
      wrapper.appendChild(clip);
      stage.appendChild(wrapper);

      requestAnimationFrame(() => {
        setTimeout(() => {
          wrapper.style.opacity = "1";
          wrapper.classList.add("attaching");
          fitCaption(caption, clamp(layout.captionH * 0.52, 22, 46), 16);
        }, startDelay);
      });

      wrapper.addEventListener("animationend", (ev) => {
        if(ev.animationName === "attachPhoto"){
          wrapper.classList.remove("attaching");
          wrapper.classList.add("swinging");
        }
      });

      const card = {
        asset,
        slotKey,
        el: wrapper,
        mountedAt: Date.now()
      };

      state.cards.set(slotKey, card);
      markShown(asset.public_id);
      return card;
    }

    function detachCard(card){
      return new Promise(resolve => {
        if(!card || !card.el){
          resolve();
          return;
        }

        card.el.classList.remove("attaching", "swinging");
        card.el.classList.add("detaching");

        setTimeout(() => {
          card.el.remove();
          state.cards.delete(card.slotKey);
          resolve();
        }, 980);
      });
    }

    async function initialRender(){
      if(!state.allAssets.length){
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const first = choosePatternAndAssets();
      if(!first || !first.assetsBySlot) return;

      first.pattern.forEach((slotKey, index) => {
        const asset = first.assetsBySlot[slotKey];
        if(asset){
          createCard(asset, slotKey, first.pattern.length, index * 420);
        }
      });
    }

    function nextDelayMs(){
      return randInt(8200, 9800);
    }

    async function runCycle(){
      if(!state.allAssets.length){
        scheduleNextCycle(6000);
        return;
      }

      const result = choosePatternAndAssets();
      if(!result || !result.assetsBySlot){
        scheduleNextCycle(7000);
        return;
      }

      const { pattern, assetsBySlot } = result;
      const nextSet = new Set(pattern);

      const toRemove = Array.from(state.cards.values())
        .filter(card => !nextSet.has(card.slotKey));

      for(const card of toRemove){
        await detachCard(card);
      }

      await new Promise(resolve => setTimeout(resolve, 260));

      const missing = pattern.filter(slotKey => !state.cards.has(slotKey));
      missing.forEach((slotKey, index) => {
        const asset = assetsBySlot[slotKey];
        if(asset){
          createCard(asset, slotKey, pattern.length, index * 420);
        }
      });

      scheduleNextCycle(nextDelayMs());
    }

    function scheduleNextCycle(delayMs){
      clearTimeout(state.nextTimer);
      state.nextTimer = setTimeout(runCycle, delayMs);
    }

    function rebuildWithCurrentCards(){
      const oldCards = Array.from(state.cards.values()).map(c => ({ slotKey:c.slotKey, asset:c.asset }));
      state.cards.forEach(card => card.el.remove());
      state.cards.clear();

      const kept = [];
      for(const item of oldCards){
        const layout = computeLayout(item.asset, oldCards.length || 2);
        const rect = rectForPlacement(item.slotKey, layout, 0);

        if(!insideStage(rect)) continue;

        let ok = true;
        for(const other of kept){
          if(overlapRatio(rect, other.rect) > 0.04){
            ok = false;
            break;
          }
        }

        if(ok){
          kept.push({ ...item, rect });
        }
      }

      kept.slice(0,3).forEach(item => createCard(item.asset, item.slotKey, kept.length || 2, 0));

      if(state.cards.size < 2){
        initialRender();
      }else{
        scheduleNextCycle(nextDelayMs());
      }
    }

    async function boot(){
      await setFormat("16:9");
      await fetchAssets();
      await initialRender();
      state.fetchTimer = setInterval(fetchAssets, 10000);
      scheduleNextCycle(nextDelayMs());
      updateControlsVisibility();
    }

    boot();
  </script>
</body>
</html>
