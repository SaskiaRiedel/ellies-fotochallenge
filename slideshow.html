<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --wall-bg:#efe8de;
      --shadow:0 14px 28px rgba(0,0,0,.18);
      --aspect-num:16;
      --aspect-den:9;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{ position:relative; }

    .viewport{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#111;
      overflow:hidden;
    }

    .stage-shell{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#111;
    }

    .stage{
      position:relative;
      width:min(100vw, calc(100vh * (var(--aspect-num) / var(--aspect-den))));
      height:min(100vh, calc(100vw * (var(--aspect-den) / var(--aspect-num))));
      overflow:hidden;
      background:var(--wall-bg);
      user-select:none;
    }

    .bg-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background-color:var(--wall-bg);
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
    }

    .empty-note{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:rgba(0,0,0,.45);
      font-size:clamp(1.1rem,2vw,1.6rem);
      text-align:center;
      padding:24px;
      z-index:10;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      right:12px;
      bottom:12px;
      z-index:300;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:8px;
      transition:opacity .25s ease;
    }

    .controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .control-btn{
      border:none;
      border-radius:999px;
      padding:8px 12px;
      min-width:62px;
      background:rgba(255,255,255,.72);
      color:#333;
      cursor:pointer;
      font-size:.88rem;
      font-weight:700;
      box-shadow:0 4px 10px rgba(0,0,0,.12);
      backdrop-filter:blur(4px);
    }

    .control-btn.active{
      background:rgba(255,255,255,.96);
      color:#111;
    }

    .photo-card{
      position:absolute;
      z-index:30;
      pointer-events:none;
      will-change:transform, opacity;
    }

    .photo-inner{
      position:relative;
      width:100%;
      height:100%;
      transform-origin:var(--pin-x) 0px;
      will-change:transform, opacity;
    }

    .photo-frame{
      width:100%;
      height:100%;
      background:#fff;
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .photo-media{
      position:relative;
      width:100%;
      flex:0 0 auto;
      overflow:hidden;
      background:#fff;
    }

    .photo-media img{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:#fff;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
    }

    .photo-caption{
      width:100%;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:6px 10px 8px;
      color:#111;
      font-family:'Kalam', cursive;
      font-weight:700;
      line-height:1.02;
      overflow:hidden;
      word-break:break-word;
    }

    .clip{
      position:absolute;
      z-index:8;
      left:var(--clip-x);
      top:calc(var(--clip-h) * -0.78);
      height:var(--clip-h);
      width:auto;
      transform:translateX(-50%) rotate(var(--clip-rot));
      transform-origin:center top;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.14));
      will-change:transform, opacity;
    }

    .photo-card.attaching .photo-inner{
      animation:attachPhoto var(--attach-duration,1.0s) cubic-bezier(.22,.7,.2,1) forwards;
    }

    .photo-card.attaching .clip{
      animation:attachClip var(--clip-attach-duration,1.0s) cubic-bezier(.22,.7,.2,1) forwards;
    }

    .photo-card.swinging .photo-inner{
      animation:swingToRest var(--swing-duration,2.5s) ease-out forwards;
    }

    .photo-card.detaching .photo-inner{
      animation:detachPhoto .95s ease forwards;
    }

    .photo-card.detaching .clip{
      animation:detachClip .8s ease forwards;
    }

    @keyframes attachPhoto{
      0%{
        opacity:0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(.985);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--rest-rot))
          scale(1);
      }
    }

    @keyframes attachClip{
      0%{
        opacity:0;
        transform:
          translateX(-50%)
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(.98);
      }
      100%{
        opacity:1;
        transform:
          translateX(-50%)
          rotate(var(--clip-rot))
          scale(1);
      }
    }

    @keyframes swingToRest{
      0%{
        transform:translate(0,0) rotate(calc(var(--rest-rot) + var(--swing-a)));
      }
      18%{
        transform:translate(var(--swing-x1), var(--swing-y1)) rotate(calc(var(--rest-rot) - var(--swing-b)));
      }
      36%{
        transform:translate(var(--swing-x2), var(--swing-y2)) rotate(calc(var(--rest-rot) + var(--swing-c)));
      }
      54%{
        transform:translate(var(--swing-x3), var(--swing-y3)) rotate(calc(var(--rest-rot) - var(--swing-d)));
      }
      72%{
        transform:translate(var(--swing-x4), var(--swing-y4)) rotate(calc(var(--rest-rot) + var(--swing-e)));
      }
      88%{
        transform:translate(var(--swing-x5), var(--swing-y5)) rotate(calc(var(--rest-rot) - var(--swing-f)));
      }
      100%{
        transform:translate(0,0) rotate(var(--rest-rot));
      }
    }

    @keyframes detachPhoto{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--rest-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--photo-end-x), var(--photo-end-y))
          rotate(calc(var(--rest-rot) + var(--photo-end-rot)))
          scale(.985);
      }
    }

    @keyframes detachClip{
      0%{
        opacity:1;
        transform:translateX(-50%) rotate(var(--clip-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translateX(-50%)
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rot) + var(--clip-end-rot)))
          scale(.98);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell">
      <div class="stage" id="stage">
        <div class="bg-layer" id="bgLayer"></div>
        <div class="empty-note" id="emptyNote">Noch keine Bilder in der Fotowand gefunden.</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button id="btn43" class="control-btn" type="button">4:3</button>
    <button id="btn75" class="control-btn" type="button">7:5</button>
    <button id="btn169" class="control-btn active" type="button">16:9</button>
    <button id="btn1610" class="control-btn" type="button">16:10</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const bgLayer = document.getElementById("bgLayer");
    const emptyNote = document.getElementById("emptyNote");
    const controls = document.getElementById("controls");

    const btn43 = document.getElementById("btn43");
    const btn75 = document.getElementById("btn75");
    const btn169 = document.getElementById("btn169");
    const btn1610 = document.getElementById("btn1610");

    const REPO_BASE = "/ellies-fotochallenge/";
    const CACHE_BUSTER = "v=20260308h";

    function assetUrl(filename){
      return `${window.location.origin}${REPO_BASE}assets/${filename}?${CACHE_BUSTER}`;
    }

    const BG_IMAGE = assetUrl("bg_16_9.png");

    const CLIP_VARIANTS = [
      { src: assetUrl("klammer1_uhd.png"), diagScale: 0.085 },
      { src: assetUrl("klammer2_uhd.png"), diagScale: 0.085 },
      { src: assetUrl("klammer3_uhd.png"), diagScale: 0.078 }
    ];

    const aspectMap = {
      "4:3":   { num:4,  den:3  },
      "7:5":   { num:7,  den:5  },
      "16:9":  { num:16, den:9  },
      "16:10": { num:16, den:10 }
    };

    const state = {
      currentFormat: "16:9",
      allAssets: [],
      assetIds: new Set(),
      cards: new Map(),
      showCounts: new Map(),
      usedPatterns: [],
      nextTimer: null,
      fetchTimer: null
    };

    const TOP_ROPE = [
      { x: 4.8,  y: 5.1  },
      { x: 10.0, y: 6.4  },
      { x: 18.0, y: 8.8  },
      { x: 28.0, y: 10.9 },
      { x: 40.0, y: 12.0 },
      { x: 50.0, y: 12.2 },
      { x: 62.0, y: 11.8 },
      { x: 74.0, y: 10.5 },
      { x: 86.0, y: 7.8  },
      { x: 95.0, y: 4.6  }
    ];

    const MID_ROPE = [
      { x: 4.9,  y: 31.8 },
      { x: 10.0, y: 34.1 },
      { x: 18.0, y: 36.8 },
      { x: 30.0, y: 39.0 },
      { x: 42.0, y: 40.1 },
      { x: 54.0, y: 40.1 },
      { x: 66.0, y: 39.0 },
      { x: 78.0, y: 36.8 },
      { x: 88.0, y: 33.7 },
      { x: 95.0, y: 30.7 }
    ];

    const SLOT_POINTS = [
      { id:"t1", row:"top", x:16 },
      { id:"t2", row:"top", x:32 },
      { id:"t3", row:"top", x:50 },
      { id:"t4", row:"top", x:68 },
      { id:"t5", row:"top", x:84 },

      { id:"m1", row:"mid", x:18 },
      { id:"m2", row:"mid", x:36 },
      { id:"m3", row:"mid", x:52 },
      { id:"m4", row:"mid", x:68 },
      { id:"m5", row:"mid", x:84 }
    ];

    function clamp(value, min, max){
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function randInt(min, max){
      return Math.floor(rand(min, max + 1));
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function ropeY(curve, x){
      for(let i = 0; i < curve.length - 1; i++){
        const a = curve[i];
        const b = curve[i + 1];
        if(x >= a.x && x <= b.x){
          const t = (x - a.x) / (b.x - a.x);
          return a.y + (b.y - a.y) * t;
        }
      }
      return curve[curve.length - 1].y;
    }

    const SLOTS = SLOT_POINTS.map(slot => ({
      ...slot,
      y: slot.row === "top" ? ropeY(TOP_ROPE, slot.x) : ropeY(MID_ROPE, slot.x)
    }));

    function getSlot(id){
      return SLOTS.find(s => s.id === id);
    }

    function preloadImage(url){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    async function setFormat(format){
      state.currentFormat = format;
      const cfg = aspectMap[format];

      document.documentElement.style.setProperty("--aspect-num", String(cfg.num));
      document.documentElement.style.setProperty("--aspect-den", String(cfg.den));

      const ok = await preloadImage(BG_IMAGE);
      bgLayer.style.backgroundImage = ok ? `url("${BG_IMAGE}")` : "none";

      btn43.classList.toggle("active", format === "4:3");
      btn75.classList.toggle("active", format === "7:5");
      btn169.classList.toggle("active", format === "16:9");
      btn1610.classList.toggle("active", format === "16:10");
    }

    function requestFullscreen(){
      const el = document.documentElement;
      if(el.requestFullscreen) return el.requestFullscreen().catch(() => {});
      if(el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      if(el.msRequestFullscreen) return el.msRequestFullscreen();
      return Promise.resolve();
    }

    function updateControlsVisibility(){
      const fullscreen = !!document.fullscreenElement;
      controls.classList.toggle("hidden", fullscreen);
    }

    document.addEventListener("fullscreenchange", updateControlsVisibility);

    async function onFormatClick(format){
      await setFormat(format);
      await requestFullscreen();
      updateControlsVisibility();
      rebuildWithCurrentCards();
    }

    btn43.addEventListener("click", () => onFormatClick("4:3"));
    btn75.addEventListener("click", () => onFormatClick("7:5"));
    btn169.addEventListener("click", () => onFormatClick("16:9"));
    btn1610.addEventListener("click", () => onFormatClick("16:10"));

    function sortByUploadOrder(list){
      return list.sort((a, b) => Number(a.version || 0) - Number(b.version || 0));
    }

    async function fetchAssets(){
      try{
        const response = await fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`);
        if(!response.ok){
          throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
        }

        const data = await response.json();
        const resources = Array.isArray(data.resources) ? data.resources : [];

        const onlyImages = resources.filter(asset => {
          const format = (asset.format || "").toLowerCase();
          return ["jpg","jpeg","png","webp","heic"].includes(format);
        });

        sortByUploadOrder(onlyImages).forEach(asset => {
          if(!state.assetIds.has(asset.public_id)){
            state.assetIds.add(asset.public_id);
            state.allAssets.push(asset);
          }
        });

        emptyNote.style.display = state.allAssets.length ? "none" : "grid";
      }catch(error){
        console.error(error);
      }
    }

    function getTaskMeta(asset){
      const taskId = asset?.context?.custom?.task_id || "";
      const task = Array.isArray(APP_CONFIG?.tasks)
        ? APP_CONFIG.tasks.find(t => t.id === taskId)
        : null;

      const caption =
        asset?.context?.custom?.caption ||
        task?.caption ||
        task?.subtitle ||
        task?.label ||
        "Fotochallenge";

      return {
        taskId,
        caption,
        color: task?.color || "#dce9f4"
      };
    }

    function getStageRect(){
      return stage.getBoundingClientRect();
    }

    function buildLayout(asset){
      const meta = getTaskMeta(asset);
      const stageRect = getStageRect();
      const stageDiagPx = Math.sqrt(stageRect.width * stageRect.width + stageRect.height * stageRect.height);

      const imgW = Math.max(1, Number(asset.width || 1000));
      const imgH = Math.max(1, Number(asset.height || 1000));
      const imgDiag = Math.sqrt(imgW * imgW + imgH * imgH);

      // FOTO ALLEIN = 38 % der Bildschirmdiagonale
      const targetPhotoDiagPx = stageDiagPx * 0.38;
      const photoScale = targetPhotoDiagPx / imgDiag;

      let mediaWPx = imgW * photoScale;
      let mediaHPx = imgH * photoScale;

      const ratio = mediaWPx / mediaHPx;

      // fester, kleiner Farbrahmen
      let sidePadPx = clamp(stageRect.width * 0.010, 10, 18);
      let topPadPx = clamp(stageRect.height * 0.010, 10, 18);

      let captionFontPx = clamp(stageDiagPx * 0.020, 20, 34);
      let captionHeightPx = captionFontPx * 2.9;

      // gesamtes Objekt erst einmal berechnen
      let frameWPx = mediaWPx + sidePadPx * 2;
      let frameHPx = mediaHPx + topPadPx + sidePadPx + captionHeightPx;

      // FOTO + RAHMEN = max 50 % der Bildschirmdiagonale
      const totalDiagPx = Math.sqrt(frameWPx * frameWPx + frameHPx * frameHPx);
      const maxTotalDiagPx = stageDiagPx * 0.50;

      if(totalDiagPx > maxTotalDiagPx){
        const s = maxTotalDiagPx / totalDiagPx;
        mediaWPx *= s;
        mediaHPx *= s;
        sidePadPx *= s;
        topPadPx *= s;
        captionFontPx = clamp(captionFontPx * s, 18, 30);
        captionHeightPx = captionFontPx * 2.95;
      }

      // Sicherheitsgrenzen
      const maxWPx = stageRect.width * 0.44;
      const maxHPx = stageRect.height * 0.58;

      frameWPx = mediaWPx + sidePadPx * 2;
      frameHPx = mediaHPx + topPadPx + sidePadPx + captionHeightPx;

      if(frameWPx > maxWPx){
        const s = maxWPx / frameWPx;
        mediaWPx *= s;
        mediaHPx *= s;
        sidePadPx *= s;
        topPadPx *= s;
        captionFontPx = clamp(captionFontPx * s, 18, 30);
        captionHeightPx = captionFontPx * 2.95;
      }

      frameWPx = mediaWPx + sidePadPx * 2;
      frameHPx = mediaHPx + topPadPx + sidePadPx + captionHeightPx;

      if(frameHPx > maxHPx){
        const s = maxHPx / frameHPx;
        mediaWPx *= s;
        mediaHPx *= s;
        sidePadPx *= s;
        topPadPx *= s;
        captionFontPx = clamp(captionFontPx * s, 18, 30);
        captionHeightPx = captionFontPx * 2.95;
      }

      frameWPx = mediaWPx + sidePadPx * 2;
      frameHPx = mediaHPx + topPadPx + sidePadPx + captionHeightPx;

      return {
        meta,
        ratio,
        mediaWPx,
        mediaHPx,
        frameWPx,
        frameHPx,
        sidePadPx,
        topPadPx,
        captionHeightPx,
        captionFontPx
      };
    }

    function rectForPlacementPx(slot, layout, rotDeg){
      const stageRect = getStageRect();

      const clipXPercent = clamp(50 + rand(-6, 6), 44, 56);
      const leftPx = (slot.x / 100) * stageRect.width - (layout.frameWPx * (clipXPercent / 100));
      const topPx = (slot.y / 100) * stageRect.height;

      const inflate = Math.abs(rotDeg) * 1.2 + 10;

      return {
        clipXPercent,
        leftPx,
        topPx,
        widthPx: layout.frameWPx,
        heightPx: layout.frameHPx,
        boxLeft: leftPx - inflate,
        boxTop: topPx - 4,
        boxRight: leftPx + layout.frameWPx + inflate,
        boxBottom: topPx + layout.frameHPx + inflate
      };
    }

    function overlapRatio(a, b){
      const left = Math.max(a.boxLeft, b.boxLeft);
      const right = Math.min(a.boxRight, b.boxRight);
      const top = Math.max(a.boxTop, b.boxTop);
      const bottom = Math.min(a.boxBottom, b.boxBottom);

      if(right <= left || bottom <= top) return 0;

      const inter = (right - left) * (bottom - top);
      const areaA = (a.boxRight - a.boxLeft) * (a.boxBottom - a.boxTop);
      const areaB = (b.boxRight - b.boxLeft) * (b.boxBottom - b.boxTop);

      return inter / Math.min(areaA, areaB);
    }

    function withinStage(rect){
      const stageRect = getStageRect();
      return (
        rect.leftPx >= 10 &&
        rect.topPx >= 10 &&
        rect.leftPx + rect.widthPx <= stageRect.width - 10 &&
        rect.topPx + rect.heightPx <= stageRect.height - 10
      );
    }

    function generatePatterns(){
      const twoers = [];
      const threeers = [];

      for(let i = 0; i < SLOTS.length; i++){
        for(let j = i + 1; j < SLOTS.length; j++){
          const a = SLOTS[i], b = SLOTS[j];
          const dx = Math.abs(a.x - b.x);
          const sameRow = a.row === b.row;

          if((sameRow && dx >= 26) || (!sameRow && dx >= 12)){
            twoers.push([a.id, b.id]);
          }
        }
      }

      for(let i = 0; i < SLOTS.length; i++){
        for(let j = i + 1; j < SLOTS.length; j++){
          for(let k = j + 1; k < SLOTS.length; k++){
            const ids = [SLOTS[i], SLOTS[j], SLOTS[k]];
            const topCount = ids.filter(s => s.row === "top").length;
            const midCount = ids.filter(s => s.row === "mid").length;
            if(topCount === 0 || midCount === 0) continue;

            let ok = true;
            for(let a = 0; a < ids.length; a++){
              for(let b = a + 1; b < ids.length; b++){
                const dx = Math.abs(ids[a].x - ids[b].x);
                const sameRow = ids[a].row === ids[b].row;
                if((sameRow && dx < 22) || (!sameRow && dx < 12)){
                  ok = false;
                }
              }
            }
            if(ok) threeers.push(ids.map(s => s.id));
          }
        }
      }

      return [...twoers, ...threeers];
    }

    const PATTERNS = generatePatterns();

    function getShownCount(id){
      return state.showCounts.get(id) || 0;
    }

    function markShown(id){
      state.showCounts.set(id, getShownCount(id) + 1);
    }

    function recentAssets(maxAgeSeconds = 300){
      const now = Date.now() / 1000;
      return state.allAssets.filter(a => Number(a.version || 0) >= now - maxAgeSeconds);
    }

    function chooseAssetsForAdd(count){
      const currentIds = new Set(Array.from(state.cards.values()).map(card => card.asset.public_id));
      const allFree = state.allAssets.filter(a => !currentIds.has(a.public_id));
      const newest = recentAssets(300).filter(a => !currentIds.has(a.public_id));

      const chosen = [];
      const chosenIds = new Set();

      const newestSorted = [...newest].sort((a, b) => Number(b.version || 0) - Number(a.version || 0));
      const maxFresh = Math.min(2, count);

      for(const a of newestSorted){
        if(chosen.length >= maxFresh) break;
        chosen.push(a);
        chosenIds.add(a.public_id);
      }

      const remaining = allFree
        .filter(a => !chosenIds.has(a.public_id))
        .sort((a, b) => {
          const c = getShownCount(a.public_id) - getShownCount(b.public_id);
          if(c !== 0) return c;
          return Number(a.version || 0) - Number(b.version || 0);
        });

      for(const a of remaining){
        if(chosen.length >= count) break;
        chosen.push(a);
        chosenIds.add(a.public_id);
      }

      return chosen.slice(0, count);
    }

    function fitCaption(captionEl, maxPx, minPx = 16){
      let size = maxPx;
      captionEl.style.fontSize = `${size}px`;
      captionEl.style.lineHeight = "1.02";

      while(size > minPx && captionEl.scrollHeight > captionEl.clientHeight + 1){
        size -= 1;
        captionEl.style.fontSize = `${size}px`;
      }
    }

    function getClipHeightPx(clipDef){
      const stageRect = getStageRect();
      const stageDiagPx = Math.sqrt(stageRect.width * stageRect.width + stageRect.height * stageRect.height);
      return clamp(stageDiagPx * clipDef.diagScale, 72, 190);
    }

    function createCard(asset, slotId, startDelay = 0){
      const slot = getSlot(slotId);
      const layout = buildLayout(asset);
      const restRot = rand(-7.0, 7.0);
      const rect = rectForPlacementPx(slot, layout, restRot);

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card attaching";
      wrapper.style.left = `${rect.leftPx}px`;
      wrapper.style.top = `${rect.topPx}px`;
      wrapper.style.width = `${layout.frameWPx}px`;
      wrapper.style.height = `${layout.frameHPx}px`;

      const inner = document.createElement("div");
      inner.className = "photo-inner";
      inner.style.width = "100%";
      inner.style.height = "100%";
      inner.style.setProperty("--pin-x", `${rect.clipXPercent}%`);

      const frame = document.createElement("div");
      frame.className = "photo-frame";
      frame.style.background = "#fff";

      const media = document.createElement("div");
      media.className = "photo-media";
      media.style.marginLeft = `${layout.sidePadPx}px`;
      media.style.marginRight = `${layout.sidePadPx}px`;
      media.style.marginTop = `${layout.topPadPx}px`;
      media.style.height = `${layout.mediaHPx}px`;
      media.style.background = layout.meta.color;

      const img = document.createElement("img");
      img.alt = layout.meta.caption;
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_3000,h_3000,q_auto,f_auto/${asset.public_id}`;

      const caption = document.createElement("div");
      caption.className = "photo-caption";
      caption.style.background = layout.meta.color;
      caption.style.height = `${layout.captionHeightPx}px`;
      caption.textContent = layout.meta.caption;

      media.appendChild(img);
      frame.appendChild(media);
      frame.appendChild(caption);
      inner.appendChild(frame);

      const clipDef = pick(CLIP_VARIANTS);
      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = clipDef.src;
      clip.alt = "";
      clip.style.setProperty("--clip-x", `${rect.clipXPercent}%`);
      clip.style.setProperty("--clip-h", `${getClipHeightPx(clipDef).toFixed(1)}px`);

      const clipRot = `${rand(-9, 9).toFixed(2)}deg`;
      const restRotCss = `${restRot.toFixed(2)}deg`;

      wrapper.style.setProperty("--rest-rot", restRotCss);
      wrapper.style.setProperty("--clip-rot", clipRot);

      const fromSide = pick(["left","right","bottomLeft","bottomRight"]);
      let photoStartX = 0, photoStartY = 0;
      if(fromSide === "left"){ photoStartX = -36; photoStartY = 10; }
      if(fromSide === "right"){ photoStartX = 36; photoStartY = 10; }
      if(fromSide === "bottomLeft"){ photoStartX = -20; photoStartY = 34; }
      if(fromSide === "bottomRight"){ photoStartX = 20; photoStartY = 34; }

      wrapper.style.setProperty("--photo-start-x", `${photoStartX}px`);
      wrapper.style.setProperty("--photo-start-y", `${photoStartY}px`);
      wrapper.style.setProperty("--photo-start-rot", `${(restRot + rand(-2.5, 2.5)).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-start-x", `${rand(-10, 10).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-start-y", `${rand(-34, -20).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-start-rot", `${rand(-14, 14).toFixed(2)}deg`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-26, 26).toFixed(1)}px`);
      wrapper.style.setProperty("--photo-end-y", `${rand(18, 28).toFixed(1)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-6, 6).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-end-x", `${rand(-10, 10).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-end-y", `${rand(-24, -10).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-12, 12).toFixed(2)}deg`);

      wrapper.style.setProperty("--attach-duration", `${rand(0.95, 1.08).toFixed(2)}s`);
      wrapper.style.setProperty("--clip-attach-duration", `${rand(0.92, 1.03).toFixed(2)}s`);
      wrapper.style.setProperty("--swing-duration", `${rand(2.0, 3.0).toFixed(2)}s`);

      wrapper.style.setProperty("--swing-a", `${rand(2.2, 3.5).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-b", `${rand(1.4, 2.2).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-c", `${rand(0.9, 1.6).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-d", `${rand(0.55, 1.10).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-e", `${rand(0.28, 0.65).toFixed(2)}deg`);
      wrapper.style.setProperty("--swing-f", `${rand(0.10, 0.28).toFixed(2)}deg`);

      wrapper.style.setProperty("--swing-x1", `${rand(-1.6, 1.6).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y1", `${rand(-1.1, 1.1).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x2", `${rand(-1.0, 1.0).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y2", `${rand(-0.8, 0.8).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x3", `${rand(-0.65, 0.65).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y3", `${rand(-0.55, 0.55).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x4", `${rand(-0.38, 0.38).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y4", `${rand(-0.28, 0.28).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-x5", `${rand(-0.20, 0.20).toFixed(2)}px`);
      wrapper.style.setProperty("--swing-y5", `${rand(-0.14, 0.14).toFixed(2)}px`);

      wrapper.appendChild(inner);
      wrapper.appendChild(clip);
      wrapper.style.opacity = "0";
      stage.appendChild(wrapper);

      requestAnimationFrame(() => {
        setTimeout(() => {
          fitCaption(caption, layout.captionFontPx, 16);
          wrapper.style.opacity = "1";
          wrapper.classList.add("attaching");
        }, startDelay);
      });

      const card = {
        asset,
        slotId,
        el: wrapper,
        mountedAt: Date.now(),
        layout,
        rect
      };

      wrapper.addEventListener("animationend", (ev) => {
        if(ev.animationName === "attachPhoto"){
          wrapper.classList.remove("attaching");
          wrapper.classList.add("swinging");
        }
      });

      state.cards.set(slotId, card);
      markShown(asset.public_id);
      return card;
    }

    function detachCard(card){
      return new Promise(resolve => {
        if(!card || !card.el){
          resolve();
          return;
        }

        card.el.classList.remove("attaching", "swinging");
        card.el.classList.add("detaching");

        setTimeout(() => {
          card.el.remove();
          state.cards.delete(card.slotId);
          resolve();
        }, 980);
      });
    }

    function cardBoundingFor(slotId, asset){
      const slot = getSlot(slotId);
      const layout = buildLayout(asset);
      const testRot = 0;
      return rectForPlacementPx(slot, layout, testRot);
    }

    function candidateOk(pattern, assetsBySlot){
      const rects = [];

      for(const slotId of pattern){
        const asset = assetsBySlot[slotId];
        if(!asset) return false;
        const rect = cardBoundingFor(slotId, asset);
        if(!withinStage(rect)) return false;

        for(const other of rects){
          if(overlapRatio(rect, other) > 0.16) return false;
        }
        rects.push(rect);
      }
      return true;
    }

    function chooseAssetsForPattern(pattern, cardsToKeep){
      const assetsBySlot = {};

      for(const c of cardsToKeep){
        assetsBySlot[c.slotId] = c.asset;
      }

      const freeSlots = pattern.filter(id => !assetsBySlot[id]);
      const additions = chooseAssetsForAdd(freeSlots.length);

      freeSlots.forEach((slotId, idx) => {
        assetsBySlot[slotId] = additions[idx] || null;
      });

      return assetsBySlot;
    }

    function chooseValidPattern(){
      const currentIds = Array.from(state.cards.keys());
      const currentSet = new Set(currentIds);

      const preferred = PATTERNS.filter(pattern => {
        const overlap = pattern.filter(id => currentSet.has(id)).length;
        if(currentIds.length === 0) return pattern.length >= 2 && pattern.length <= 3;
        return pattern.length >= 2 && pattern.length <= 3 && overlap >= 1 && overlap <= 2;
      });

      const tryPools = [
        preferred,
        PATTERNS.filter(p => p.length >= 2 && p.length <= 3),
        PATTERNS
      ];

      for(const pool of tryPools){
        for(const pattern of shuffle(pool)){
          const keepCards = Array.from(state.cards.values()).filter(c => pattern.includes(c.slotId));
          const assetsBySlot = chooseAssetsForPattern(pattern, keepCards);
          if(candidateOk(pattern, assetsBySlot)){
            state.usedPatterns.push(pattern.join("|"));
            if(state.usedPatterns.length > 50) state.usedPatterns.shift();
            return { pattern, assetsBySlot };
          }
        }
      }

      const fallback = pick(preferred.length ? preferred : PATTERNS);
      const keepCards = Array.from(state.cards.values()).filter(c => fallback.includes(c.slotId));
      return {
        pattern: fallback,
        assetsBySlot: chooseAssetsForPattern(fallback, keepCards)
      };
    }

    async function initialRender(){
      if(!state.allAssets.length){
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const first = chooseValidPattern();
      const delayStep = 360;

      first.pattern.forEach((slotId, idx) => {
        const asset = first.assetsBySlot[slotId];
        if(asset){
          createCard(asset, slotId, idx * delayStep);
        }
      });
    }

    function nextDelayMs(){
      return randInt(7000, 9500);
    }

    async function runCycle(){
      if(!state.allAssets.length){
        scheduleNextCycle(6000);
        return;
      }

      const { pattern, assetsBySlot } = chooseValidPattern();

      const currentSlotIds = Array.from(state.cards.keys());
      const nextSet = new Set(pattern);

      const toRemove = currentSlotIds
        .filter(slotId => !nextSet.has(slotId))
        .map(slotId => state.cards.get(slotId))
        .filter(Boolean);

      for(const card of toRemove){
        await detachCard(card);
      }

      await new Promise(resolve => setTimeout(resolve, 280));

      const missing = pattern.filter(slotId => !state.cards.has(slotId));
      const delayStep = 420;

      missing.forEach((slotId, idx) => {
        const asset = assetsBySlot[slotId];
        if(asset){
          createCard(asset, slotId, idx * delayStep);
        }
      });

      scheduleNextCycle(nextDelayMs());
    }

    function scheduleNextCycle(delayMs){
      clearTimeout(state.nextTimer);
      state.nextTimer = setTimeout(runCycle, delayMs);
    }

    function rebuildWithCurrentCards(){
      const currentEntries = Array.from(state.cards.entries()).map(([slotId, card]) => ({
        slotId,
        asset: card.asset
      }));

      state.cards.forEach(card => card.el.remove());
      state.cards.clear();

      const valid = [];

      for(const entry of currentEntries){
        const slot = getSlot(entry.slotId);
        if(!slot) continue;

        const rect = cardBoundingFor(entry.slotId, entry.asset);
        if(!withinStage(rect)) continue;

        let ok = true;
        for(const other of valid){
          if(overlapRatio(rect, other.rect) > 0.16){
            ok = false;
            break;
          }
        }
        if(ok){
          valid.push({ ...entry, rect });
        }
      }

      const kept = valid.slice(0, 3);
      kept.forEach(entry => createCard(entry.asset, entry.slotId, 0));

      if(state.cards.size < 2){
        clearTimeout(state.nextTimer);
        initialRender();
      }else{
        scheduleNextCycle(nextDelayMs());
      }
    }

    async function boot(){
      await setFormat("16:9");
      await fetchAssets();
      await initialRender();
      state.fetchTimer = setInterval(fetchAssets, 10000);
      scheduleNextCycle(nextDelayMs());
      updateControlsVisibility();
    }

    boot();
  </script>
