<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge – Slideshow</title>
  <script src="config.js"></script>

  <style>
    :root{
      --wall-bg:#efe8dd;
      --stage-w:16;
      --stage-h:9;
      --shadow:0 14px 30px rgba(0,0,0,.18);
      --clip-h:160px;
      --ui-scale:1;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0d0d0d;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      position:relative;
    }

    .viewport{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#0d0d0d;
      overflow:hidden;
    }

    .stage-shell{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#0d0d0d;
    }

    .stage{
      position:relative;
      width:min(100vw, calc(100vh * (var(--stage-w) / var(--stage-h))));
      height:min(100vh, calc(100vw * (var(--stage-h) / var(--stage-w))));
      overflow:hidden;
      background:var(--wall-bg);
      isolation:isolate;
    }

    .bg-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background-color:var(--wall-bg);
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
    }

    .empty-note{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      z-index:10;
      color:rgba(0,0,0,.45);
      font-size:clamp(18px, 2vw, 28px);
      text-align:center;
      padding:24px;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:300;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:6px;
      opacity:.7;
      transition:opacity .2s ease, transform .2s ease;
    }

    .controls:hover{
      opacity:1;
    }

    .controls.hidden-in-fullscreen{
      display:none;
    }

    .control-btn{
      border:none;
      border-radius:999px;
      padding:7px 12px;
      min-width:64px;
      background:rgba(255,255,255,.72);
      color:#333;
      cursor:pointer;
      font-size:13px;
      font-weight:700;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      backdrop-filter:blur(6px);
    }

    .control-btn.active{
      background:rgba(255,255,255,.95);
      color:#111;
    }

    .photo-card{
      position:absolute;
      z-index:50;
      pointer-events:none;
      will-change:transform, opacity;
    }

    .photo-frame{
      position:relative;
      background:#fff;
      box-shadow:var(--shadow);
      overflow:visible;
      transform-origin:50% 0%;
      will-change:transform, opacity;
    }

    .media-wrap{
      width:100%;
      background:transparent;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .media-wrap img{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:#fff;
    }

    .caption{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
      color:#111;
      font-family:"Kalam","Segoe Print","Comic Sans MS","Trebuchet MS",cursive;
      font-weight:700;
      line-height:1.06;
      word-break:break-word;
      hyphens:auto;
    }

    .clip{
      position:absolute;
      z-index:8;
      width:auto;
      height:var(--clip-h);
      transform-origin:center top;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter:drop-shadow(0 2px 3px rgba(0,0,0,.16));
      will-change:transform, opacity;
    }

    .photo-card.attaching .photo-frame{
      animation:attachPhoto var(--attach-duration, 1s) ease-out forwards;
    }

    .photo-card.attaching .clip{
      animation:attachClip var(--attach-duration, 1s) ease-out forwards;
    }

    .photo-card.swinging .photo-frame{
      animation:swingToRest var(--swing-duration, 2.4s) ease-out forwards;
    }

    .photo-card.detaching .photo-frame{
      animation:detachPhoto .95s ease-in forwards;
    }

    .photo-card.detaching .clip{
      animation:detachClip .78s ease-in forwards;
    }

    @keyframes attachPhoto{
      0%{
        opacity:0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(.98);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--rest-rot))
          scale(1);
      }
    }

    @keyframes attachClip{
      0%{
        opacity:0;
        transform:
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(.98);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--clip-rot))
          scale(1);
      }
    }

    @keyframes swingToRest{
      0%{
        transform:translate(0,0) rotate(var(--rest-rot));
      }
      14%{
        transform:translate(var(--sx1), var(--sy1)) rotate(calc(var(--rest-rot) + var(--sr1)));
      }
      30%{
        transform:translate(var(--sx2), var(--sy2)) rotate(calc(var(--rest-rot) - var(--sr2)));
      }
      48%{
        transform:translate(var(--sx3), var(--sy3)) rotate(calc(var(--rest-rot) + var(--sr3)));
      }
      66%{
        transform:translate(var(--sx4), var(--sy4)) rotate(calc(var(--rest-rot) - var(--sr4)));
      }
      82%{
        transform:translate(var(--sx5), var(--sy5)) rotate(calc(var(--rest-rot) + var(--sr5)));
      }
      100%{
        transform:translate(0,0) rotate(var(--rest-rot));
      }
    }

    @keyframes detachPhoto{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--rest-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--photo-end-x), var(--photo-end-y))
          rotate(calc(var(--rest-rot) + var(--photo-end-rot)))
          scale(.98);
      }
    }

    @keyframes detachClip{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--clip-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rot) + var(--clip-end-rot)))
          scale(.98);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell">
      <div class="stage" id="stage">
        <div class="bg-layer" id="bgLayer"></div>
        <div class="empty-note" id="emptyNote">Noch keine Bilder in Cloudinary gefunden.</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="control-btn" id="btn43" type="button">4:3</button>
    <button class="control-btn active" id="btn169" type="button">16:9</button>
    <button class="control-btn" id="btn75" type="button">7:5</button>
    <button class="control-btn" id="btn1610" type="button">16:10</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const bgLayer = document.getElementById("bgLayer");
    const emptyNote = document.getElementById("emptyNote");
    const controls = document.getElementById("controls");

    const btn43 = document.getElementById("btn43");
    const btn169 = document.getElementById("btn169");
    const btn75 = document.getElementById("btn75");
    const btn1610 = document.getElementById("btn1610");

    const REPO_BASE = "/ellies-fotochallenge/";
    const CACHE_BUSTER = "v=20260308_full_01";

    function assetUrl(name){
      return `${window.location.origin}${REPO_BASE}assets/${encodeURIComponent(name)}?${CACHE_BUSTER}`;
    }

    const BG_IMAGE = assetUrl("bg_16_9.png");
    const ROPE_MASK_IMAGE = assetUrl("bg_16_9_Fadenposition.png");

    const CLIP_IMAGES = [
      { url: assetUrl("klammer1_uhd.png"), scale: 1.0 },
      { url: assetUrl("klammer2_uhd.png"), scale: 1.0 },
      { url: assetUrl("klammer3_uhd.png"), scale: 0.5 }
    ];

    const FORMAT_MAP = {
      "4:3":   { w:4,  h:3  },
      "16:9":  { w:16, h:9  },
      "7:5":   { w:7,  h:5  },
      "16:10": { w:16, h:10 }
    };

    let currentFormat = "16:9";
    let fetchTimer = null;
    let cycleTimer = null;

    const state = {
      allAssets: [],
      assetIds: new Set(),
      cards: new Map(),
      shownHistory: [],
      usageCounter: new Map(),
      recentPatternKeys: [],
      ropeMap: null,
      stageW: 0,
      stageH: 0,
      lastPatternKey: null,
      slotCooldown: new Map()
    };

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function clamp(v, min, max){
      return Math.max(min, Math.min(max, v));
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function patternKey(pattern){
      return pattern.slice().sort().join("|");
    }

    function nowSec(){
      return Date.now() / 1000;
    }

    function getTaskStyle(asset){
      const taskId = asset?.context?.custom?.task_id || "";
      const task = (window.APP_CONFIG?.tasks || []).find(t => t.id === taskId);
      return {
        caption: asset?.context?.custom?.caption || "Fotochallenge",
        color: task?.color || "#dfe8f2"
      };
    }

    function setFormatButtons(){
      btn43.classList.toggle("active", currentFormat === "4:3");
      btn169.classList.toggle("active", currentFormat === "16:9");
      btn75.classList.toggle("active", currentFormat === "7:5");
      btn1610.classList.toggle("active", currentFormat === "16:10");
    }

    async function preloadImage(url){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    async function setFormat(format){
      currentFormat = format;
      const cfg = FORMAT_MAP[format];
      document.documentElement.style.setProperty("--stage-w", cfg.w);
      document.documentElement.style.setProperty("--stage-h", cfg.h);
      setFormatButtons();

      const bg = await preloadImage(BG_IMAGE);
      bgLayer.style.backgroundImage = bg ? `url("${BG_IMAGE}")` : "none";

      await buildRopeMap();
      await rebuildWall();
    }

    async function requestFullscreen(){
      const el = document.documentElement;
      try{
        if(el.requestFullscreen){
          await el.requestFullscreen();
        }else if(el.webkitRequestFullscreen){
          el.webkitRequestFullscreen();
        }
      }catch(e){}
    }

    function updateControlsVisibility(){
      const inFs = !!document.fullscreenElement;
      controls.classList.toggle("hidden-in-fullscreen", inFs);
    }

    document.addEventListener("fullscreenchange", updateControlsVisibility);

    btn43.addEventListener("click", async () => {
      await setFormat("4:3");
      await requestFullscreen();
    });

    btn169.addEventListener("click", async () => {
      await setFormat("16:9");
      await requestFullscreen();
    });

    btn75.addEventListener("click", async () => {
      await setFormat("7:5");
      await requestFullscreen();
    });

    btn1610.addEventListener("click", async () => {
      await setFormat("16:10");
      await requestFullscreen();
    });

    function sortByUploadOrder(list){
      return list.sort((a, b) => Number(a.version || 0) - Number(b.version || 0));
    }

    async function fetchAssets(){
      try{
        const response = await fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`);
        if(!response.ok) throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status})`);
        const data = await response.json();
        const resources = Array.isArray(data.resources) ? data.resources : [];

        const onlyImages = resources.filter(asset => {
          const format = (asset.format || "").toLowerCase();
          return ["jpg","jpeg","png","webp","heic"].includes(format);
        });

        sortByUploadOrder(onlyImages).forEach(asset => {
          if(!state.assetIds.has(asset.public_id)){
            state.assetIds.add(asset.public_id);
            state.allAssets.push(asset);
          }
        });

        if(state.allAssets.length){
          emptyNote.style.display = "none";
        }
      }catch(err){
        console.error(err);
      }
    }

    async function buildRopeMap(){
      const maskImg = await preloadImage(ROPE_MASK_IMAGE);
      if(!maskImg){
        state.ropeMap = null;
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = maskImg.naturalWidth;
      canvas.height = maskImg.naturalHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(maskImg, 0, 0);

      const { data, width, height } = ctx.getImageData(0,0,canvas.width,canvas.height);
      const rows = new Array(height).fill(null).map(() => []);

      for(let y = 0; y < height; y++){
        for(let x = 0; x < width; x++){
          const i = (y * width + x) * 4;
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const a = data[i + 3];

          if(a > 10 && g > 120 && r < 100 && b < 120){
            rows[y].push(x);
          }
        }
      }

      const ropePoints = [];
      for(let y = 0; y < height; y++){
        if(rows[y].length){
          const meanX = rows[y].reduce((s,v) => s + v, 0) / rows[y].length;
          ropePoints.push({ x: meanX, y });
        }
      }

      state.ropeMap = { width, height, ropePoints };
    }

    function stageMetrics(){
      const rect = stage.getBoundingClientRect();
      state.stageW = rect.width;
      state.stageH = rect.height;
      return rect;
    }

    function screenToStagePercent(xPx, yPx){
      return {
        x: (xPx / state.stageW) * 100,
        y: (yPx / state.stageH) * 100
      };
    }

    function ropeYPercentAtXPercent(xPercent){
      if(!state.ropeMap || !state.ropeMap.ropePoints.length){
        return 12;
      }

      const xPx = (xPercent / 100) * state.ropeMap.width;
      let best = state.ropeMap.ropePoints[0];
      let bestDist = Math.abs(best.x - xPx);

      for(const p of state.ropeMap.ropePoints){
        const d = Math.abs(p.x - xPx);
        if(d < bestDist){
          best = p;
          bestDist = d;
        }
      }

      return (best.y / state.ropeMap.height) * 100;
    }

    const BASE_SLOTS = {
      TL: { x:18, yRow:"top" },
      TC: { x:50, yRow:"top" },
      TR: { x:82, yRow:"top" },

      ML: { x:28, yRow:"mid" },
      MC: { x:50, yRow:"mid" },
      MR: { x:72, yRow:"mid" }
    };

    const Y_ROWS = {
      top: { offset: 10.8 },
      mid: { offset: 10.2 }
    };

    const PATTERNS = [
      ["TL","TR"],
      ["TL","MC"],
      ["TC","MR"],
      ["TR","ML"],
      ["TC","ML"],

      ["TL","TC","MR"],
      ["TL","MC","TR"],
      ["TC","ML","MR"],
      ["TL","MR","MC"],
      ["TR","ML","MC"],
      ["TL","TC","ML"],
      ["TC","TR","MR"],
      ["TL","TR","MC"],
      ["ML","MC","MR"],
      ["TL","ML","MR"],
      ["TC","ML","MC"],

      ["TL","TC","MR","MC"],
      ["TR","TC","ML","MC"],
      ["TL","TR","ML","MR"],
      ["TL","TC","ML","MR"],
      ["TR","TC","MR","ML"],
      ["TL","TR","TC","MC"],
      ["TC","ML","MR","MC"],
      ["TL","ML","MC","MR"],
      ["TR","ML","MC","MR"],
      ["TL","TC","MC","MR"]
    ];

    function jitteredSlot(slotKey, patternLength){
      const base = BASE_SLOTS[slotKey];
      const xJitter = patternLength === 2 ? 2.4 : patternLength === 3 ? 1.8 : 1.2;
      const yJitter = patternLength === 2 ? 0.6 : patternLength === 3 ? 0.8 : 0.9;

      const x = base.x + rand(-xJitter, xJitter);
      const ropeY = ropeYPercentAtXPercent(x);
      const y = ropeY + Y_ROWS[base.yRow].offset + rand(-yJitter, yJitter);

      return { x, y, row: base.yRow };
    }

    function getAssetPool(){
      const nowVersion = Math.floor(Date.now() / 1000);
      const fiveMin = 5 * 60;

      const all = [...state.allAssets];

      const newAssets = all.filter(a => (nowVersion - Number(a.version || 0)) <= fiveMin);
      const oldAssets = all.filter(a => (nowVersion - Number(a.version || 0)) > fiveMin);

      const sortByUse = list => list.sort((a,b) => {
        const ua = state.usageCounter.get(a.public_id) || 0;
        const ub = state.usageCounter.get(b.public_id) || 0;
        if(ua !== ub) return ua - ub;
        return Number(b.version || 0) - Number(a.version || 0);
      });

      sortByUse(newAssets);
      sortByUse(oldAssets);

      const cappedNew = newAssets.slice(0,2);
      const merged = [...cappedNew, ...oldAssets, ...newAssets.slice(2)];

      return merged.filter((asset, index, arr) =>
        arr.findIndex(a => a.public_id === asset.public_id) === index
      );
    }

    function registerUsage(asset){
      const current = state.usageCounter.get(asset.public_id) || 0;
      state.usageCounter.set(asset.public_id, current + 1);
      state.shownHistory.push(asset.public_id);
      if(state.shownHistory.length > 60){
        state.shownHistory.shift();
      }
    }

    function computeLayout(asset){
      const stageRect = stageMetrics();
      const stageDiag = Math.sqrt(stageRect.width * stageRect.width + stageRect.height * stageRect.height);
      const targetPhotoDiag = stageDiag * 0.35;

      const imgW = Math.max(1, Number(asset.width || 1000));
      const imgH = Math.max(1, Number(asset.height || 1000));
      const imgDiag = Math.sqrt(imgW * imgW + imgH * imgH);

      const scale = targetPhotoDiag / imgDiag;
      let photoW = imgW * scale;
      let photoH = imgH * scale;

      const longest = Math.max(photoW, photoH);
      const maxLongest = stageRect.width * 0.40;
      if(longest > maxLongest){
        const f = maxLongest / longest;
        photoW *= f;
        photoH *= f;
      }

      const minLongest = stageRect.width * 0.26;
      if(Math.max(photoW, photoH) < minLongest){
        const f = minLongest / Math.max(photoW, photoH);
        photoW *= f;
        photoH *= f;
      }

      const style = getTaskStyle(asset);

      const longestFinal = Math.max(photoW, photoH);
      const whiteSide = Math.max(12, longestFinal * 0.022);
      const whiteTop = Math.max(12, longestFinal * 0.02);

      let captionHeight = Math.max(74, longestFinal * 0.18);
      let frameInnerW = photoW + whiteSide * 2;
      let frameW = frameInnerW;

      // Für sehr schmale Hochformatfotos Rahmen verbreitern, damit Text in 2 Zeilen passt
      const captionMinReadableW = Math.max(190, stageRect.width * 0.14);
      if(frameW < captionMinReadableW){
        frameW = captionMinReadableW;
      }

      const captionSidePad = Math.max(12, frameW * 0.05);
      const mediaOuterH = photoH + whiteTop + whiteSide;

      const frameH = mediaOuterH + captionHeight;

      const clipBaseH = Math.max(92, frameH * 0.28);

      return {
        style,
        photoW,
        photoH,
        frameW,
        frameH,
        whiteSide,
        whiteTop,
        captionHeight,
        captionSidePad,
        mediaOuterH,
        clipBaseH
      };
    }

    function rectForPlacement(slotKey, asset, patternLength){
      const slot = jitteredSlot(slotKey, patternLength);
      const layout = computeLayout(asset);

      const restRot = rand(-7, 7);
      const clipAnchorXPercent = clamp(50 + rand(-8, 8), 42, 58);

      const frameLeft = (slot.x / 100) * state.stageW - (layout.frameW * clipAnchorXPercent / 100);
      const frameTop = (slot.y / 100) * state.stageH;
      const rect = {
        x: frameLeft,
        y: frameTop,
        w: layout.frameW,
        h: layout.frameH,
        slot,
        restRot,
        clipAnchorXPercent,
        layout
      };

      return rect;
    }

    function insideStage(rect){
      const margin = 10;
      return (
        rect.x >= margin &&
        rect.y >= margin &&
        rect.x + rect.w <= state.stageW - margin &&
        rect.y + rect.h <= state.stageH - margin
      );
    }

    function overlapArea(a, b){
      const x = Math.max(0, Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x));
      const y = Math.max(0, Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y));
      return x * y;
    }

    function overlapRatio(a, b){
      const area = overlapArea(a, b);
      if(area <= 0) return 0;
      const minArea = Math.min(a.w * a.h, b.w * b.h);
      return area / minArea;
    }

    function tryBuildPattern(pattern, strict = false){
      const placements = {};
      const pool = getAssetPool();
      const existingIds = new Set();

      for(const [slotKey, card] of state.cards.entries()){
        if(pattern.includes(slotKey)){
          const placement = rectForPlacement(slotKey, card.asset, pattern.length);
          if(!insideStage(placement)) return null;
          placements[slotKey] = { asset: card.asset, rect: placement };
          existingIds.add(card.asset.public_id);
        }
      }

      for(const slotKey of pattern){
        if(placements[slotKey]) continue;

        let found = null;

        for(const asset of pool){
          if(existingIds.has(asset.public_id)) continue;

          const rect = rectForPlacement(slotKey, asset, pattern.length);
          if(!insideStage(rect)) continue;

          let bad = false;
          for(const otherKey of Object.keys(placements)){
            const other = placements[otherKey].rect;
            const ratio = overlapRatio(rect, other);
            const maxOverlap = strict ? 0.14 : 0.22;
            if(ratio > maxOverlap){
              bad = true;
              break;
            }
          }

          if(!bad){
            found = { asset, rect };
            existingIds.add(asset.public_id);
            break;
          }
        }

        if(!found) return null;
        placements[slotKey] = found;
      }

      return placements;
    }

    function choosePatternAndPlacements(){
      const currentSet = new Set(state.cards.keys());

      const ordered = shuffle(PATTERNS).sort((a,b) => {
        const oa = a.filter(s => currentSet.has(s)).length;
        const ob = b.filter(s => currentSet.has(s)).length;
        return ob - oa;
      });

      for(const strict of [true, false]){
        for(const pattern of ordered){
          if(state.cards.size){
            const shared = pattern.filter(s => currentSet.has(s)).length;
            if(shared < 1 || shared > 2) continue;
          }

          const key = patternKey(pattern);
          if(state.lastPatternKey === key) continue;

          const placements = tryBuildPattern(pattern, strict);
          if(placements){
            state.lastPatternKey = key;
            return { pattern, placements };
          }
        }
      }

      return null;
    }

    function buildCaptionText(asset){
      return getTaskStyle(asset).caption;
    }

    function fitCaption(captionEl, text, layout){
      captionEl.textContent = text;

      let size = Math.max(20, layout.frameW * 0.072);
      captionEl.style.fontSize = `${size}px`;
      captionEl.style.height = `${layout.captionHeight}px`;
      captionEl.style.padding = `4px ${layout.captionSidePad}px`;

      const maxLoops = 18;
      for(let i = 0; i < maxLoops; i++){
        if(captionEl.scrollHeight <= captionEl.clientHeight + 2){
          break;
        }
        size -= 1;
        captionEl.style.fontSize = `${size}px`;
      }
    }

    function createCard(asset, slotKey, placement, delayMs = 0){
      const { rect, layout, restRot, clipAnchorXPercent } = placement;
      const style = layout.style;
      const captionText = buildCaptionText(asset);

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card";
      wrapper.style.left = `${rect.x}px`;
      wrapper.style.top = `${rect.y}px`;
      wrapper.style.width = `${layout.frameW}px`;
      wrapper.style.height = `${layout.frameH}px`;

      const frame = document.createElement("div");
      frame.className = "photo-frame";
      frame.style.width = `${layout.frameW}px`;
      frame.style.height = `${layout.frameH}px`;
      frame.style.background = "#fff";

      const mediaWrap = document.createElement("div");
      mediaWrap.className = "media-wrap";
      mediaWrap.style.position = "absolute";
      mediaWrap.style.left = `${Math.round((layout.frameW - layout.photoW) / 2)}px`;
      mediaWrap.style.top = `${layout.whiteTop}px`;
      mediaWrap.style.width = `${layout.photoW}px`;
      mediaWrap.style.height = `${layout.photoH}px`;

      const img = document.createElement("img");
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_2600,h_2600,q_auto,f_auto/${asset.public_id}`;
      img.alt = captionText;

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.style.position = "absolute";
      caption.style.left = "0";
      caption.style.bottom = "0";
      caption.style.width = `${layout.frameW}px`;
      caption.style.height = `${layout.captionHeight}px`;
      caption.style.background = style.color;

      const clipMeta = pick(CLIP_IMAGES);
      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = clipMeta.url;
      clip.onerror = () => { clip.style.display = "none"; };

      const clipH = layout.clipBaseH * clipMeta.scale;
      clip.style.height = `${clipH}px`;

      const clipLeftPx = layout.frameW * (clipAnchorXPercent / 100) - (clipH * 0.18);
      clip.style.left = `${clipLeftPx}px`;

      // Unteres Fünftel soll den Faden schneiden
      const visibleBelowRope = clipH * 0.20;
      clip.style.top = `${-clipH + visibleBelowRope}px`;

      const clipRot = rand(-9, 9);
      const attachDuration = 1.0 + rand(-0.08, 0.12);
      const swingDuration = 2.0 + rand(0.2, 1.0);

      wrapper.style.setProperty("--rest-rot", `${restRot.toFixed(2)}deg`);
      wrapper.style.setProperty("--clip-rot", `${clipRot.toFixed(2)}deg`);
      wrapper.style.setProperty("--attach-duration", `${attachDuration.toFixed(2)}s`);
      wrapper.style.setProperty("--swing-duration", `${swingDuration.toFixed(2)}s`);

      wrapper.style.setProperty("--photo-start-x", `${rand(-18, 18).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-start-y", `${rand(36, 68).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-start-rot", `${(restRot + rand(-2.8, 2.8)).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-start-x", `${rand(-10, 10).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-start-y", `${rand(-54, -28).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-start-rot", `${(clipRot + rand(-5, 5)).toFixed(2)}deg`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-24, 24).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-y", `${rand(36, 60).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-5, 5).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-end-x", `${rand(-16, 16).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-y", `${rand(-28, -8).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-9, 9).toFixed(2)}deg`);

      // Schwingung um finale Ruhelage
      wrapper.style.setProperty("--sr1", `${rand(2.2, 3.4).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr2", `${rand(1.4, 2.4).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr3", `${rand(0.8, 1.5).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr4", `${rand(0.35, 0.9).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr5", `${rand(0.12, 0.35).toFixed(2)}deg`);

      wrapper.style.setProperty("--sx1", `${rand(-1.8, 1.8).toFixed(2)}px`);
      wrapper.style.setProperty("--sy1", `${rand(-1.2, 1.2).toFixed(2)}px`);
      wrapper.style.setProperty("--sx2", `${rand(-1.2, 1.2).toFixed(2)}px`);
      wrapper.style.setProperty("--sy2", `${rand(-0.9, 0.9).toFixed(2)}px`);
      wrapper.style.setProperty("--sx3", `${rand(-0.8, 0.8).toFixed(2)}px`);
      wrapper.style.setProperty("--sy3", `${rand(-0.6, 0.6).toFixed(2)}px`);
      wrapper.style.setProperty("--sx4", `${rand(-0.45, 0.45).toFixed(2)}px`);
      wrapper.style.setProperty("--sy4", `${rand(-0.3, 0.3).toFixed(2)}px`);
      wrapper.style.setProperty("--sx5", `${rand(-0.18, 0.18).toFixed(2)}px`);
      wrapper.style.setProperty("--sy5", `${rand(-0.12, 0.12).toFixed(2)}px`);

      mediaWrap.appendChild(img);
      frame.appendChild(mediaWrap);
      frame.appendChild(caption);
      wrapper.appendChild(frame);
      wrapper.appendChild(clip);
      stage.appendChild(wrapper);

      fitCaption(caption, captionText, layout);

      const cardObj = {
        slotKey,
        asset,
        el: wrapper,
        placement,
        mountedAt: Date.now()
      };

      state.cards.set(slotKey, cardObj);
      registerUsage(asset);

      setTimeout(() => {
        wrapper.classList.add("attaching");

        const attachHandler = (e) => {
          if(e.target !== frame) return;
          wrapper.classList.remove("attaching");
          wrapper.classList.add("swinging");
          frame.removeEventListener("animationend", attachHandler);

          setTimeout(() => {
            wrapper.classList.remove("swinging");
          }, swingDuration * 1000 + 120);
        };

        frame.addEventListener("animationend", attachHandler);
      }, delayMs);

      return cardObj;
    }

    function detachCard(cardObj){
      return new Promise(resolve => {
        cardObj.el.classList.remove("attaching", "swinging");
        cardObj.el.classList.add("detaching");

        setTimeout(() => {
          if(cardObj.el && cardObj.el.parentNode){
            cardObj.el.parentNode.removeChild(cardObj.el);
          }
          state.cards.delete(cardObj.slotKey);
          resolve();
        }, 980);
      });
    }

    async function initialRender(){
      if(!state.allAssets.length){
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const safePatterns = [
        ["TL","TR"],
        ["TC","ML"],
        ["TC","MR"],
        ["TL","MC"],
        ["TR","MC"],
        ["TL","TC","MR"],
        ["TR","TC","ML"]
      ];

      for(const pattern of safePatterns){
        const placements = tryBuildPattern(pattern, false);
        if(placements){
          pattern.forEach((slotKey, i) => {
            createCard(placements[slotKey].asset, slotKey, placements[slotKey], i * 420);
          });
          return;
        }
      }

      const pool = getAssetPool().slice(0,2);
      const fallback = ["TL","TR"];
      pool.forEach((asset, i) => {
        const placement = rectForPlacement(fallback[i], asset, 2);
        createCard(asset, fallback[i], { asset, rect: placement, layout: placement.layout, restRot: placement.restRot, clipAnchorXPercent: placement.clipAnchorXPercent }, i * 420);
      });
    }

    function chooseSwapPlan(nextPattern){
      const currentSlots = Array.from(state.cards.keys());
      const nextSlots = nextPattern.slice();

      const keep = currentSlots.filter(s => nextSlots.includes(s));
      const remove = currentSlots.filter(s => !nextSlots.includes(s));
      const add = nextSlots.filter(s => !currentSlots.includes(s));

      return { keep, remove, add };
    }

    async function runCycle(){
      if(!state.allAssets.length){
        scheduleNextCycle(6000);
        return;
      }

      const chosen = choosePatternAndPlacements();
      if(!chosen){
        scheduleNextCycle(6000);
        return;
      }

      const { pattern, placements } = chosen;
      const plan = chooseSwapPlan(pattern);

      const removeCards = plan.remove
        .map(slotKey => state.cards.get(slotKey))
        .filter(Boolean)
        .sort((a,b) => a.mountedAt - b.mountedAt);

      for(const card of removeCards){
        await detachCard(card);
      }

      await sleep(260);

      for(let i = 0; i < plan.add.length; i++){
        const slotKey = plan.add[i];
        const p = placements[slotKey];
        if(!p) continue;
        createCard(p.asset, slotKey, p, i * 500);
      }

      scheduleNextCycle(5000 + 2200);
    }

    function scheduleNextCycle(delayMs){
      clearTimeout(cycleTimer);
      cycleTimer = setTimeout(runCycle, delayMs);
    }

    async function rebuildWall(){
      clearTimeout(cycleTimer);

      for(const card of Array.from(state.cards.values())){
        if(card.el && card.el.parentNode){
          card.el.parentNode.removeChild(card.el);
        }
      }
      state.cards.clear();

      await initialRender();
      scheduleNextCycle(7200);
    }

    async function boot(){
      stageMetrics();
      await setFormat("16:9");
      await fetchAssets();
      await rebuildWall();

      clearInterval(fetchTimer);
      fetchTimer = setInterval(fetchAssets, 12000);

      window.addEventListener("resize", async () => {
        stageMetrics();
        await buildRopeMap();
        await rebuildWall();
      });
    }

    boot();
  </script>
</body>
