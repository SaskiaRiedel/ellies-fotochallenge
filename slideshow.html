<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    :root{
      --wall-bg:#ebe5db;
      --page-bg:#0f0f10;
      --shadow:0 12px 28px rgba(0,0,0,.18);
      --btn-bg:rgba(255,255,255,.62);
      --btn-bg-active:rgba(255,255,255,.9);
      --btn-color:#34302c;
      --aspect-num:16;
      --aspect-den:9;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--page-bg);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      position:relative;
    }

    .viewport{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:var(--page-bg);
      overflow:hidden;
    }

    .stage-shell{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:var(--page-bg);
    }

    .stage{
      position:relative;
      width:min(100vw, calc(100vh * (var(--aspect-num) / var(--aspect-den))));
      height:min(100vh, calc(100vw * (var(--aspect-den) / var(--aspect-num))));
      overflow:hidden;
      background:var(--wall-bg);
    }

    .bg-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background-color:var(--wall-bg);
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
      pointer-events:none;
    }

    .empty-note{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:rgba(0,0,0,.42);
      font-size:clamp(1.05rem,1.8vw,1.45rem);
      text-align:center;
      padding:24px;
      z-index:20;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      right:10px;
      bottom:10px;
      z-index:300;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:5px;
      transition:opacity .25s ease;
    }

    .controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .control-btn{
      border:none;
      border-radius:999px;
      padding:6px 10px;
      background:var(--btn-bg);
      color:var(--btn-color);
      cursor:pointer;
      font-size:.78rem;
      font-weight:700;
      backdrop-filter:blur(4px);
      box-shadow:0 4px 14px rgba(0,0,0,.12);
      min-width:52px;
      opacity:.82;
    }

    .control-btn.active{
      background:var(--btn-bg-active);
      color:#171717;
      opacity:1;
    }

    .photo-card{
      position:absolute;
      z-index:30;
      pointer-events:none;
      will-change:transform, opacity;
    }

    .photo-frame{
      position:relative;
      background:#fff;
      border-radius:2px;
      transform-origin:50% 0%;
      box-shadow:var(--shadow);
      overflow:visible;
      will-change:transform, opacity;
    }

    .frame-inner{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .media-wrap{
      position:relative;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .media-wrap img{
      display:block;
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .caption{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:700;
      color:#111;
      line-height:1.08;
      overflow:hidden;
      word-break:break-word;
      hyphens:auto;
    }

    .caption-text{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      max-width:100%;
      text-overflow:ellipsis;
    }

    .clip{
      position:absolute;
      top:0;
      left:50%;
      transform-origin:center top;
      z-index:6;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.18));
      will-change:transform, opacity;
      height:auto;
      width:auto;
    }

    .photo-card.attaching .photo-frame{
      animation:attachPhoto 1.2s cubic-bezier(.2,.88,.25,1) forwards;
    }

    .photo-card.attaching .clip{
      animation:attachClip 1.2s cubic-bezier(.2,.88,.25,1) forwards;
    }

    .photo-card.swinging .photo-frame{
      animation:swayPhotoDamped var(--sway-duration,2s) ease-out forwards;
    }

    .photo-card.detaching .photo-frame{
      animation:detachPhoto 1.08s ease-in forwards;
    }

    .photo-card.detaching .clip{
      animation:detachClip .9s ease-in forwards;
    }

    @keyframes attachPhoto{
      0%{
        opacity:0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(.96);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--photo-rest-rot))
          scale(1);
      }
    }

    @keyframes attachClip{
      0%{
        opacity:0;
        transform:
          translate(-50%, 0)
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(.96);
      }
      100%{
        opacity:1;
        transform:
          translate(-50%, 0)
          translate(var(--clip-final-x), var(--clip-final-y))
          rotate(var(--clip-rest-rot))
          scale(1);
      }
    }

    @keyframes swayPhotoDamped{
      0%{
        transform:translate(0,0) rotate(var(--photo-rest-rot));
      }
      10%{
        transform:translate(var(--sx1), var(--sy1)) rotate(calc(var(--photo-rest-rot) + var(--sr1)));
      }
      22%{
        transform:translate(var(--sx2), var(--sy2)) rotate(calc(var(--photo-rest-rot) - var(--sr2)));
      }
      35%{
        transform:translate(var(--sx3), var(--sy3)) rotate(calc(var(--photo-rest-rot) + var(--sr3)));
      }
      50%{
        transform:translate(var(--sx4), var(--sy4)) rotate(calc(var(--photo-rest-rot) - var(--sr4)));
      }
      66%{
        transform:translate(var(--sx5), var(--sy5)) rotate(calc(var(--photo-rest-rot) + var(--sr5)));
      }
      82%{
        transform:translate(var(--sx6), var(--sy6)) rotate(calc(var(--photo-rest-rot) - var(--sr6)));
      }
      100%{
        transform:translate(0,0) rotate(var(--photo-rest-rot));
      }
    }

    @keyframes detachPhoto{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--photo-rest-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--photo-end-x), 150px)
          rotate(calc(var(--photo-rest-rot) + var(--photo-end-rot)))
          scale(.94);
      }
    }

    @keyframes detachClip{
      0%{
        opacity:1;
        transform:
          translate(-50%, 0)
          translate(var(--clip-final-x), var(--clip-final-y))
          rotate(var(--clip-rest-rot))
          scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(-50%, 0)
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rest-rot) + var(--clip-end-rot)))
          scale(.92);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell">
      <div class="stage" id="stage">
        <div id="bgLayer" class="bg-layer"></div>
        <div id="emptyNote" class="empty-note">Noch keine Bilder in der Fotowand gefunden.</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button id="btn43" class="control-btn" type="button">4:3</button>
    <button id="btn169" class="control-btn active" type="button">16:9</button>
    <button id="btn1610" class="control-btn" type="button">16:10</button>
    <button id="btn75" class="control-btn" type="button">7:5</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const bgLayer = document.getElementById("bgLayer");
    const emptyNote = document.getElementById("emptyNote");
    const controls = document.getElementById("controls");

    const btn43 = document.getElementById("btn43");
    const btn169 = document.getElementById("btn169");
    const btn1610 = document.getElementById("btn1610");
    const btn75 = document.getElementById("btn75");

    const REPO_BASE = "/ellies-fotochallenge/";
    const CACHE_BUSTER = "v=20260307_fix_faden2";

    function assetUrl(filename){
      return `${window.location.origin}${REPO_BASE}assets/${filename}?${CACHE_BUSTER}`;
    }

    const BG_IMAGE = assetUrl("bg_16_9.png");
    const GUIDE_IMAGE = assetUrl("bg_16_9_Fadenposition.png");

    const CLIP_IMAGES = [
      assetUrl("klammer1_uhd.png"),
      assetUrl("klammer2_uhd.png"),
      assetUrl("klammer3_uhd.png")
    ];

    const aspectMap = {
      "4:3":   { num:4,  den:3  },
      "16:9":  { num:16, den:9  },
      "16:10": { num:16, den:10 },
      "7:5":   { num:7,  den:5  }
    };

    const allAssets = [];
    const assetIds = new Set();
    const currentCards = [];
    const recentlyShown = [];
    const MAX_RECENT_TRACK = 36;

    const MIN_VISIBLE = 2;
    const MAX_VISIBLE = 5;

    let currentFormat = "16:9";
    let nextTimer = null;
    let fetchTimer = null;
    let guideReady = false;
    let ropeModel = null;
    let cycleCounter = 0;

    function rand(min,max){ return Math.random()*(max-min)+min; }
    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function clamp(v,min,max){ return Math.max(min, Math.min(max,v)); }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function requestFullscreen(){
      const el = document.documentElement;
      if(!document.fullscreenElement){
        if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
      }
    }

    function updateControlsVisibility(){
      if(document.fullscreenElement){
        controls.classList.add("hidden");
      }else{
        controls.classList.remove("hidden");
      }
    }

    document.addEventListener("fullscreenchange", updateControlsVisibility);

    async function preloadImage(url){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    async function setFormat(format){
      currentFormat = format;
      const cfg = aspectMap[format];
      document.documentElement.style.setProperty("--aspect-num", String(cfg.num));
      document.documentElement.style.setProperty("--aspect-den", String(cfg.den));

      const bg = await preloadImage(BG_IMAGE);
      bgLayer.style.backgroundImage = bg ? `url("${BG_IMAGE}")` : "none";

      btn43.classList.toggle("active", format === "4:3");
      btn169.classList.toggle("active", format === "16:9");
      btn1610.classList.toggle("active", format === "16:10");
      btn75.classList.toggle("active", format === "7:5");
    }

    btn43.addEventListener("click", async () => {
      await setFormat("4:3");
      requestFullscreen();
      rebuildWall();
    });
    btn169.addEventListener("click", async () => {
      await setFormat("16:9");
      requestFullscreen();
      rebuildWall();
    });
    btn1610.addEventListener("click", async () => {
      await setFormat("16:10");
      requestFullscreen();
      rebuildWall();
    });
    btn75.addEventListener("click", async () => {
      await setFormat("7:5");
      requestFullscreen();
      rebuildWall();
    });

    function sortByUploadOrder(list){
      return list.sort((a,b) => Number(a.version || 0) - Number(b.version || 0));
    }

    function fetchAssets(){
      return fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`)
        .then(response => {
          if(!response.ok) throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
          return response.json();
        })
        .then(data => {
          const resources = Array.isArray(data.resources) ? data.resources : [];
          const onlyImages = resources.filter(asset => {
            const format = (asset.format || "").toLowerCase();
            return ["jpg","jpeg","png","webp","heic"].includes(format);
          });

          sortByUploadOrder(onlyImages).forEach(asset => {
            if(!assetIds.has(asset.public_id)){
              assetIds.add(asset.public_id);
              allAssets.push(asset);
            }
          });

          emptyNote.style.display = allAssets.length ? "none" : "grid";
        })
        .catch(error => console.error(error));
    }

    function getRecentAssets(limit = 14){
      return [...allAssets]
        .sort((a,b) => Number(b.version || 0) - Number(a.version || 0))
        .slice(0, limit);
    }

    function rememberShown(publicId){
      recentlyShown.push(publicId);
      while(recentlyShown.length > MAX_RECENT_TRACK){
        recentlyShown.shift();
      }
    }

    function getTaskStyle(asset){
      const taskId = asset?.context?.custom?.task_id || "";
      const task = (APP_CONFIG.tasks || []).find(t => t.id === taskId);

      return {
        caption: task?.title || asset?.context?.custom?.caption || "Fotochallenge",
        color: task?.color || "#dbe8f4"
      };
    }

    function getOrientation(asset){
      const ratio = Math.max(0.1, Number(asset.width || 1) / Number(asset.height || 1));
      if(ratio > 1.18) return "landscape";
      if(ratio < 0.86) return "portrait";
      return "square";
    }

    async function buildGuideModel(){
      const guideImg = await preloadImage(GUIDE_IMAGE);
      if(!guideImg){
        guideReady = false;
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = guideImg.naturalWidth;
      canvas.height = guideImg.naturalHeight;
      const ctx = canvas.getContext("2d", { willReadFrequently:true });
      ctx.drawImage(guideImg, 0, 0);

      const w = canvas.width;
      const h = canvas.height;
      const imgData = ctx.getImageData(0, 0, w, h).data;

      function isGreen(idx){
        const r = imgData[idx];
        const g = imgData[idx + 1];
        const b = imgData[idx + 2];
        return g > 120 && g > r + 35 && g > b + 35;
      }

      const rows = [
        { name:"top",    yMin:0.00, yMax:0.26 },
        { name:"middle", yMin:0.26, yMax:0.57 },
        { name:"bottom", yMin:0.57, yMax:0.90 }
      ];

      const result = {};

      rows.forEach(row => {
        const points = [];
        const y1 = Math.floor(h * row.yMin);
        const y2 = Math.floor(h * row.yMax);

        for(let x = 0; x < w; x += 4){
          let foundY = null;
          for(let y = y1; y < y2; y++){
            const idx = (y * w + x) * 4;
            if(isGreen(idx)){
              foundY = y;
              break;
            }
          }
          if(foundY !== null){
            points.push({ x: x / w, y: foundY / h });
          }
        }

        if(!points.length) return;

        result[row.name] = function(xNorm){
          let nearest = points[0];
          let best = Math.abs(points[0].x - xNorm);

          for(let i = 1; i < points.length; i++){
            const d = Math.abs(points[i].x - xNorm);
            if(d < best){
              best = d;
              nearest = points[i];
            }
          }
          return nearest.y;
        };
      });

      ropeModel = result;
      guideReady = !!(result.top && result.middle && result.bottom);
    }

    function ropeY(rowName, xNorm){
      if(guideReady && ropeModel?.[rowName]){
        return ropeModel[rowName](xNorm);
      }

      if(rowName === "top"){
        return 0.075 + 0.26 * Math.pow(xNorm - 0.5, 2);
      }
      if(rowName === "middle"){
        return 0.385 + 0.30 * Math.pow(xNorm - 0.5, 2);
      }
      return 0.695 + 0.31 * Math.pow(xNorm - 0.5, 2);
    }

    function buildAnchors(){
      return [
        { id:"t1", row:"top",    x:0.12 },
        { id:"t2", row:"top",    x:0.30 },
        { id:"t3", row:"top",    x:0.49 },
        { id:"t4", row:"top",    x:0.69 },
        { id:"t5", row:"top",    x:0.86 },

        { id:"m1", row:"middle", x:0.13 },
        { id:"m2", row:"middle", x:0.31 },
        { id:"m3", row:"middle", x:0.49 },
        { id:"m4", row:"middle", x:0.68 },
        { id:"m5", row:"middle", x:0.85 },

        { id:"b1", row:"bottom", x:0.13 },
        { id:"b2", row:"bottom", x:0.31 },
        { id:"b3", row:"bottom", x:0.49 },
        { id:"b4", row:"bottom", x:0.68 },
        { id:"b5", row:"bottom", x:0.85 }
      ].map(a => ({
        ...a,
        y: ropeY(a.row, a.x)
      }));
    }

    function availableResources(extraExcluded = []){
      const currentIds = new Set(currentCards.map(c => c.asset.public_id));
      const excluded = new Set([...currentIds, ...extraExcluded]);

      const recents = getRecentAssets().filter(a => !excluded.has(a.public_id));
      const older = shuffle(
        allAssets.filter(a => !excluded.has(a.public_id) && !recentlyShown.includes(a.public_id))
      );
      const fallback = shuffle(
        allAssets.filter(a => !excluded.has(a.public_id))
      );

      return [...recents, ...older, ...fallback].filter((a, i, arr) =>
        arr.findIndex(b => b.public_id === a.public_id) === i
      );
    }

    function estimateTextWidth(text, fontPx){
      return text.length * fontPx * 0.55;
    }

    function getStageSize(){
      return {
        w: stage.clientWidth,
        h: stage.clientHeight
      };
    }

    function computeCardSize(asset, captionText){
      const { w:stageW, h:stageH } = getStageSize();
      const orientation = getOrientation(asset);
      const ratio = Math.max(0.25, Math.min(3.5, Number(asset.width || 1) / Number(asset.height || 1)));

      let photoW, photoH, minCardW, maxCardW, maxCardH;

      if(orientation === "landscape"){
        photoW = stageW * 0.19;
        photoH = photoW / ratio;
        minCardW = stageW * 0.14;
        maxCardW = stageW * 0.23;
        maxCardH = stageH * 0.24;
      }else if(orientation === "portrait"){
        photoH = stageH * 0.23;
        photoW = photoH * ratio;
        minCardW = stageW * 0.11;
        maxCardW = stageW * 0.18;
        maxCardH = stageH * 0.34;
      }else{
        photoW = stageW * 0.155;
        photoH = photoW;
        minCardW = stageW * 0.12;
        maxCardW = stageW * 0.19;
        maxCardH = stageH * 0.27;
      }

      const whiteBorder = Math.round(stageW * 0.0032);
      const innerPadX = Math.round(stageW * 0.0034);
      const innerPadTop = Math.round(stageH * 0.0035);

      let cardW = Math.max(minCardW, photoW + innerPadX * 2);
      let fontPx = clamp(cardW * 0.048, 14, 22);
      let neededW = estimateTextWidth(captionText, fontPx) / 2 + stageW * 0.018;

      cardW = clamp(Math.max(cardW, neededW), minCardW, maxCardW);
      fontPx = clamp(cardW * 0.048, 14, 22);

      const captionH = Math.round(fontPx * 2.35);
      let cardH = Math.round(whiteBorder * 2 + innerPadTop + photoH + captionH);

      if(cardH > maxCardH){
        const scale = maxCardH / cardH;
        photoW *= scale;
        photoH *= scale;
        cardW = clamp(cardW * scale, minCardW * 0.95, maxCardW);
        fontPx = clamp(cardW * 0.046, 13, 20);
        cardH = Math.round(whiteBorder * 2 + innerPadTop + photoH + Math.round(fontPx * 2.3));
      }

      const clipH = Math.round(stageH * 0.11 * 1.5);

      return {
        orientation,
        whiteBorder,
        innerPadX,
        innerPadTop,
        photoW: Math.round(photoW),
        photoH: Math.round(photoH),
        cardW: Math.round(cardW),
        cardH: Math.round(cardH),
        captionH: Math.round(fontPx * 2.3),
        fontPx: Math.round(fontPx),
        clipH
      };
    }

    function anchorPreference(anchor, orientation){
      if(orientation === "portrait"){
        if(anchor.row === "bottom") return -100;
        if(anchor.row === "middle") return 5;
        return 10;
      }
      if(orientation === "landscape"){
        if(anchor.row === "middle") return 10;
        if(anchor.row === "top") return 7;
        return 4;
      }
      if(anchor.row === "middle") return 9;
      if(anchor.row === "top") return 7;
      return 5;
    }

    function getTopLeft(anchor, metrics){
      const { w, h } = getStageSize();
      const ropePxX = anchor.x * w;
      const ropePxY = anchor.y * h;

      const clipAnchorY = metrics.clipH * 0.72;
      const cardTop = ropePxY - clipAnchorY;

      return {
        x: ropePxX - metrics.cardW / 2,
        y: cardTop
      };
    }

    function getBBox(x, y, w, h, angleDeg){
      const a = Math.abs(angleDeg) * Math.PI / 180;
      const bw = Math.abs(Math.cos(a) * w) + Math.abs(Math.sin(a) * h);
      const bh = Math.abs(Math.sin(a) * w) + Math.abs(Math.cos(a) * h);

      return {
        left: x - (bw - w) / 2,
        top: y - (bh - h) / 2,
        right: x + w + (bw - w) / 2,
        bottom: y + h + (bh - h) / 2
      };
    }

    function rectIntersection(a, b){
      const x = Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
      const y = Math.max(0, Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top));
      return x * y;
    }

    function choosePlacement(asset, reserved = []){
      const anchors = shuffle(buildAnchors())
        .filter(a => !currentCards.some(c => c.anchorId === a.id))
        .filter(a => !reserved.some(r => r.anchorId === a.id));

      const style = getTaskStyle(asset);
      const metrics = computeCardSize(asset, style.caption);
      const { w:stageW, h:stageH } = getStageSize();
      const orientation = metrics.orientation;

      let best = null;
      let bestScore = -Infinity;

      for(const anchor of anchors){
        const angleBase =
          orientation === "portrait" ? rand(-7, 7) :
          orientation === "landscape" ? rand(-6, 6) :
          rand(-7, 7);

        const pos = getTopLeft(anchor, metrics);
        const bbox = getBBox(pos.x, pos.y, metrics.cardW, metrics.cardH, angleBase);

        if(bbox.left < 6 || bbox.right > stageW - 6) continue;
        if(bbox.top < 6) continue;
        if(bbox.bottom > stageH - 8) continue;

        const area = (bbox.right - bbox.left) * (bbox.bottom - bbox.top);

        let overlapPenalty = 0;
        let collision = false;

        const others = [
          ...currentCards.map(c => ({ bbox:c.bbox, area:c.area, orientation:c.orientation })),
          ...reserved.map(r => ({ bbox:r.bbox, area:r.area, orientation:r.orientation }))
        ];

        for(const o of others){
          const inter = rectIntersection(bbox, o.bbox);
          const share = inter / Math.min(area, o.area);

          if(share > 0.10){
            collision = true;
            break;
          }

          overlapPenalty += share * 140;

          if(orientation === "landscape" && o.orientation === "landscape"){
            const sameRow = Math.abs(anchor.y - ((o.anchor?.y) || anchor.y)) < 0.06;
            if(sameRow) overlapPenalty += 4;
          }

          if(orientation === "portrait" && o.orientation === "portrait"){
            overlapPenalty += 2;
          }
        }

        if(collision) continue;

        const score =
          100
          + anchorPreference(anchor, orientation) * 10
          - overlapPenalty
          + rand(0, 8);

        if(score > bestScore){
          bestScore = score;
          best = {
            anchorId: anchor.id,
            anchor,
            x: pos.x,
            y: pos.y,
            angle: angleBase,
            bbox,
            area,
            metrics,
            orientation
          };
        }
      }

      return best;
    }

    function createCard(asset, placement){
      const style = getTaskStyle(asset);
      const m = placement.metrics;

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card attaching";
      wrapper.style.left = `${placement.x}px`;
      wrapper.style.top = `${placement.y}px`;
      wrapper.style.width = `${m.cardW}px`;
      wrapper.style.height = `${m.cardH}px`;

      const frame = document.createElement("div");
      frame.className = "photo-frame";
      frame.style.width = `${m.cardW}px`;
      frame.style.height = `${m.cardH}px`;
      frame.style.border = `${m.whiteBorder}px solid rgba(255,255,255,.98)`;
      frame.style.setProperty("--photo-rest-rot", `${placement.angle}deg`);

      const inner = document.createElement("div");
      inner.className = "frame-inner";
      inner.style.background = style.color;
      inner.style.padding = `${m.innerPadTop}px ${m.innerPadX}px 0`;

      const mediaWrap = document.createElement("div");
      mediaWrap.className = "media-wrap";
      mediaWrap.style.height = `${m.photoH}px`;

      const img = document.createElement("img");
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_2600,h_2600,q_auto,f_auto/${asset.public_id}`;
      img.alt = style.caption;
      img.style.width = `${m.photoW}px`;
      img.style.height = `${m.photoH}px`;

      const caption = document.createElement("div");
      caption.className = "caption";
      caption.style.background = style.color;
      caption.style.minHeight = `${m.captionH}px`;
      caption.style.maxHeight = `${m.captionH}px`;
      caption.style.fontSize = `${m.fontPx}px`;

      const captionText = document.createElement("div");
      captionText.className = "caption-text";
      captionText.textContent = style.caption;

      mediaWrap.appendChild(img);
      caption.appendChild(captionText);
      inner.appendChild(mediaWrap);
      inner.appendChild(caption);
      frame.appendChild(inner);

      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = pick(CLIP_IMAGES);
      clip.alt = "";
      clip.style.height = `${m.clipH}px`;

      const clipX = rand(-m.cardW * 0.06, m.cardW * 0.06);
      const clipY = -m.clipH * 0.82;
      const clipRot = rand(-8, 8);

      clip.style.setProperty("--clip-final-x", `${clipX}px`);
      clip.style.setProperty("--clip-final-y", `${clipY}px`);
      clip.style.setProperty("--clip-rest-rot", `${clipRot}deg`);

      wrapper.style.setProperty("--photo-rest-rot", `${placement.angle}deg`);
      wrapper.style.setProperty("--photo-start-x", `${rand(-8, 8).toFixed(1)}px`);
      wrapper.style.setProperty("--photo-start-y", `${rand(18, 34).toFixed(1)}px`);
      wrapper.style.setProperty("--photo-start-rot", `${(placement.angle + rand(-2.4,2.4)).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-start-x", `${(clipX + rand(-22, 22)).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-start-y", `${(-m.clipH * rand(1.65, 2.15)).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-start-rot", `${(clipRot + rand(-10,10)).toFixed(2)}deg`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-18,18).toFixed(1)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-12,12).toFixed(2)}deg`);
      wrapper.style.setProperty("--clip-end-x", `${rand(-16,16).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-end-y", `${(-m.clipH * rand(0.6, 1.05)).toFixed(1)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-12,12).toFixed(2)}deg`);

      const swayBase = rand(1.8, 2.25);
      wrapper.style.setProperty("--sway-duration", `${swayBase.toFixed(2)}s`);
      wrapper.style.setProperty("--sr1", `${rand(2.1,3.1).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr2", `${rand(1.45,2.15).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr3", `${rand(0.85,1.45).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr4", `${rand(0.45,0.85).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr5", `${rand(0.20,0.42).toFixed(2)}deg`);
      wrapper.style.setProperty("--sr6", `${rand(0.08,0.20).toFixed(2)}deg`);

      wrapper.style.setProperty("--sx1", `${rand(-1.8,1.8).toFixed(2)}px`);
      wrapper.style.setProperty("--sy1", `${rand(-0.9,0.9).toFixed(2)}px`);
      wrapper.style.setProperty("--sx2", `${rand(-1.4,1.4).toFixed(2)}px`);
      wrapper.style.setProperty("--sy2", `${rand(-0.6,0.6).toFixed(2)}px`);
      wrapper.style.setProperty("--sx3", `${rand(-1.0,1.0).toFixed(2)}px`);
      wrapper.style.setProperty("--sy3", `${rand(-0.4,0.4).toFixed(2)}px`);
      wrapper.style.setProperty("--sx4", `${rand(-0.55,0.55).toFixed(2)}px`);
      wrapper.style.setProperty("--sy4", `${rand(-0.25,0.25).toFixed(2)}px`);
      wrapper.style.setProperty("--sx5", `${rand(-0.25,0.25).toFixed(2)}px`);
      wrapper.style.setProperty("--sy5", `${rand(-0.12,0.12).toFixed(2)}px`);
      wrapper.style.setProperty("--sx6", `${rand(-0.12,0.12).toFixed(2)}px`);
      wrapper.style.setProperty("--sy6", `${rand(-0.06,0.06).toFixed(2)}px`);

      wrapper.appendChild(frame);
      wrapper.appendChild(clip);
      stage.appendChild(wrapper);

      const cardObj = {
        asset,
        anchorId: placement.anchorId,
        anchor: placement.anchor,
        bbox: placement.bbox,
        area: placement.area,
        orientation: placement.orientation,
        el: wrapper,
        frame,
        clip,
        mountedAt: Date.now()
      };

      wrapper.addEventListener("animationend", (ev) => {
        if(ev.animationName === "attachPhoto"){
          wrapper.classList.remove("attaching");
          wrapper.classList.add("swinging");
          setTimeout(() => wrapper.classList.remove("swinging"), Math.round(swayBase * 1000) + 180);
        }
      });

      currentCards.push(cardObj);
      rememberShown(asset.public_id);
      return cardObj;
    }

    function detachCard(cardObj){
      return new Promise(resolve => {
        cardObj.el.classList.remove("attaching", "swinging");
        cardObj.el.classList.add("detaching");

        setTimeout(() => {
          cardObj.el.remove();
          const idx = currentCards.indexOf(cardObj);
          if(idx >= 0) currentCards.splice(idx, 1);
          resolve(cardObj.anchor);
        }, 1100);
      });
    }

    function chooseInitialCount(){
      if(allAssets.length >= 5) return 4;
      if(allAssets.length === 4) return 4;
      if(allAssets.length === 3) return 3;
      return Math.max(2, allAssets.length);
    }

    function oldestCards(count){
      return [...currentCards]
        .sort((a,b) => a.mountedAt - b.mountedAt)
        .slice(0, count);
    }

    function chooseExchangePlan(){
      const cur = currentCards.length;
      const plans = [
        { remove:1, add:1 },
        { remove:1, add:2 },
        { remove:2, add:1 },
        { remove:2, add:2 }
      ];

      const valid = plans.filter(p => {
        const next = cur - p.remove + p.add;
        return next >= MIN_VISIBLE && next <= MAX_VISIBLE;
      });

      return pick(valid);
    }

    async function initialRender(){
      if(!allAssets.length){
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const count = chooseInitialCount();
      const pool = availableResources();
      const reserved = [];
      const chosenIds = [];

      for(let i = 0; i < pool.length && reserved.length < count; i++){
        const asset = pool[i];
        const placement = choosePlacement(asset, reserved);
        if(!placement) continue;
        reserved.push(placement);
        chosenIds.push(asset.public_id);
        createCard(asset, placement);
      }
    }

    function scheduleNextCycle(delayMs){
      clearTimeout(nextTimer);
      nextTimer = setTimeout(runCycle, delayMs);
    }

    async function runCycle(){
      cycleCounter++;

      if(!allAssets.length){
        scheduleNextCycle(5000);
        return;
      }

      if(currentCards.length < MIN_VISIBLE){
        const pool = availableResources();
        const need = MIN_VISIBLE - currentCards.length;
        const reserved = [];
        let added = 0;

        for(let i = 0; i < pool.length && added < need; i++){
          const asset = pool[i];
          const placement = choosePlacement(asset, reserved);
          if(!placement) continue;
          reserved.push(placement);
          setTimeout(() => createCard(asset, placement), added * 500);
          added++;
        }

        scheduleNextCycle(8000);
        return;
      }

      const plan = chooseExchangePlan();
      const toRemove = oldestCards(plan.remove);
      await Promise.all(toRemove.map(detachCard));

      await new Promise(resolve => setTimeout(resolve, 1400));

      const pool = availableResources();
      const reserved = [];
      let added = 0;

      for(let i = 0; i < pool.length && added < plan.add; i++){
        const asset = pool[i];
        const placement = choosePlacement(asset, reserved);
        if(!placement) continue;
        reserved.push(placement);

        setTimeout(() => createCard(asset, placement), added * 500);
        added++;
      }

      const delay = plan.add === 2 ? 10000 : 5000;
      scheduleNextCycle(delay);
    }

    async function rebuildWall(){
      clearTimeout(nextTimer);
      while(currentCards.length){
        currentCards.pop().el.remove();
      }
      await initialRender();
      scheduleNextCycle(8000);
    }

    async function boot(){
      await setFormat("16:9");
      await buildGuideModel();
      await fetchAssets();
      await initialRender();
      fetchTimer = setInterval(fetchAssets, 10000);
      scheduleNextCycle(8000);
      updateControlsVisibility();
    }

    boot();
  </script>
