<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    :root {
      --bg1: #242424;
      --bg2: #2c2c2c;
      --tape: rgba(202, 171, 122, 0.82);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.42);
      --polaroid: #ffffff;
      --safe-top: 18px;
      --safe-side: 24px;
      --safe-bottom: 22px;
      --card-width: 330px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #3b3b3b 0%, transparent 28%),
        radial-gradient(circle at bottom right, #353535 0%, transparent 24%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
    }

    body {
      position: relative;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .empty-note {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.72);
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      text-align: center;
      padding: 24px;
      z-index: 5;
    }

    .controls {
      position: absolute;
      top: 12px;
      right: 14px;
      z-index: 50;
      display: flex;
      gap: 10px;
      align-items: center;
      opacity: 0.88;
    }

    .control-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.16);
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      backdrop-filter: blur(5px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .control-btn:hover {
      opacity: 1;
      transform: translateY(-1px);
    }

    .polaroid {
      position: absolute;
      width: var(--card-width);
      background: var(--polaroid);
      border-radius: 4px;
      padding: 12px 12px 84px 12px;
      box-shadow: var(--shadow);
      transform-origin: center center;
      opacity: 0;
      transition:
        left 1.1s ease,
        top 1.1s ease,
        transform 1.1s ease,
        opacity 0.9s ease;
    }

    .polaroid.show {
      opacity: 1;
    }

    .tape {
      position: absolute;
      top: -10px;
      left: 50%;
      width: 104px;
      height: 24px;
      transform: translateX(-50%) rotate(-6deg);
      background: var(--tape);
      opacity: 0.92;
      border-radius: 2px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      z-index: 3;
    }

    .photo-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #111;
      overflow: hidden;
      border: 12px solid #ffffff;
      border-bottom: 0;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .caption-box {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      min-height: 60px;
      max-height: 72px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      line-height: 1.18;
      font-size: 0.98rem;
      border-radius: 0 0 3px 3px;
      color: #111;
      overflow: hidden;
    }

    @media (max-width: 1600px) {
      :root { --card-width: 305px; }
    }

    @media (max-width: 1350px) {
      :root { --card-width: 280px; }
      .caption-box { font-size: 0.93rem; }
    }

    @media (max-width: 1100px) {
      :root { --card-width: 245px; }
      .caption-box { font-size: 0.88rem; min-height: 56px; }
    }
  </style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="controls">
      <button id="fullscreenBtn" class="control-btn" type="button">Vollbild</button>
    </div>

    <div class="empty-note" id="emptyNote">
      Noch keine Bilder in der Diashow gefunden.
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const emptyNote = document.getElementById("emptyNote");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    const assets = [];
    const assetIds = new Set();
    let cycleIndex = 0;

    // 20 Layoutmuster für 5 Bilder
    const patterns = [
      [
        { left: 4,  top: 3,  angle: -7 },
        { left: 30, top: 1,  angle: 5  },
        { left: 59, top: 4,  angle: -4 },
        { left: 15, top: 46, angle: 6  },
        { left: 50, top: 47, angle: -6 }
      ],
      [
        { left: 8,  top: 6,  angle: -5 },
        { left: 35, top: 4,  angle: 7  },
        { left: 64, top: 6,  angle: -7 },
        { left: 22, top: 49, angle: 5  },
        { left: 52, top: 46, angle: -4 }
      ],
      [
        { left: 5,  top: 10, angle: -8 },
        { left: 33, top: 5,  angle: 4  },
        { left: 60, top: 8,  angle: -5 },
        { left: 12, top: 50, angle: 7  },
        { left: 48, top: 51, angle: -7 }
      ],
      [
        { left: 6,  top: 2,  angle: -6 },
        { left: 38, top: 6,  angle: 6  },
        { left: 66, top: 2,  angle: -4 },
        { left: 18, top: 48, angle: 8  },
        { left: 55, top: 50, angle: -5 }
      ],
      [
        { left: 10, top: 5,  angle: -4 },
        { left: 39, top: 1,  angle: 4  },
        { left: 63, top: 8,  angle: -8 },
        { left: 20, top: 47, angle: 5  },
        { left: 49, top: 52, angle: -4 }
      ],
      [
        { left: 4,  top: 7,  angle: -9 },
        { left: 29, top: 3,  angle: 4  },
        { left: 57, top: 5,  angle: -3 },
        { left: 14, top: 47, angle: 7  },
        { left: 47, top: 46, angle: -8 }
      ],
      [
        { left: 7,  top: 4,  angle: -4 },
        { left: 34, top: 7,  angle: 7  },
        { left: 62, top: 3,  angle: -6 },
        { left: 11, top: 50, angle: 6  },
        { left: 51, top: 48, angle: -5 }
      ],
      [
        { left: 9,  top: 2,  angle: -7 },
        { left: 36, top: 5,  angle: 5  },
        { left: 60, top: 1,  angle: -3 },
        { left: 18, top: 51, angle: 8  },
        { left: 54, top: 50, angle: -7 }
      ],
      [
        { left: 5,  top: 5,  angle: -5 },
        { left: 31, top: 2,  angle: 6  },
        { left: 61, top: 7,  angle: -7 },
        { left: 16, top: 47, angle: 4  },
        { left: 53, top: 47, angle: -5 }
      ],
      [
        { left: 8,  top: 8,  angle: -8 },
        { left: 40, top: 3,  angle: 3  },
        { left: 66, top: 6,  angle: -4 },
        { left: 21, top: 51, angle: 5  },
        { left: 56, top: 49, angle: -8 }
      ],
      [
        { left: 3,  top: 4,  angle: -6 },
        { left: 28, top: 7,  angle: 5  },
        { left: 58, top: 4,  angle: -6 },
        { left: 13, top: 52, angle: 7  },
        { left: 48, top: 48, angle: -4 }
      ],
      [
        { left: 7,  top: 1,  angle: -5 },
        { left: 33, top: 4,  angle: 7  },
        { left: 63, top: 2,  angle: -5 },
        { left: 17, top: 46, angle: 6  },
        { left: 52, top: 52, angle: -7 }
      ],
      [
        { left: 11, top: 4,  angle: -7 },
        { left: 38, top: 8,  angle: 4  },
        { left: 65, top: 5,  angle: -8 },
        { left: 24, top: 49, angle: 5  },
        { left: 55, top: 45, angle: -4 }
      ],
      [
        { left: 4,  top: 6,  angle: -4 },
        { left: 30, top: 2,  angle: 5  },
        { left: 58, top: 7,  angle: -6 },
        { left: 16, top: 48, angle: 8  },
        { left: 46, top: 51, angle: -6 }
      ],
      [
        { left: 6,  top: 3,  angle: -8 },
        { left: 35, top: 1,  angle: 3  },
        { left: 62, top: 4,  angle: -4 },
        { left: 20, top: 50, angle: 5  },
        { left: 50, top: 49, angle: -8 }
      ],
      [
        { left: 10, top: 2,  angle: -5 },
        { left: 41, top: 4,  angle: 6  },
        { left: 67, top: 3,  angle: -7 },
        { left: 25, top: 48, angle: 4  },
        { left: 57, top: 51, angle: -5 }
      ],
      [
        { left: 5,  top: 9,  angle: -7 },
        { left: 33, top: 5,  angle: 5  },
        { left: 61, top: 9,  angle: -4 },
        { left: 14, top: 50, angle: 6  },
        { left: 48, top: 46, angle: -7 }
      ],
      [
        { left: 8,  top: 5,  angle: -6 },
        { left: 37, top: 2,  angle: 7  },
        { left: 64, top: 7,  angle: -5 },
        { left: 19, top: 47, angle: 8  },
        { left: 53, top: 50, angle: -4 }
      ],
      [
        { left: 4,  top: 2,  angle: -5 },
        { left: 29, top: 6,  angle: 4  },
        { left: 59, top: 2,  angle: -8 },
        { left: 12, top: 49, angle: 6  },
        { left: 47, top: 52, angle: -6 }
      ],
      [
        { left: 9,  top: 4,  angle: -8 },
        { left: 36, top: 1,  angle: 5  },
        { left: 66, top: 5,  angle: -3 },
        { left: 22, top: 50, angle: 5  },
        { left: 56, top: 48, angle: -8 }
      ]
    ];

    let previousPatternIndex = -1;

    function requestFullscreen() {
      const el = document.documentElement;
      if (el.requestFullscreen) {
        el.requestFullscreen();
      } else if (el.webkitRequestFullscreen) {
        el.webkitRequestFullscreen();
      } else if (el.msRequestFullscreen) {
        el.msRequestFullscreen();
      }
    }

    fullscreenBtn.addEventListener("click", requestFullscreen);

    function getTaskStyle(asset) {
      const taskId = asset?.context?.custom?.task_id || "";
      const task = APP_CONFIG.tasks.find(t => t.id === taskId);

      return {
        caption: asset?.context?.custom?.caption || "Fotochallenge",
        color: task?.color || "#f3f3f3"
      };
    }

    function sortByUploadOrder(list) {
      return list.sort((a, b) => {
        const va = Number(a.version || 0);
        const vb = Number(b.version || 0);
        return va - vb;
      });
    }

    function fetchAssets() {
      fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`)
        .then(response => {
          if (!response.ok) {
            throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
          }
          return response.json();
        })
        .then(data => {
          const resources = Array.isArray(data.resources) ? data.resources : [];

          const onlyImages = resources.filter(asset => {
            const format = (asset.format || "").toLowerCase();
            return ["jpg", "jpeg", "png", "webp", "heic"].includes(format);
          });

          sortByUploadOrder(onlyImages).forEach(asset => {
            if (!assetIds.has(asset.public_id)) {
              assetIds.add(asset.public_id);
              assets.push(asset);
            }
          });

          if (assets.length > 0) {
            emptyNote.style.display = "none";
          }
        })
        .catch(error => {
          console.error(error);
        });
    }

    function choosePattern() {
      if (patterns.length === 1) return patterns[0];

      let idx = Math.floor(Math.random() * patterns.length);
      while (idx === previousPatternIndex) {
        idx = Math.floor(Math.random() * patterns.length);
      }
      previousPatternIndex = idx;
      return patterns[idx];
    }

    function createCard(asset, slot) {
      const style = getTaskStyle(asset);

      const card = document.createElement("div");
      card.className = "polaroid";
      card.style.left = `${slot.left}%`;
      card.style.top = `${slot.top}%`;
      card.style.transform = `rotate(${slot.angle}deg)`;

      const tape = document.createElement("div");
      tape.className = "tape";

      const photoWrap = document.createElement("div");
      photoWrap.className = "photo-wrap";
      photoWrap.style.borderColor = style.color;

      const img = document.createElement("img");
      img.alt = style.caption;
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_fill,w_1200,h_1200,q_auto,f_auto/${asset.public_id}`;

      const captionBox = document.createElement("div");
      captionBox.className = "caption-box";
      captionBox.style.background = style.color;
      captionBox.textContent = style.caption;

      photoWrap.appendChild(img);
      card.appendChild(tape);
      card.appendChild(photoWrap);
      card.appendChild(captionBox);
      stage.appendChild(card);

      requestAnimationFrame(() => {
        card.classList.add("show");
      });

      return card;
    }

    function clearCards() {
      const oldCards = Array.from(document.querySelectorAll(".polaroid"));
      oldCards.forEach(card => {
        card.classList.remove("show");
        setTimeout(() => card.remove(), 900);
      });
    }

    function renderWindow() {
      clearCards();

      if (assets.length === 0) {
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const visibleCount = Math.min(5, assets.length);
      const pattern = choosePattern();

      for (let i = 0; i < visibleCount; i++) {
        const asset = assets[(cycleIndex + i) % assets.length];
        createCard(asset, pattern[i]);
      }

      cycleIndex = (cycleIndex + 1) % assets.length;
    }

    fetchAssets();
    setTimeout(renderWindow, 1200);

    // alle 10 Sekunden nach neuen Uploads schauen
    setInterval(fetchAssets, 10000);

    // alle 30 Sekunden neues 5er-Fenster
    setInterval(renderWindow, 30000);
  </script>
</body>
</html>
