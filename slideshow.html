<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&display=swap');

    :root{
      --wall-bg:#e9e4db;
      --shadow:0 10px 28px rgba(0,0,0,.18);
      --caption-text:#111;
      --aspect-num:16;
      --aspect-den:9;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      position:relative;
    }

    .viewport{
      position:fixed;
      inset:0;
      display:grid;
      place-items:center;
      background:#111;
      overflow:hidden;
    }

    .stage-shell{
      position:relative;
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      overflow:hidden;
      background:#111;
    }

    .stage{
      position:relative;
      width:min(100vw, calc(100vh * (var(--aspect-num) / var(--aspect-den))));
      height:min(100vh, calc(100vw * (var(--aspect-den) / var(--aspect-num))));
      overflow:hidden;
      background:var(--wall-bg);
    }

    .bg-layer{
      position:absolute;
      inset:0;
      z-index:1;
      background-color:var(--wall-bg);
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
    }

    .empty-note{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      color:rgba(0,0,0,.45);
      font-size:clamp(1rem,1.8vw,1.45rem);
      text-align:center;
      padding:24px;
      z-index:20;
      pointer-events:none;
    }

    .controls{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:250;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:7px 7px;
      justify-content:end;
      transition:opacity .2s ease;
    }

    .controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .control-btn{
      border:none;
      border-radius:999px;
      padding:7px 12px;
      min-width:62px;
      background:rgba(255,255,255,.52);
      color:#3d3d3d;
      cursor:pointer;
      font-size:.84rem;
      font-weight:700;
      backdrop-filter:blur(4px);
      box-shadow:0 4px 12px rgba(0,0,0,.10);
    }

    .control-btn.active{
      background:rgba(255,255,255,.82);
      color:#1f1f1f;
    }

    .photo-card{
      position:absolute;
      z-index:30;
      pointer-events:none;
      will-change:left, top, width, height;
    }

    .photo-frame{
      position:relative;
      border-radius:2px;
      overflow:visible;
      box-shadow:var(--shadow);
      transform-origin:50% 0%;
      will-change:transform, opacity;
      background:#fff;
    }

    .photo-top{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:#fff;
      border-radius:1px;
    }

    .photo-top img.photo-image{
      display:block;
      width:100%;
      height:100%;
      object-fit:contain;
      background:#fff;
    }

    .caption-strip{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:var(--caption-text);
      font-family:"Kalam","Segoe Print","Trebuchet MS",Arial,sans-serif;
      font-weight:700;
      line-height:1.03;
      letter-spacing:.01em;
      overflow:hidden;
      word-break:break-word;
      hyphens:auto;
    }

    .caption-inner{
      width:100%;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
      overflow:hidden;
    }

    .clip{
      position:absolute;
      z-index:8;
      transform-origin:50% 10%;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      filter:drop-shadow(0 2px 3px rgba(0,0,0,.18));
      will-change:transform, opacity;
    }

    .photo-card.attaching .photo-frame{
      animation:attachPhoto var(--attach-duration,1s) cubic-bezier(.2,.72,.2,1) forwards;
    }

    .photo-card.attaching .clip{
      animation:attachClip var(--attach-duration,1s) cubic-bezier(.2,.72,.2,1) forwards;
    }

    .photo-card.swinging .photo-frame{
      animation:swayPhotoDamped var(--sway-duration,2s) cubic-bezier(.22,.65,.18,1) forwards;
    }

    .photo-card.detaching .photo-frame{
      animation:detachPhoto .95s cubic-bezier(.28,.7,.3,1) forwards;
    }

    .photo-card.detaching .clip{
      animation:detachClip .85s cubic-bezier(.28,.7,.3,1) forwards;
    }

    @keyframes attachPhoto{
      0%{
        opacity:0;
        transform:
          translate(var(--photo-start-x), var(--photo-start-y))
          rotate(var(--photo-start-rot))
          scale(.985);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--photo-rest-rot))
          scale(1);
      }
    }

    @keyframes attachClip{
      0%{
        opacity:0;
        transform:
          translate(var(--clip-start-x), var(--clip-start-y))
          rotate(var(--clip-start-rot))
          scale(.985);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--clip-rest-rot))
          scale(1);
      }
    }

    @keyframes swayPhotoDamped{
      0%{
        transform:translate(0,0) rotate(var(--photo-rest-rot));
      }
      16%{
        transform:translate(var(--sway-x1), var(--sway-y1)) rotate(calc(var(--photo-rest-rot) + var(--sway-r1)));
      }
      32%{
        transform:translate(var(--sway-x2), var(--sway-y2)) rotate(calc(var(--photo-rest-rot) - var(--sway-r2)));
      }
      48%{
        transform:translate(var(--sway-x3), var(--sway-y3)) rotate(calc(var(--photo-rest-rot) + var(--sway-r3)));
      }
      64%{
        transform:translate(var(--sway-x4), var(--sway-y4)) rotate(calc(var(--photo-rest-rot) - var(--sway-r4)));
      }
      80%{
        transform:translate(var(--sway-x5), var(--sway-y5)) rotate(calc(var(--photo-rest-rot) + var(--sway-r5)));
      }
      100%{
        transform:translate(0,0) rotate(var(--photo-final-rot));
      }
    }

    @keyframes detachPhoto{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--photo-final-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--photo-end-x), var(--photo-end-y))
          rotate(calc(var(--photo-final-rot) + var(--photo-end-rot)))
          scale(.985);
      }
    }

    @keyframes detachClip{
      0%{
        opacity:1;
        transform:translate(0,0) rotate(var(--clip-rest-rot)) scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(var(--clip-end-x), var(--clip-end-y))
          rotate(calc(var(--clip-rest-rot) + var(--clip-end-rot)))
          scale(.985);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell">
      <div class="stage" id="stage">
        <div id="bgLayer" class="bg-layer"></div>
        <div id="emptyNote" class="empty-note">Noch keine Bilder in der Fotowand gefunden.</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls">
    <button id="btn43" class="control-btn" type="button">4:3</button>
    <button id="btn75" class="control-btn" type="button">7:5</button>
    <button id="btn169" class="control-btn active" type="button">16:9</button>
    <button id="btn1610" class="control-btn" type="button">16:10</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const bgLayer = document.getElementById("bgLayer");
    const emptyNote = document.getElementById("emptyNote");
    const controls = document.getElementById("controls");

    const btn43 = document.getElementById("btn43");
    const btn75 = document.getElementById("btn75");
    const btn169 = document.getElementById("btn169");
    const btn1610 = document.getElementById("btn1610");

    const REPO_BASE = "/ellies-fotochallenge/";
    const CACHE_BUSTER = "v=20260308b";

    function assetUrl(filename){
      return `${window.location.origin}${REPO_BASE}assets/${filename}?${CACHE_BUSTER}`;
    }

    const BG_IMAGE = assetUrl("bg_16_9.png");
    const BG_GUIDE_IMAGE = assetUrl("bg_16_9_Fadenposition.png"); // nur zur Kalibrierung vorhanden
    const CLIP_IMAGES = [
      assetUrl("klammer1_uhd.png"),
      assetUrl("klammer2_uhd.png"),
      assetUrl("klammer3_uhd.png")
    ];

    const aspectMap = {
      "4:3":   { num:4,  den:3  },
      "7:5":   { num:7,  den:5  },
      "16:9":  { num:16, den:9  },
      "16:10": { num:16, den:10 }
    };

    const allAssets = [];
    const assetIds = new Set();
    const currentCards = [];
    const showCounts = new Map();
    const recentlyShown = [];
    const MAX_RECENT_TRACK = 50;

    let currentFormat = "16:9";
    let nextTimer = null;
    let fetchTimer = null;
    let variantPointer = null;
    let variants = [];

    /*
      Feste Ankerpunkte entlang der Seile.
      anchorX / anchorY = Punkt, an dem die Klammer den Faden schneidet.
      group = grobe Platzgruppe
      wBias = Breitenneigung für den Slot
    */
    const anchors = [
      // oberes Seil
      { id:"t1", row:"top",    anchorX:13.5, anchorY:8.9,  group:"edge",   wBias:0.98 },
      { id:"t2", row:"top",    anchorX:28.5, anchorY:11.3, group:"mid",    wBias:1.00 },
      { id:"t3", row:"top",    anchorX:48.5, anchorY:11.8, group:"mid",    wBias:1.05 },
      { id:"t4", row:"top",    anchorX:67.0, anchorY:11.0, group:"mid",    wBias:1.00 },
      { id:"t5", row:"top",    anchorX:86.0, anchorY:8.8,  group:"edge",   wBias:0.98 },

      // mittleres Seil
      { id:"m1", row:"middle", anchorX:12.5, anchorY:37.2, group:"edge",   wBias:0.98 },
      { id:"m2", row:"middle", anchorX:27.0, anchorY:40.3, group:"mid",    wBias:1.00 },
      { id:"m3", row:"middle", anchorX:43.5, anchorY:41.4, group:"center", wBias:1.03 },
      { id:"m4", row:"middle", anchorX:60.0, anchorY:41.2, group:"center", wBias:1.03 },
      { id:"m5", row:"middle", anchorX:76.0, anchorY:39.1, group:"mid",    wBias:1.00 },
      { id:"m6", row:"middle", anchorX:88.0, anchorY:36.5, group:"edge",   wBias:0.96 },

      // unteres Seil
      { id:"b1", row:"bottom", anchorX:13.0, anchorY:68.0, group:"edge",   wBias:0.98 },
      { id:"b2", row:"bottom", anchorX:28.0, anchorY:72.5, group:"mid",    wBias:1.00 },
      { id:"b3", row:"bottom", anchorX:47.5, anchorY:73.8, group:"center", wBias:1.04 },
      { id:"b4", row:"bottom", anchorX:66.0, anchorY:72.9, group:"center", wBias:1.02 },
      { id:"b5", row:"bottom", anchorX:83.0, anchorY:68.6, group:"mid",    wBias:0.98 }
    ];

    function getAnchor(id){
      return anchors.find(a => a.id === id);
    }

    function rand(min, max){
      return Math.random() * (max - min) + min;
    }

    function clamp(value, min, max){
      return Math.max(min, Math.min(max, value));
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sortByUploadOrder(list){
      return list.sort((a, b) => Number(a.version || 0) - Number(b.version || 0));
    }

    function combinations(arr, k){
      const result = [];
      function run(start, combo){
        if(combo.length === k){
          result.push([...combo]);
          return;
        }
        for(let i = start; i < arr.length; i++){
          combo.push(arr[i]);
          run(i + 1, combo);
          combo.pop();
        }
      }
      run(0, []);
      return result;
    }

    function preloadImage(url){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    async function setFormat(format){
      currentFormat = format;
      const cfg = aspectMap[format];

      document.documentElement.style.setProperty("--aspect-num", String(cfg.num));
      document.documentElement.style.setProperty("--aspect-den", String(cfg.den));

      const ok = await preloadImage(BG_IMAGE);
      bgLayer.style.backgroundImage = ok ? `url("${BG_IMAGE}")` : "none";

      btn43.classList.toggle("active", format === "4:3");
      btn75.classList.toggle("active", format === "7:5");
      btn169.classList.toggle("active", format === "16:9");
      btn1610.classList.toggle("active", format === "16:10");
    }

    function requestFullscreen(){
      const el = document.documentElement;
      if(el.requestFullscreen) el.requestFullscreen();
      else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if(el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function updateControlVisibility(){
      controls.classList.toggle("hidden", !!document.fullscreenElement);
    }

    document.addEventListener("fullscreenchange", updateControlVisibility);
    document.addEventListener("webkitfullscreenchange", updateControlVisibility);

    btn43.addEventListener("click", async () => {
      await setFormat("4:3");
      requestFullscreen();
      await rebuildWall();
    });

    btn75.addEventListener("click", async () => {
      await setFormat("7:5");
      requestFullscreen();
      await rebuildWall();
    });

    btn169.addEventListener("click", async () => {
      await setFormat("16:9");
      requestFullscreen();
      await rebuildWall();
    });

    btn1610.addEventListener("click", async () => {
      await setFormat("16:10");
      requestFullscreen();
      await rebuildWall();
    });

    function getTask(asset){
      const taskId = asset?.context?.custom?.task_id || "";
      const tasks = Array.isArray(APP_CONFIG?.tasks) ? APP_CONFIG.tasks : [];
      return tasks.find(t => t.id === taskId) || null;
    }

    function getCardMeta(asset){
      const task = getTask(asset);
      const caption = (
        asset?.context?.custom?.caption ||
        asset?.context?.custom?.spruch ||
        asset?.context?.caption ||
        "Fotochallenge"
      ).trim();

      return {
        caption,
        color: task?.color || "#dfeaf4"
      };
    }

    function rememberShown(publicId){
      recentlyShown.push(publicId);
      while(recentlyShown.length > MAX_RECENT_TRACK){
        recentlyShown.shift();
      }
    }

    function markShown(publicId){
      showCounts.set(publicId, (showCounts.get(publicId) || 0) + 1);
      rememberShown(publicId);
    }

    function fetchAssets(){
      return fetch(`https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/fotochallenge.json`)
        .then(response => {
          if(!response.ok){
            throw new Error(`Asset-Liste konnte nicht geladen werden (${response.status}).`);
          }
          return response.json();
        })
        .then(data => {
          const resources = Array.isArray(data.resources) ? data.resources : [];
          const onlyImages = resources.filter(asset => {
            const format = String(asset.format || "").toLowerCase();
            return ["jpg","jpeg","png","webp","heic"].includes(format);
          });

          sortByUploadOrder(onlyImages).forEach(asset => {
            if(!assetIds.has(asset.public_id)){
              assetIds.add(asset.public_id);
              allAssets.push(asset);
            }
          });

          if(allAssets.length > 0){
            emptyNote.style.display = "none";
          }
        })
        .catch(error => console.error(error));
    }

    function isFreshAsset(asset){
      const uploadMs = Number(asset.version || 0) * 1000;
      return uploadMs > (Date.now() - 5 * 60 * 1000);
    }

    function getCurrentPublicIds(){
      return new Set(currentCards.map(c => c.asset.public_id));
    }

    function generateVariants(){
      const tops = anchors.filter(a => a.row === "top").map(a => a.id);
      const mids = anchors.filter(a => a.row === "middle").map(a => a.id);
      const bots = anchors.filter(a => a.row === "bottom").map(a => a.id);

      const topPairs = combinations(tops, 2).filter(pair => {
        const a = getAnchor(pair[0]).anchorX;
        const b = getAnchor(pair[1]).anchorX;
        return Math.abs(a - b) >= 17;
      });

      const midPairs = combinations(mids, 2).filter(pair => {
        const a = getAnchor(pair[0]).anchorX;
        const b = getAnchor(pair[1]).anchorX;
        return Math.abs(a - b) >= 16;
      });

      const botPairs = combinations(bots, 2).filter(pair => {
        const a = getAnchor(pair[0]).anchorX;
        const b = getAnchor(pair[1]).anchorX;
        return Math.abs(a - b) >= 17;
      });

      const raw = [];

      // 3er-Varianten
      tops.forEach(t => {
        mids.forEach(m => {
          bots.forEach(b => {
            raw.push([t, m, b]);
          });
        });
      });

      // 4er-Varianten
      topPairs.forEach(tp => {
        mids.forEach(m => {
          bots.forEach(b => raw.push([...tp, m, b]));
        });
      });

      tops.forEach(t => {
        midPairs.forEach(mp => {
          bots.forEach(b => raw.push([t, ...mp, b]));
        });
      });

      tops.forEach(t => {
        mids.forEach(m => {
          botPairs.forEach(bp => raw.push([t, m, ...bp]));
        });
      });

      const unique = new Map();

      raw.forEach(ids => {
        const sortedIds = [...ids].sort();
        const key = sortedIds.join("|");
        if(unique.has(key)) return;

        const rows = sortedIds.map(id => getAnchor(id).row);
        const topCount = rows.filter(r => r === "top").length;
        const midCount = rows.filter(r => r === "middle").length;
        const botCount = rows.filter(r => r === "bottom").length;

        if(sortedIds.length === 3){
          if(!(topCount === 1 && midCount === 1 && botCount === 1)) return;
        }

        if(sortedIds.length === 4){
          const okay =
            (topCount === 2 && midCount === 1 && botCount === 1) ||
            (topCount === 1 && midCount === 2 && botCount === 1) ||
            (topCount === 1 && midCount === 1 && botCount === 2);
          if(!okay) return;
        }

        unique.set(key, { ids: sortedIds });
      });

      const list = [...unique.values()];

      const scored = list.map(v => {
        const xs = v.ids.map(id => getAnchor(id).anchorX);
        const spread = Math.max(...xs) - Math.min(...xs);
        const count = v.ids.length;
        let score = spread + (count === 4 ? 8 : 0);

        const hasCenter = v.ids.some(id => ["m3","m4","b3","t3"].includes(id));
        if(hasCenter) score += 6;

        return { ...v, score };
      });

      const ordered = scored
        .sort((a, b) => b.score - a.score)
        .slice(0, 60)
        .map(v => v.ids);

      return ordered;
    }

    function intersectionCount(a, b){
      const setB = new Set(b);
      return a.filter(id => setB.has(id)).length;
    }

    function chooseNextVariant(currentIds){
      const targetShareMin = currentIds.length - 2; // max. 2 Fotos tauschen
      const currentKey = currentIds.slice().sort().join("|");

      const candidates = variants.filter(v => {
        const key = v.slice().sort().join("|");
        if(key === currentKey) return false;
        const shared = intersectionCount(v, currentIds);
        return shared >= targetShareMin && shared < currentIds.length;
      });

      const sorted = candidates
        .map(v => {
          const shared = intersectionCount(v, currentIds);
          const diff = v.length - shared;
          const score = shared * 10 - diff;
          return { v, score };
        })
        .sort((a, b) => b.score - a.score);

      if(sorted.length){
        return pick(sorted.slice(0, Math.min(10, sorted.length))).v;
      }

      return pick(variants);
    }

    function getFreshCandidates(excludedIds){
      return allAssets.filter(a => isFreshAsset(a) && !excludedIds.has(a.public_id));
    }

    function chooseAssetsForNewSlots(slotLayouts){
      const chosen = [];
      const excludedIds = new Set(getCurrentPublicIds());
      let freshPicked = 0;

      for(const layout of slotLayouts){
        let pool = allAssets.filter(a => !excludedIds.has(a.public_id));

        const fresh = getFreshCandidates(excludedIds);
        if(fresh.length && freshPicked < 2){
          const rankedFresh = shuffle(fresh)
            .sort((a, b) => {
              const sa = showCounts.get(a.public_id) || 0;
              const sb = showCounts.get(b.public_id) || 0;
              return sa - sb;
            });
          const asset = rankedFresh[0];
          chosen.push(asset);
          excludedIds.add(asset.public_id);
          freshPicked++;
          continue;
        }

        pool = pool
          .map(asset => {
            const shown = showCounts.get(asset.public_id) || 0;
            const recentPenalty = recentlyShown.includes(asset.public_id) ? 2 : 0;
            const freshnessBoost = isFreshAsset(asset) ? -1 : 0;
            return {
              asset,
              score: shown + recentPenalty + freshnessBoost + rand(0, 0.8)
            };
          })
          .sort((a, b) => a.score - b.score)
          .slice(0, Math.min(14, pool.length));

        if(pool.length){
          const asset = pick(pool).asset;
          chosen.push(asset);
          excludedIds.add(asset.public_id);
        }
      }

      return chosen;
    }

    function estimateCaptionMinWidth(caption){
      const len = caption.length;
      if(len <= 18) return 14.5;
      if(len <= 28) return 16.5;
      if(len <= 38) return 18.5;
      if(len <= 52) return 20.5;
      return 22.5;
    }

    function getLayoutForSlot(asset, anchor, count){
      const meta = getCardMeta(asset);
      const ratio = clamp(Number(asset.width || 1) / Number(asset.height || 1), 0.55, 2.6);

      const isPortrait = ratio < 0.90;
      const isLandscape = ratio > 1.25;
      const isSquareish = !isPortrait && !isLandscape;

      const countBase = count === 3 ? 20.8 : 18.8;
      let frameW = countBase * anchor.wBias;

      if(isPortrait) frameW *= 0.88;
      if(isLandscape) frameW *= 1.10;
      if(isSquareish) frameW *= 0.98;

      frameW = Math.max(frameW, estimateCaptionMinWidth(meta.caption));

      if(anchor.row === "top") frameW *= 1.02;
      if(anchor.row === "bottom" && isPortrait) frameW *= 0.92;

      frameW = clamp(frameW, 14.5, count === 3 ? 26.5 : 23.5);

      const sidePad = clamp(frameW * 0.032, 0.52, 0.86);
      const topPad = clamp(frameW * 0.024, 0.38, 0.62);
      const innerW = frameW - sidePad * 2;

      let mediaH = innerW / ratio;
      const captionFont = clamp(frameW * 0.115, 1.15, 1.95);
      const captionH = clamp(captionFont * 2.05, 2.45, 4.15);

      // Foto nicht zu klein werden lassen
      mediaH = Math.max(mediaH, isPortrait ? 11.4 : 8.3);

      let frameH = topPad + mediaH + captionH;

      // untere Reihe begrenzen
      if(anchor.row === "bottom"){
        const maxBottom = 28.8;
        if(frameH > maxBottom){
          const scale = maxBottom / frameH;
          frameW *= scale;
          const newSidePad = clamp(frameW * 0.032, 0.48, 0.82);
          const newTopPad = clamp(frameW * 0.024, 0.36, 0.60);
          const newInnerW = frameW - newSidePad * 2;
          mediaH = Math.max(newInnerW / ratio, isPortrait ? 9.8 : 7.4);
          const newCaptionFont = clamp(frameW * 0.112, 1.02, 1.78);
          const newCaptionH = clamp(newCaptionFont * 2.0, 2.2, 3.75);

          return {
            meta,
            ratio,
            frameW,
            frameH: newTopPad + mediaH + newCaptionH,
            sidePad: newSidePad,
            topPad: newTopPad,
            mediaH,
            captionH: newCaptionH,
            captionFont: newCaptionFont,
            isPortrait,
            isLandscape
          };
        }
      }

      return {
        meta,
        ratio,
        frameW,
        frameH,
        sidePad,
        topPad,
        mediaH,
        captionH,
        captionFont,
        isPortrait,
        isLandscape
      };
    }

    function buildCardGeometry(anchor, layout, count){
      const clipXPercent = clamp(50 + rand(-7, 7), 42, 58);

      const left = anchor.anchorX - (layout.frameW * (clipXPercent / 100));
      const top = anchor.anchorY;

      const baseRot = clamp(rand(-7.5, 7.5), -7.5, 7.5);
      const finalRot = clamp(baseRot + rand(-1.3, 1.3), -8.5, 8.5);

      const rect = {
        x:left,
        y:top,
        w:layout.frameW,
        h:layout.frameH
      };

      return {
        anchor,
        layout,
        clipXPercent,
        left,
        top,
        baseRot,
        finalRot,
        rect
      };
    }

    function overlapArea(a, b){
      const xOverlap = Math.max(0, Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x));
      const yOverlap = Math.max(0, Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y));
      return xOverlap * yOverlap;
    }

    function validatePlacement(geometries){
      for(let i = 0; i < geometries.length; i++){
        const g = geometries[i];
        const r = g.rect;

        if(r.x < 1.2) return false;
        if(r.x + r.w > 98.6) return false;
        if(r.y < 4.2) return false;
        if(r.y + r.h > 96.6) return false;

        for(let j = i + 1; j < geometries.length; j++){
          const other = geometries[j];
          const area = overlapArea(r, other.rect);
          const minArea = Math.min(r.w * r.h, other.rect.w * other.rect.h);
          if(area / minArea > 0.10) return false;
        }
      }
      return true;
    }

    function prepareNewCardLayouts(slotIds, assets){
      const count = slotIds.length;
      const prepared = [];

      for(let i = 0; i < slotIds.length; i++){
        const anchor = getAnchor(slotIds[i]);
        const asset = assets[i];
        const layout = getLayoutForSlot(asset, anchor, count);
        const geometry = buildCardGeometry(anchor, layout, count);
        prepared.push({
          slotId: slotIds[i],
          asset,
          anchor,
          layout,
          geometry
        });
      }

      return validatePlacement(prepared.map(p => p.geometry)) ? prepared : null;
    }

    function resolvePreparedLayouts(slotIds){
      // mehrere Versuche, bis die Kombination sauber passt
      for(let attempt = 0; attempt < 120; attempt++){
        const assets = chooseAssetsForNewSlots(slotIds);
        if(assets.length !== slotIds.length) return null;

        const prepared = prepareNewCardLayouts(slotIds, assets);
        if(prepared) return prepared;
      }
      return null;
    }

    function createCard(prepared, attachDelayMs = 0){
      const { asset, anchor, layout, geometry } = prepared;
      const meta = layout.meta;

      const wrapper = document.createElement("div");
      wrapper.className = "photo-card attaching";
      wrapper.style.left = `${geometry.left}%`;
      wrapper.style.top = `${geometry.top}%`;
      wrapper.style.width = `${layout.frameW}%`;
      wrapper.style.zIndex = String(30 + currentCards.length);

      const frame = document.createElement("div");
      frame.className = "photo-frame";
      frame.style.width = "100%";
      frame.style.padding = `${layout.topPad}% ${layout.sidePad}% 0 ${layout.sidePad}%`;
      frame.style.background = meta.color;

      const photoTop = document.createElement("div");
      photoTop.className = "photo-top";
      photoTop.style.height = `${layout.mediaH}%`;
      photoTop.style.padding = "0";
      photoTop.style.margin = "0";
      photoTop.style.background = "#fff";

      const img = document.createElement("img");
      img.className = "photo-image";
      img.src = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/c_limit,w_2600,h_2600,q_auto,f_auto/${asset.public_id}`;
      img.alt = meta.caption;

      const captionStrip = document.createElement("div");
      captionStrip.className = "caption-strip";
      captionStrip.style.background = meta.color;
      captionStrip.style.height = `${layout.captionH}%`;
      captionStrip.style.padding = "0.35em 0.55em 0.48em";
      captionStrip.style.fontSize = `${layout.captionFont}vw`;

      const captionInner = document.createElement("div");
      captionInner.className = "caption-inner";
      captionInner.textContent = meta.caption;

      const clip = document.createElement("img");
      clip.className = "clip";
      clip.src = pick(CLIP_IMAGES);
      clip.onerror = function(){
        this.style.display = "none";
      };

      const clipHeight = clamp(layout.frameW * 0.36, 3.4, 5.8); // deutlich größer
      clip.style.height = `${clipHeight}%`;
      clip.style.width = "auto";
      clip.style.left = `${geometry.clipXPercent}%`;
      clip.style.top = `${-clipHeight * 0.72}%`; // unteres Viertel schneidet den Faden
      clip.style.marginLeft = "-9999px"; // wird gleich überschrieben
      clip.style.transform = "translateX(-50%)";

      const clipRestRot = `${rand(-11, 11).toFixed(2)}deg`;
      const clipStartRot = `${(parseFloat(clipRestRot) + rand(-5, 5)).toFixed(2)}deg`;

      const attachMode = pick(["below","below","left","right"]);
      let photoStartX = 0;
      let photoStartY = 0;

      if(attachMode === "below"){
        photoStartX = rand(-10, 10);
        photoStartY = rand(16, 28);
      }else if(attachMode === "left"){
        photoStartX = rand(-20, -12);
        photoStartY = rand(4, 16);
      }else{
        photoStartX = rand(12, 20);
        photoStartY = rand(4, 16);
      }

      const clipMode = pick(["top","diag-left","diag-right"]);
      let clipStartX = 0;
      let clipStartY = 0;

      if(clipMode === "top"){
        clipStartX = rand(-3, 3);
        clipStartY = rand(-24, -16);
      }else if(clipMode === "diag-left"){
        clipStartX = rand(-14, -8);
        clipStartY = rand(-23, -15);
      }else{
        clipStartX = rand(8, 14);
        clipStartY = rand(-23, -15);
      }

      const photoRestRot = `${geometry.baseRot.toFixed(2)}deg`;
      const photoFinalRot = `${geometry.finalRot.toFixed(2)}deg`;

      wrapper.style.setProperty("--attach-duration", "1s");

      wrapper.style.setProperty("--photo-start-x", `${photoStartX}px`);
      wrapper.style.setProperty("--photo-start-y", `${photoStartY}px`);
      wrapper.style.setProperty("--photo-start-rot", `${rand(-2.4, 2.4).toFixed(2)}deg`);
      wrapper.style.setProperty("--photo-rest-rot", photoRestRot);
      wrapper.style.setProperty("--photo-final-rot", photoFinalRot);

      wrapper.style.setProperty("--clip-start-x", `${clipStartX}px`);
      wrapper.style.setProperty("--clip-start-y", `${clipStartY}px`);
      wrapper.style.setProperty("--clip-start-rot", clipStartRot);
      wrapper.style.setProperty("--clip-rest-rot", clipRestRot);

      wrapper.style.setProperty("--sway-duration", `${rand(1.65, 2.05).toFixed(2)}s`);
      wrapper.style.setProperty("--sway-r1", `${rand(1.6, 2.8).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r2", `${rand(1.0, 1.8).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r3", `${rand(0.55, 1.05).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r4", `${rand(0.25, 0.58).toFixed(2)}deg`);
      wrapper.style.setProperty("--sway-r5", `${rand(0.10, 0.28).toFixed(2)}deg`);

      wrapper.style.setProperty("--sway-x1", `${rand(-1.2, 1.2).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y1", `${rand(-0.6, 0.6).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x2", `${rand(-0.9, 0.9).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y2", `${rand(-0.45, 0.45).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x3", `${rand(-0.55, 0.55).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y3", `${rand(-0.26, 0.26).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x4", `${rand(-0.28, 0.28).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y4", `${rand(-0.12, 0.12).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-x5", `${rand(-0.12, 0.12).toFixed(2)}px`);
      wrapper.style.setProperty("--sway-y5", `${rand(-0.06, 0.06).toFixed(2)}px`);

      wrapper.style.setProperty("--photo-end-x", `${rand(-10, 10).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-y", `${rand(18, 28).toFixed(0)}px`);
      wrapper.style.setProperty("--photo-end-rot", `${rand(-2.4, 2.4).toFixed(2)}deg`);

      wrapper.style.setProperty("--clip-end-x", `${rand(-10, 10).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-y", `${rand(-18, -10).toFixed(0)}px`);
      wrapper.style.setProperty("--clip-end-rot", `${rand(-7, 7).toFixed(2)}deg`);

      photoTop.appendChild(img);
      captionInner.style.fontFamily = `"Kalam","Segoe Print","Trebuchet MS",Arial,sans-serif`;
      captionStrip.appendChild(captionInner);

      frame.appendChild(photoTop);
      frame.appendChild(captionStrip);
      wrapper.appendChild(frame);
      wrapper.appendChild(clip);

      clip.style.marginLeft = "0";

      wrapper.style.opacity = "0";
      stage.appendChild(wrapper);

      const cardObj = {
        asset,
        slotId: prepared.slotId,
        anchor,
        el: wrapper,
        mountedAt: Date.now(),
        layout,
        geometry
      };

      currentCards.push(cardObj);
      markShown(asset.public_id);

      const startAnimation = () => {
        wrapper.style.opacity = "1";
        wrapper.classList.add("attaching");
      };

      setTimeout(startAnimation, attachDelayMs);

      setTimeout(() => {
        wrapper.classList.remove("attaching");
        wrapper.classList.add("swinging");
      }, attachDelayMs + 1020);

      setTimeout(() => {
        wrapper.classList.remove("swinging");
      }, attachDelayMs + 3050);

      return cardObj;
    }

    function detachCard(cardObj, delay = 0){
      return new Promise(resolve => {
        setTimeout(() => {
          cardObj.el.classList.remove("attaching", "swinging");
          cardObj.el.classList.add("detaching");

          setTimeout(() => {
            cardObj.el.remove();
            const idx = currentCards.indexOf(cardObj);
            if(idx >= 0) currentCards.splice(idx, 1);
            resolve(cardObj.slotId);
          }, 960);
        }, delay);
      });
    }

    function chooseInitialVariant(){
      const preferred = variants.filter(v => v.length === 4);
      return preferred.length ? pick(preferred) : pick(variants);
    }

    async function initialRender(){
      if(!allAssets.length){
        emptyNote.style.display = "grid";
        return;
      }

      emptyNote.style.display = "none";

      const variant = chooseInitialVariant();
      variantPointer = variant.slice();

      const prepared = resolvePreparedLayouts(variantPointer);
      if(!prepared) return;

      prepared.forEach((item, index) => {
        createCard(item, index * 500);
      });
    }

    function currentSlotIds(){
      return currentCards.map(c => c.slotId).sort();
    }

    function scheduleNextCycle(delayMs){
      clearTimeout(nextTimer);
      nextTimer = setTimeout(runCycle, delayMs);
    }

    async function runCycle(){
      if(!allAssets.length || !currentCards.length){
        scheduleNextCycle(5000);
        return;
      }

      const currentIds = currentSlotIds();
      const nextVariant = chooseNextVariant(currentIds);
      variantPointer = nextVariant.slice();

      const currentSet = new Set(currentIds);
      const nextSet = new Set(nextVariant);

      const toKeep = currentCards.filter(c => nextSet.has(c.slotId));
      const toRemove = currentCards.filter(c => !nextSet.has(c.slotId));
      const toAddSlotIds = nextVariant.filter(id => !currentSet.has(id));

      // max. 2 Fotos tauschen
      const safeRemove = toRemove.slice(0, 2);
      const safeAdd = toAddSlotIds.slice(0, 2);

      const prepared = resolvePreparedLayouts(safeAdd);
      if(!prepared){
        scheduleNextCycle(6500);
        return;
      }

      await Promise.all(
        safeRemove.map((card, index) => detachCard(card, index * 130))
      );

      // kurze Pause nach Entfernen
      await new Promise(resolve => setTimeout(resolve, 260));

      prepared.forEach((item, index) => {
        createCard(item, index * 500);
      });

      // min. 5 Sekunden sichtbar nach Ende des Anbringens
      const attachEnd = 1000 + (prepared.length > 1 ? (prepared.length - 1) * 500 : 0);
      scheduleNextCycle(attachEnd + 5000);
    }

    async function rebuildWall(){
      clearTimeout(nextTimer);

      while(currentCards.length){
        const card = currentCards.pop();
        card.el.remove();
      }

      await initialRender();
      scheduleNextCycle(7000);
    }

    async function boot(){
      variants = generateVariants();

      await setFormat("16:9");
      await fetchAssets();
      await initialRender();

      clearInterval(fetchTimer);
      fetchTimer = setInterval(fetchAssets, 10000);

      scheduleNextCycle(7000);
      updateControlVisibility();

      // Hilfsbild einmal vorladen, wird aber nie sichtbar angezeigt
      preloadImage(BG_GUIDE_IMAGE).catch(() => {});
    }

    boot();
  </script>
