<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>
  <style>
    :root{
      --bg: #ece7dc;
      --shadow: 0 10px 24px rgba(0,0,0,.18);
      --button-bg: rgba(255,255,255,.72);
      --button-bg-hover: rgba(255,255,255,.9);
      --button-text: #3b322b;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #app{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    #stage{
      position:absolute;
      inset:0;
      margin:auto;
      overflow:hidden;
      background:var(--bg);
      transform-origin:center center;
    }

    #wall{
      position:absolute;
      inset:0;
      background-color:var(--bg);
      background-image:url("assets/bg_16_9.png");
      background-repeat:no-repeat;
      background-position:center center;
      background-size:100% 100%;
      pointer-events:none;
    }

    #cards{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .polaroid{
      position:absolute;
      transform-origin:50% 0%;
      will-change:transform, opacity;
      filter:drop-shadow(0 10px 16px rgba(0,0,0,.18));
      pointer-events:none;
    }

    .polaroid.entering{
      opacity:0;
    }

    .polaroid.leaving{
      pointer-events:none;
    }

    .card{
      position:relative;
      background:#fff;
      border-radius:2px;
      overflow:visible;
      box-shadow:var(--shadow);
    }

    .clip{
      position:absolute;
      left:50%;
      top:0;
      transform-origin:center center;
      pointer-events:none;
      z-index:5;
      image-rendering:auto;
    }

    .photo-wrap{
      position:relative;
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background:#fff;
    }

    .photo-wrap img{
      display:block;
      max-width:100%;
      max-height:100%;
      width:auto;
      height:auto;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .caption{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:700;
      color:#111;
      line-height:1.08;
      overflow:hidden;
      text-overflow:ellipsis;
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
      line-clamp:2;
      padding:.4em .55em .42em;
      min-height:2.5em;
      word-break:break-word;
      hyphens:auto;
    }

    #controls{
      position:absolute;
      right:10px;
      bottom:10px;
      display:grid;
      grid-template-columns: repeat(2, auto);
      gap:6px 6px;
      z-index:1000;
      transition:opacity .25s ease;
    }

    #controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .fmt-btn{
      border:none;
      border-radius:999px;
      background:var(--button-bg);
      color:var(--button-text);
      font-size:12px;
      font-weight:700;
      padding:7px 12px;
      cursor:pointer;
      backdrop-filter: blur(3px);
      box-shadow:0 2px 8px rgba(0,0,0,.08);
      transition:.18s ease;
      min-width:52px;
    }

    .fmt-btn:hover{
      background:var(--button-bg-hover);
      transform:translateY(-1px);
    }

    .fmt-btn.active{
      background:rgba(255,255,255,.95);
      box-shadow:0 3px 10px rgba(0,0,0,.12);
    }

    @keyframes cardIn {
      0%   { opacity:0; transform:translate(var(--tx0), var(--ty0)) rotate(var(--r0)) scale(.92); }
      18%  { opacity:.6; }
      42%  { opacity:1; transform:translate(var(--tx1), var(--ty1)) rotate(var(--r1)) scale(1.01); }
      67%  { transform:translate(var(--tx2), var(--ty2)) rotate(var(--r2)) scale(1); }
      82%  { transform:translate(var(--tx3), var(--ty3)) rotate(var(--r3)) scale(1); }
      100% { opacity:1; transform:translate(0px,0px) rotate(var(--rf)) scale(1); }
    }

    @keyframes cardOut {
      0%   { opacity:1; transform:translate(0px,0px) rotate(var(--rf)); }
      35%  { opacity:.9; transform:translate(var(--ox1), var(--oy1)) rotate(calc(var(--rf) + var(--or1))); }
      100% { opacity:0; transform:translate(var(--ox2), var(--oy2)) rotate(calc(var(--rf) + var(--or2))) scale(.92); }
    }

    @keyframes clipIn {
      0%   { opacity:0; transform:translate(var(--ctx0), var(--cty0)) rotate(var(--cr0)) scale(.85); }
      25%  { opacity:.85; }
      60%  { opacity:1; transform:translate(var(--ctx1), var(--cty1)) rotate(var(--cr1)) scale(1.04); }
      100% { opacity:1; transform:translate(0,0) rotate(var(--crf)) scale(1); }
    }

    @keyframes clipOut {
      0%   { opacity:1; transform:translate(0,0) rotate(var(--crf)); }
      100% { opacity:0; transform:translate(var(--cox), var(--coy)) rotate(calc(var(--crf) + var(--cor))) scale(.9); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="wall"></div>
      <div id="cards"></div>
    </div>

    <div id="controls">
      <button class="fmt-btn" data-format="4:3">4:3</button>
      <button class="fmt-btn active" data-format="16:9">16:9</button>
      <button class="fmt-btn" data-format="16:10">16:10</button>
      <button class="fmt-btn" data-format="7:5">7:5</button>
    </div>
  </div>

  <script>
    (() => {
      const cardsEl = document.getElementById("cards");
      const stageEl = document.getElementById("stage");
      const controlsEl = document.getElementById("controls");
      const wallEl = document.getElementById("wall");

      const FORMATS = {
        "4:3":   { w:4,  h:3  },
        "16:9":  { w:16, h:9  },
        "16:10": { w:16, h:10 },
        "7:5":   { w:7,  h:5  }
      };

      let currentFormat = "16:9";

      const CLIP_PATHS = [
        "assets/klammer1_uhd.png",
        "assets/klammer2_uhd.png",
        "assets/klammer3_uhd.png"
      ];

      const MIN_VISIBLE = 2;
      const MAX_VISIBLE = 5;
      const FETCH_INTERVAL = 15000;

      let cycleCounter = 0;
      let resources = [];
      let activeCards = [];
      let scheduleTimer = null;
      let fetchTimer = null;

      const slotState = new Map();

      function clamp(v, min, max){
        return Math.max(min, Math.min(max, v));
      }

      function rand(min, max){
        return min + Math.random() * (max - min);
      }

      function pick(arr){
        return arr[Math.floor(Math.random() * arr.length)];
      }

      function shuffle(arr){
        const a = [...arr];
        for(let i = a.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function toDateNum(s){
        const n = new Date(s).getTime();
        return Number.isFinite(n) ? n : 0;
      }

      function enterFullscreen(){
        const el = document.documentElement;
        if(!document.fullscreenElement && el.requestFullscreen){
          el.requestFullscreen().catch(() => {});
        }
      }

      function exitFullscreen(){
        if(document.fullscreenElement && document.exitFullscreen){
          document.exitFullscreen().catch(() => {});
        }
      }

      function updateControlsVisibility(){
        if(document.fullscreenElement){
          controlsEl.classList.add("hidden");
        } else {
          controlsEl.classList.remove("hidden");
        }
      }

      document.addEventListener("fullscreenchange", updateControlsVisibility);

      document.querySelectorAll(".fmt-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".fmt-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentFormat = btn.dataset.format;
          resizeStage();
          enterFullscreen();
          relayoutAll();
        });
      });

      function resizeStage(){
        const fmt = FORMATS[currentFormat];
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let stageW = vw;
        let stageH = vw * fmt.h / fmt.w;

        if(stageH > vh){
          stageH = vh;
          stageW = vh * fmt.w / fmt.h;
        }

        stageEl.style.width = `${Math.round(stageW)}px`;
        stageEl.style.height = `${Math.round(stageH)}px`;

        wallEl.style.backgroundSize = "100% 100%";
      }

      window.addEventListener("resize", () => {
        resizeStage();
        relayoutAll();
      });

      function getStageSize(){
        return {
          w: stageEl.clientWidth,
          h: stageEl.clientHeight
        };
      }

      function ropeY(row, xNorm){
        const x = xNorm;
        if(row === 1){
          return (0.050 + 0.31 * Math.pow(x - 0.5, 2));
        }
        if(row === 2){
          return (0.395 + 0.34 * Math.pow(x - 0.5, 2));
        }
        return (0.737 + 0.37 * Math.pow(x - 0.5, 2));
      }

      function buildSlots(){
        const xs = [0.13, 0.31, 0.50, 0.69, 0.87];
        const rows = [1,2,3];
        const slots = [];

        rows.forEach(row => {
          xs.forEach((x, idx) => {
            slots.push({
              id: `r${row}_${idx}`,
              row,
              x,
              y: ropeY(row, x),
              lastUsed: slotState.get(`r${row}_${idx}`)?.lastUsed ?? -999,
              recentHits: slotState.get(`r${row}_${idx}`)?.recentHits ?? 0
            });
          });
        });

        return slots;
      }

      function getOrientation(res){
        const ar = res.width / res.height;
        if(ar > 1.18) return "landscape";
        if(ar < 0.86) return "portrait";
        return "square";
      }

      function getTaskColor(taskId){
        const task = (APP_CONFIG.tasks || []).find(t => t.id === taskId);
        return task?.color || "#d9e7f3";
      }

      function getTaskTitle(taskId, fallback){
        const task = (APP_CONFIG.tasks || []).find(t => t.id === taskId);
        return task?.title || fallback || "Fotochallenge";
      }

      function normalizeResource(r){
        const custom = r.context?.custom || {};
        return {
          assetId: r.asset_id,
          publicId: r.public_id,
          createdAt: custom.created_at || r.created_at,
          createdNum: toDateNum(custom.created_at || r.created_at),
          width: Number(r.width) || 1000,
          height: Number(r.height) || 1000,
          secureUrl: `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/${r.public_id}.${r.format || "jpg"}`,
          taskId: custom.task_id || "sammelordner",
          title: getTaskTitle(custom.task_id, custom.task_title),
          color: getTaskColor(custom.task_id),
          orientation: getOrientation(r),
          isRecent: false,
          usedCount: 0
        };
      }

      async function fetchResources(){
        try{
          const url = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/${APP_CONFIG.eventTag}.json?_=${Date.now()}`;
          const res = await fetch(url, { cache: "no-store" });
          if(!res.ok) return;
          const data = await res.json();
          const normalized = (data.resources || [])
            .filter(r => r.type === "upload")
            .map(normalizeResource)
            .sort((a,b) => b.createdNum - a.createdNum);

          const newestCut = normalized.slice(0, 6).map(x => x.assetId);
          normalized.forEach(r => r.isRecent = newestCut.includes(r.assetId));

          normalized.forEach(r => {
            const old = resources.find(o => o.assetId === r.assetId);
            if(old) r.usedCount = old.usedCount || 0;
          });

          resources = normalized;
        }catch(e){
          console.error("Fetch list failed:", e);
        }
      }

      function getCardMetrics(res){
        const { w: stageW, h: stageH } = getStageSize();
        const orientation = res.orientation;
        const ar = res.width / res.height;

        const sidePad = Math.round(stageW * 0.0075);
        const topPad  = Math.round(stageW * 0.0075);
        const capPadY = Math.round(stageH * 0.006);
        const capMinH = Math.round(stageH * 0.072);

        let targetPhotoW, targetPhotoH, minCardW;

        if(orientation === "landscape"){
          targetPhotoW = stageW * 0.215;
          targetPhotoH = targetPhotoW / ar;
          minCardW = stageW * 0.19;
        } else if(orientation === "portrait"){
          targetPhotoH = stageH * 0.255;
          targetPhotoW = targetPhotoH * ar;
          minCardW = stageW * 0.125;
        } else {
          targetPhotoW = stageW * 0.16;
          targetPhotoH = targetPhotoW;
          minCardW = stageW * 0.145;
        }

        const photoW = Math.round(targetPhotoW);
        const photoH = Math.round(targetPhotoH);

        const cardW = Math.round(Math.max(photoW + sidePad * 2, minCardW));
        const captionH = capMinH;
        const cardH = Math.round(topPad + photoH + 6 + captionH + 8);

        const clipH = Math.round(stageH * 0.095); // nochmals größer
        let clipW = Math.round(clipH * 0.42);
        if(clipH > 0 && clipW < 10) clipW = 10;

        return {
          orientation,
          photoW,
          photoH,
          cardW,
          cardH,
          captionH,
          sidePad,
          topPad,
          clipW,
          clipH
        };
      }

      function computeCardTopLeft(slot, metrics, angleDeg){
        const { w: stageW, h: stageH } = getStageSize();

        const ropeX = slot.x * stageW;
        const ropeYpx = slot.y * stageH;

        const cardX = ropeX - metrics.cardW / 2;
        const cardTop = ropeYpx + Math.round(metrics.clipH * 0.15);

        return {
          x: cardX,
          y: cardTop
        };
      }

      function getBBox(x, y, w, h, angleDeg){
        const a = Math.abs(angleDeg) * Math.PI / 180;
        const bw = Math.abs(Math.cos(a) * w) + Math.abs(Math.sin(a) * h);
        const bh = Math.abs(Math.sin(a) * w) + Math.abs(Math.cos(a) * h);
        return {
          left: x - (bw - w) / 2,
          top: y - (bh - h) / 2,
          right: x + w + (bw - w) / 2,
          bottom: y + h + (bh - h) / 2
        };
      }

      function overlaps(a, b, pad = 18){
        return !(
          a.right < b.left + pad ||
          a.left > b.right - pad ||
          a.bottom < b.top + pad ||
          a.top > b.bottom - pad
        );
      }

      function slotCompatibility(slot, orientation){
        if(orientation === "portrait"){
          return slot.row !== 3;
        }
        return true;
      }

      function scoreSlot(slot, orientation){
        const age = cycleCounter - slot.lastUsed;
        let base = age * 10 - slot.recentHits * 25 + rand(0, 6);

        if(orientation === "portrait"){
          if(slot.row === 1) base += 12;
          if(slot.row === 2) base += 8;
          if(slot.row === 3) base -= 999;
        } else if(orientation === "landscape"){
          if(slot.row === 2) base += 10;
          if(slot.row === 1) base += 5;
          if(slot.row === 3) base += 4;
        } else {
          if(slot.row === 2) base += 8;
          if(slot.row === 1) base += 6;
          if(slot.row === 3) base += 5;
        }

        return base;
      }

      function pickBestPlacement(resource, occupiedPreview = []){
        const slots = buildSlots()
          .filter(slot => !activeCards.some(c => c.slotId === slot.id))
          .filter(slot => !occupiedPreview.some(c => c.slotId === slot.id))
          .filter(slot => slotCompatibility(slot, resource.orientation))
          .sort((a,b) => scoreSlot(b, resource.orientation) - scoreSlot(a, resource.orientation));

        const { w: stageW, h: stageH } = getStageSize();

        let best = null;

        for(const slot of slots){
          const metrics = getCardMetrics(resource);

          const anglePool =
            resource.orientation === "portrait"
              ? [-8,-6,-5,-4,4,5,6,8]
              : resource.orientation === "square"
                ? [-9,-7,-5,-4,4,5,7,9]
                : [-8,-6,-4,-3,3,4,6,8];

          const tryAngles = shuffle(anglePool);

          for(const angle of tryAngles){
            const pos = computeCardTopLeft(slot, metrics, angle);
            const box = getBBox(pos.x, pos.y, metrics.cardW, metrics.cardH, angle);

            const topSafe = 8;
            const bottomSafe = 10;
            const leftSafe = 10;
            const rightSafe = 10;

            if(box.left < leftSafe || box.right > stageW - rightSafe) continue;
            if(box.top < topSafe) continue;
            if(box.bottom > stageH - bottomSafe) continue;

            const conflictsActive = activeCards.some(c => overlaps(box, c.bbox, 24));
            if(conflictsActive) continue;

            const conflictsPreview = occupiedPreview.some(c => overlaps(box, c.bbox, 26));
            if(conflictsPreview) continue;

            best = {
              slotId: slot.id,
              row: slot.row,
              xNorm: slot.x,
              yNorm: slot.y,
              angle,
              x: pos.x,
              y: pos.y,
              metrics,
              bbox: box
            };
            return best;
          }
        }

        return null;
      }

      function makePolaroid(resource, placement){
        const el = document.createElement("div");
        el.className = "polaroid entering";
        el.style.left = `${placement.x}px`;
        el.style.top = `${placement.y}px`;
        el.style.width = `${placement.metrics.cardW}px`;
        el.style.height = `${placement.metrics.cardH}px`;
        el.style.setProperty("--rf", `${placement.angle}deg`);

        const card = document.createElement("div");
        card.className = "card";
        card.style.width = `${placement.metrics.cardW}px`;
        card.style.height = `${placement.metrics.cardH}px`;
        card.style.padding = `${placement.metrics.topPad}px ${placement.metrics.sidePad}px 8px`;

        const clip = document.createElement("img");
        clip.className = "clip";
        clip.src = pick(CLIP_PATHS);
        clip.alt = "";
        clip.style.width = `${Math.round(placement.metrics.clipW * 1.5)}px`;
        clip.style.height = `${Math.round(placement.metrics.clipH * 1.5)}px`;
        clip.style.marginLeft = `${-Math.round(placement.metrics.clipW * 1.5 / 2)}px`;
        clip.style.top = `${-Math.round(placement.metrics.clipH * 0.68)}px`;

        const photoWrap = document.createElement("div");
        photoWrap.className = "photo-wrap";
        photoWrap.style.height = `${placement.metrics.photoH}px`;

        const img = document.createElement("img");
        img.src = resource.secureUrl;
        img.alt = resource.title;
        img.style.width = `${placement.metrics.photoW}px`;
        img.style.height = `${placement.metrics.photoH}px`;

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.textContent = resource.title;
        caption.style.background = resource.color;
        caption.style.fontSize = `${clamp(Math.round(getStageSize().w * 0.018), 13, 22)}px`;
        caption.style.minHeight = `${placement.metrics.captionH}px`;

        photoWrap.appendChild(img);
        card.appendChild(photoWrap);
        card.appendChild(caption);
        el.appendChild(card);
        el.appendChild(clip);

        return { el, clip, card, img, caption };
      }

      function setEnterAnimation(node, delayMs = 0, finalAngle = 0){
        const amp = rand(7, 15);
        const driftX = rand(-16, 16);
        const driftY = rand(16, 34);
        const swayX1 = rand(-7, 7);
        const swayY1 = rand(-4, 4);
        const swayX2 = rand(-4, 4);
        const swayY2 = rand(-2, 3);

        node.el.style.setProperty("--tx0", `${driftX}px`);
        node.el.style.setProperty("--ty0", `${driftY}px`);
        node.el.style.setProperty("--r0", `${finalAngle + rand(-20,20)}deg`);
        node.el.style.setProperty("--tx1", `${swayX1}px`);
        node.el.style.setProperty("--ty1", `${swayY1}px`);
        node.el.style.setProperty("--r1", `${finalAngle - amp * 0.65}deg`);
        node.el.style.setProperty("--tx2", `${swayX2}px`);
        node.el.style.setProperty("--ty2", `${swayY2}px`);
        node.el.style.setProperty("--r2", `${finalAngle + amp * 0.28}deg`);
        node.el.style.setProperty("--tx3", `${rand(-2,2)}px`);
        node.el.style.setProperty("--ty3", `${rand(-1,2)}px`);
        node.el.style.setProperty("--r3", `${finalAngle - amp * 0.12}deg`);

        node.clip.style.setProperty("--ctx0", `${rand(-10,10)}px`);
        node.clip.style.setProperty("--cty0", `${rand(-20,-10)}px`);
        node.clip.style.setProperty("--cr0", `${rand(-35,35)}deg`);
        node.clip.style.setProperty("--ctx1", `${rand(-3,3)}px`);
        node.clip.style.setProperty("--cty1", `${rand(-2,2)}px`);
        node.clip.style.setProperty("--cr1", `${rand(-8,8)}deg`);
        node.clip.style.setProperty("--crf", `${rand(-6,6)}deg`);

        node.el.style.animation = `cardIn 2.1s cubic-bezier(.18,.84,.2,1) ${delayMs}ms forwards`;
        node.clip.style.animation = `clipIn 1.2s ease-out ${delayMs}ms forwards`;
      }

      function setLeaveAnimation(cardState){
        const el = cardState.dom.el;
        const clip = cardState.dom.clip;
        const rf = cardState.angle;

        el.style.setProperty("--rf", `${rf}deg`);
        el.style.setProperty("--ox1", `${rand(-10,10)}px`);
        el.style.setProperty("--oy1", `${rand(-10,-2)}px`);
        el.style.setProperty("--or1", `${rand(-4,4)}deg`);
        el.style.setProperty("--ox2", `${rand(-40,40)}px`);
        el.style.setProperty("--oy2", `${rand(55,95)}px`);
        el.style.setProperty("--or2", `${rand(-10,10)}deg`);

        clip.style.setProperty("--crf", `${rand(-6,6)}deg`);
        clip.style.setProperty("--cox", `${rand(-16,16)}px`);
        clip.style.setProperty("--coy", `${rand(-25,-6)}px`);
        clip.style.setProperty("--cor", `${rand(-18,18)}deg`);

        el.classList.remove("entering");
        el.classList.add("leaving");

        el.style.animation = `cardOut 1.15s ease-in forwards`;
        clip.style.animation = `clipOut .65s ease-in forwards`;
      }

      function addCard(resource, placement, delayMs = 0){
        const dom = makePolaroid(resource, placement);
        cardsEl.appendChild(dom.el);

        const cardState = {
          id: resource.assetId,
          resource,
          slotId: placement.slotId,
          row: placement.row,
          angle: placement.angle,
          bbox: placement.bbox,
          x: placement.x,
          y: placement.y,
          dom,
          bornCycle: cycleCounter,
          bornAt: Date.now()
        };

        setEnterAnimation(dom, delayMs, placement.angle);

        setTimeout(() => {
          dom.el.classList.remove("entering");
        }, delayMs + 2200);

        activeCards.push(cardState);

        slotState.set(placement.slotId, {
          lastUsed: cycleCounter,
          recentHits: clamp((slotState.get(placement.slotId)?.recentHits || 0) + 1, 0, 5)
        });

        resources = resources.map(r => r.assetId === resource.assetId ? { ...r, usedCount:(r.usedCount || 0) + 1 } : r);
      }

      function removeCards(cardsToRemove){
        return new Promise(resolve => {
          if(!cardsToRemove.length){
            resolve();
            return;
          }

          cardsToRemove.forEach(c => setLeaveAnimation(c));

          setTimeout(() => {
            cardsToRemove.forEach(c => {
              c.dom.el.remove();
              activeCards = activeCards.filter(x => x.id !== c.id);
            });
            resolve();
          }, 1200);
        });
      }

      function getResourcePool(){
        if(!resources.length) return [];
        const activeIds = new Set(activeCards.map(c => c.id));
        const pool = resources.filter(r => !activeIds.has(r.assetId));
        return pool.length ? pool : resources;
      }

      function chooseResources(count){
        const pool = getResourcePool();
        if(!pool.length) return [];

        const weighted = pool
          .map(r => {
            let score = rand(0, 4);
            score += r.isRecent ? 25 : 0;
            score += Math.max(0, 10 - (r.usedCount || 0) * 2);
            score += Math.max(0, (Date.now() - r.createdNum) < 120000 ? 12 : 0);
            return { r, score };
          })
          .sort((a,b) => b.score - a.score);

        const chosen = [];
        for(const item of weighted){
          if(chosen.length >= count) break;
          if(!chosen.find(x => x.assetId === item.r.assetId)){
            chosen.push(item.r);
          }
        }
        return chosen;
      }

      function chooseRemoveCount(currentCount){
        const possible = [1,2,3].filter(n => currentCount - n >= MIN_VISIBLE);
        if(!possible.length) return 0;
        const weighted = possible.flatMap(n => n === 2 ? [2,2,2] : n === 3 ? [3,3] : [1]);
        return pick(weighted);
      }

      function chooseAddCount(afterRemoveCount){
        const room = MAX_VISIBLE - afterRemoveCount;
        const possible = [1,2,3].filter(n => n <= room && afterRemoveCount + n >= MIN_VISIBLE);
        if(!possible.length) return Math.max(0, MIN_VISIBLE - afterRemoveCount);
        const weighted = possible.flatMap(n => n === 2 ? [2,2,2] : n === 3 ? [3,3] : [1]);
        return pick(weighted);
      }

      function chooseCardsToRemove(n){
        if(n <= 0) return [];
        const sorted = [...activeCards]
          .sort((a,b) => a.bornAt - b.bornAt || a.bornCycle - b.bornCycle);
        return sorted.slice(0, n);
      }

      function decaySlotHits(){
        const keys = [...slotState.keys()];
        keys.forEach(k => {
          const s = slotState.get(k);
          if(!s) return;
          slotState.set(k, {
            lastUsed: s.lastUsed,
            recentHits: Math.max(0, (s.recentHits || 0) - 1)
          });
        });
      }

      function relayoutAll(){
        const previous = [...activeCards];
        activeCards = [];
        cardsEl.innerHTML = "";

        const occupiedPreview = [];

        previous.forEach((oldCard, idx) => {
          const placement = pickBestPlacement(oldCard.resource, occupiedPreview);
          if(!placement) return;
          occupiedPreview.push(placement);
          addCard(oldCard.resource, placement, idx * 60);
        });
      }

      async function ensureInitialCards(){
        if(activeCards.length || !resources.length) return;

        const initialCount = clamp(Math.min(4, resources.length), MIN_VISIBLE, MAX_VISIBLE);
        const chosen = chooseResources(initialCount);
        const occupiedPreview = [];

        chosen.forEach((res, idx) => {
          const placement = pickBestPlacement(res, occupiedPreview);
          if(!placement) return;
          occupiedPreview.push(placement);
          addCard(res, placement, idx * 500);
        });

        scheduleNext(9000);
      }

      function scheduleNext(ms){
        clearTimeout(scheduleTimer);
        scheduleTimer = setTimeout(runCycle, ms);
      }

      async function runCycle(){
        cycleCounter++;
        decaySlotHits();

        if(!resources.length){
          scheduleNext(6000);
          return;
        }

        const currentCount = activeCards.length;
        if(currentCount < MIN_VISIBLE){
          const need = MIN_VISIBLE - currentCount;
          const chosen = chooseResources(need);
          const occupiedPreview = [];

          chosen.forEach((res, idx) => {
            const placement = pickBestPlacement(res, occupiedPreview);
            if(!placement) return;
            occupiedPreview.push(placement);
            addCard(res, placement, idx * 500);
          });

          scheduleNext(7000);
          return;
        }

        const removeCount = chooseRemoveCount(currentCount);
        const toRemove = chooseCardsToRemove(removeCount);

        const afterRemove = currentCount - toRemove.length;
        const addCount = clamp(chooseAddCount(afterRemove), 0, MAX_VISIBLE - afterRemove);
        const selectedResources = chooseResources(addCount);

        const occupiedPreview = [];
        const plannedPlacements = [];

        for(const res of selectedResources){
          const placement = pickBestPlacement(res, occupiedPreview);
          if(placement){
            occupiedPreview.push(placement);
            plannedPlacements.push({ res, placement });
          }
        }

        await removeCards(toRemove);

        await new Promise(r => setTimeout(r, 700));

        plannedPlacements.forEach((item, idx) => {
          addCard(item.res, item.placement, idx * 500);
        });

        const shownNow = activeCards.length + plannedPlacements.length;
        const delayBase = plannedPlacements.length >= 3 ? 15000 : plannedPlacements.length === 2 ? 10000 : 5000;
        const jitter = rand(400, 1200);

        scheduleNext(delayBase + jitter);
      }

      function startFetching(){
        clearInterval(fetchTimer);
        fetchTimer = setInterval(fetchResources, FETCH_INTERVAL);
      }

      async function init(){
        resizeStage();
        await fetchResources();
        await ensureInitialCards();
        startFetching();
        updateControlsVisibility();
      }

      init();
    })();
  </script>
