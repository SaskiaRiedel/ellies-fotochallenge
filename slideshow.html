<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotochallenge</title>
  <script src="config.js"></script>
  <style>
    :root{
      --page-bg:#000;
      --wall-bg:#ece7dc;
      --btn-bg:rgba(255,255,255,.72);
      --btn-bg-active:rgba(255,255,255,.92);
      --btn-text:#3f352d;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--page-bg);
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #app{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      background:#000;
    }

    #stage{
      position:absolute;
      inset:0;
      margin:auto;
      overflow:hidden;
      background:#ece7dc;
      transform-origin:center center;
    }

    #wall{
      position:absolute;
      inset:0;
      background:#ece7dc url("assets/bg_16_9.png") center center / 100% 100% no-repeat;
      pointer-events:none;
    }

    #cards{
      position:absolute;
      inset:0;
      overflow:hidden;
      pointer-events:none;
    }

    .polaroid{
      position:absolute;
      transform-origin:50% 0%;
      will-change:transform, opacity;
      opacity:1;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.16));
    }

    .card{
      position:relative;
      width:100%;
      height:100%;
      overflow:visible;
      border-radius:2px;
      box-shadow:0 10px 22px rgba(0,0,0,.14);
    }

    .inner{
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      border-radius:2px;
    }

    .photo-wrap{
      position:relative;
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .photo-wrap img{
      display:block;
      width:auto;
      height:auto;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
    }

    .caption{
      flex:0 0 auto;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-weight:700;
      color:#111;
      overflow:hidden;
      line-height:1.07;
      padding:0 .38em;
      word-break:break-word;
      hyphens:auto;
    }

    .caption-text{
      display:-webkit-box;
      -webkit-box-orient:vertical;
      -webkit-line-clamp:2;
      line-clamp:2;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }

    .clip{
      position:absolute;
      left:50%;
      top:0;
      transform-origin:center top;
      z-index:12;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
      display:block;
      width:auto;
      height:auto;
    }

    #controls{
      position:absolute;
      right:8px;
      bottom:8px;
      z-index:999;
      display:grid;
      grid-template-columns:repeat(2, auto);
      gap:4px;
      transition:opacity .25s ease;
    }

    #controls.hidden{
      opacity:0;
      pointer-events:none;
    }

    .fmt-btn{
      appearance:none;
      border:none;
      border-radius:999px;
      background:var(--btn-bg);
      color:var(--btn-text);
      font-size:11px;
      font-weight:700;
      line-height:1;
      padding:6px 10px;
      min-width:50px;
      cursor:pointer;
      backdrop-filter:blur(3px);
      box-shadow:0 2px 7px rgba(0,0,0,.08);
      transition:.18s ease;
    }

    .fmt-btn:hover{ background:rgba(255,255,255,.84); }
    .fmt-btn.active{ background:var(--btn-bg-active); }

    @keyframes cardIn{
      0%{
        opacity:0;
        transform:
          translate(var(--in-x0), var(--in-y0))
          rotate(var(--in-r0))
          scale(.95);
      }
      25%{ opacity:.85; }
      55%{
        opacity:1;
        transform:
          translate(var(--in-x1), var(--in-y1))
          rotate(var(--in-r1))
          scale(1.012);
      }
      100%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--rest-r))
          scale(1);
      }
    }

    @keyframes clipIn{
      0%{
        opacity:0;
        transform:
          translate(-50%,0)
          translate(var(--clip-x0), var(--clip-y0))
          rotate(var(--clip-r0))
          scale(.95);
      }
      60%{
        opacity:1;
        transform:
          translate(-50%,0)
          translate(var(--clip-x1), var(--clip-y1))
          rotate(var(--clip-r1))
          scale(1.01);
      }
      100%{
        opacity:1;
        transform:
          translate(-50%,0)
          translate(var(--clip-xf), var(--clip-yf))
          rotate(var(--clip-rf))
          scale(1);
      }
    }

    @keyframes cardOut{
      0%{
        opacity:1;
        transform:
          translate(0,0)
          rotate(var(--rest-r));
      }
      100%{
        opacity:0;
        transform:
          translate(var(--out-x), var(--out-y))
          rotate(calc(var(--rest-r) + var(--out-r)))
          scale(.92);
      }
    }

    @keyframes clipOut{
      0%{
        opacity:1;
        transform:
          translate(-50%,0)
          translate(var(--clip-xf), var(--clip-yf))
          rotate(var(--clip-rf))
          scale(1);
      }
      100%{
        opacity:0;
        transform:
          translate(-50%,0)
          translate(var(--clip-ox), var(--clip-oy))
          rotate(calc(var(--clip-rf) + var(--clip-or)))
          scale(.92);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="wall"></div>
      <div id="cards"></div>
    </div>

    <div id="controls">
      <button class="fmt-btn" data-format="4:3">4:3</button>
      <button class="fmt-btn active" data-format="16:9">16:9</button>
      <button class="fmt-btn" data-format="16:10">16:10</button>
      <button class="fmt-btn" data-format="7:5">7:5</button>
    </div>
  </div>

  <script>
    (() => {
      const stageEl = document.getElementById("stage");
      const wallEl = document.getElementById("wall");
      const cardsEl = document.getElementById("cards");
      const controlsEl = document.getElementById("controls");

      const FORMATS = {
        "4:3":   { w:4,  h:3  },
        "16:9":  { w:16, h:9  },
        "16:10": { w:16, h:10 },
        "7:5":   { w:7,  h:5  }
      };

      const CLIP_PATHS = [
        "assets/klammer1_uhd.png",
        "assets/klammer2_uhd.png",
        "assets/klammer3_uhd.png"
      ];

      const MIN_VISIBLE = 2;
      const MAX_VISIBLE = 5;
      const FETCH_INTERVAL = 15000;

      let currentFormat = "16:9";
      let resources = [];
      let activeCards = [];
      let fetchTimer = null;
      let cycleTimer = null;
      let cycleIndex = 0;
      const slotMemory = new Map();

      function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
      function rand(min, max){ return min + Math.random() * (max - min); }
      function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
      function shuffle(arr){
        const a = [...arr];
        for(let i = a.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function toTime(v){
        const t = new Date(v).getTime();
        return Number.isFinite(t) ? t : 0;
      }

      function stageSize(){
        return { w: stageEl.clientWidth, h: stageEl.clientHeight };
      }

      function resizeStage(){
        const fmt = FORMATS[currentFormat];
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let w = vw;
        let h = w * fmt.h / fmt.w;

        if(h > vh){
          h = vh;
          w = h * fmt.w / fmt.h;
        }

        stageEl.style.width = `${Math.round(w)}px`;
        stageEl.style.height = `${Math.round(h)}px`;
      }

      function enterFullscreen(){
        const el = document.documentElement;
        if(!document.fullscreenElement && el.requestFullscreen){
          el.requestFullscreen().catch(() => {});
        }
      }

      function updateControlsVisibility(){
        if(document.fullscreenElement){
          controlsEl.classList.add("hidden");
        } else {
          controlsEl.classList.remove("hidden");
        }
      }

      document.addEventListener("fullscreenchange", updateControlsVisibility);

      document.querySelectorAll(".fmt-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".fmt-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          currentFormat = btn.dataset.format;
          resizeStage();
          relayoutAll();
          enterFullscreen();
        });
      });

      window.addEventListener("resize", () => {
        resizeStage();
        relayoutAll();
      });

      function ropeY(row, xNorm){
        const x = xNorm;

        if(row === 1){
          return 0.043 + 0.31 * Math.pow(x - 0.5, 2);
        }
        if(row === 2){
          return 0.384 + 0.36 * Math.pow(x - 0.5, 2);
        }
        return 0.726 + 0.39 * Math.pow(x - 0.5, 2);
      }

      function buildAnchors(){
        return [
          { id:"r1a", row:1, x:0.11 },
          { id:"r1b", row:1, x:0.28 },
          { id:"r1c", row:1, x:0.47 },
          { id:"r1d", row:1, x:0.67 },
          { id:"r1e", row:1, x:0.86 },

          { id:"r2a", row:2, x:0.12 },
          { id:"r2b", row:2, x:0.31 },
          { id:"r2c", row:2, x:0.50 },
          { id:"r2d", row:2, x:0.70 },
          { id:"r2e", row:2, x:0.87 },

          { id:"r3a", row:3, x:0.14 },
          { id:"r3b", row:3, x:0.34 },
          { id:"r3c", row:3, x:0.53 },
          { id:"r3d", row:3, x:0.73 },
          { id:"r3e", row:3, x:0.88 }
        ].map(a => {
          const mem = slotMemory.get(a.id) || { lastUsed:-999, hits:0 };
          return {
            ...a,
            y: ropeY(a.row, a.x),
            lastUsed: mem.lastUsed,
            hits: mem.hits
          };
        });
      }

      function getOrientation(res){
        const ar = res.width / res.height;
        if(ar > 1.18) return "landscape";
        if(ar < 0.86) return "portrait";
        return "square";
      }

      function getTaskMeta(taskId, fallbackTitle){
        const t = (APP_CONFIG.tasks || []).find(x => x.id === taskId);
        return {
          title: t?.title || fallbackTitle || "Fotochallenge",
          color: t?.color || "#dbe8f4"
        };
      }

      function normalizeResource(r){
        const custom = r.context?.custom || {};
        const meta = getTaskMeta(custom.task_id, custom.task_title);

        return {
          assetId: r.asset_id,
          publicId: r.public_id,
          width: Number(r.width) || 1000,
          height: Number(r.height) || 1000,
          createdAt: custom.created_at || r.created_at,
          createdNum: toTime(custom.created_at || r.created_at),
          secureUrl: `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/upload/${r.public_id}.${r.format || "jpg"}`,
          taskId: custom.task_id || "sammelordner",
          title: custom.caption || custom.task_title || meta.title,
          color: meta.color,
          orientation: getOrientation(r),
          usedCount: 0,
          recentBoost: false
        };
      }

      async function fetchResources(){
        try{
          const url = `https://res.cloudinary.com/${APP_CONFIG.cloudName}/image/list/${APP_CONFIG.eventTag}.json?_=${Date.now()}`;
          const res = await fetch(url, { cache:"no-store" });
          if(!res.ok) return;

          const data = await res.json();
          const incoming = (data.resources || [])
            .filter(r => r.type === "upload")
            .map(normalizeResource)
            .sort((a,b) => b.createdNum - a.createdNum);

          const newestIds = new Set(incoming.slice(0, 6).map(x => x.assetId));
          incoming.forEach(x => x.recentBoost = newestIds.has(x.assetId));

          incoming.forEach(x => {
            const old = resources.find(r => r.assetId === x.assetId);
            if(old) x.usedCount = old.usedCount || 0;
          });

          resources = incoming;
        } catch(err){
          console.error("Cloudinary list fetch failed:", err);
        }
      }

      function estimateTitleWidth(title, fontSize){
        return title.length * fontSize * 0.54;
      }

      function getCaptionFont(cardW, title){
        let fs = clamp(cardW * 0.064, 15, 23);
        if(title.length > 28) fs *= 0.93;
        if(title.length > 40) fs *= 0.86;
        if(title.length > 54) fs *= 0.79;
        return Math.round(fs);
      }

      function getCardMetrics(resource){
        const { w: stageW, h: stageH } = stageSize();
        const o = resource.orientation;
        const ar = resource.width / resource.height;

        const outerBorder = Math.round(stageW * 0.0022);
        const innerPadX = Math.round(stageW * 0.0041);
        const innerPadTop = Math.round(stageH * 0.0045);

        let photoW, photoH, minCardW, maxCardW;

        if(o === "landscape"){
          photoW = stageW * 0.235;
          photoH = photoW / ar;
          minCardW = stageW * 0.18;
          maxCardW = stageW * 0.265;
        } else if(o === "portrait"){
          photoH = stageH * 0.305;
          photoW = photoH * ar;
          minCardW = stageW * 0.14;
          maxCardW = stageW * 0.205;
        } else {
          photoW = stageW * 0.205;
          photoH = photoW;
          minCardW = stageW * 0.155;
          maxCardW = stageW * 0.225;
        }

        let baseW = Math.max(photoW + innerPadX * 2, minCardW);
        let captionFont = getCaptionFont(baseW, resource.title);
        let needW = estimateTitleWidth(resource.title, captionFont) / 2 + stageW * 0.022;
        let cardW = clamp(Math.max(baseW, needW), minCardW, maxCardW);

        captionFont = getCaptionFont(cardW, resource.title);
        const captionPadY = Math.round(captionFont * 0.25);
        const captionH = Math.round(captionFont * 2.15 + captionPadY * 2);

        const cardH = Math.round(
          outerBorder * 2 +
          innerPadTop +
          photoH +
          captionH
        );

        const clipH = Math.round(stageH * 0.155);

        return {
          photoW: Math.round(photoW),
          photoH: Math.round(photoH),
          cardW: Math.round(cardW),
          cardH,
          outerBorder,
          innerPadX,
          innerPadTop,
          captionH,
          captionFont,
          clipH
        };
      }

      function getGroup(resource, metrics){
        const o = resource.orientation;
        const area = metrics.cardW * metrics.cardH;

        if(o === "portrait"){
          return area > 90000 ? "portraitTall" : "portrait";
        }
        if(o === "landscape"){
          return area > 100000 ? "landscapeWide" : "landscape";
        }
        return "square";
      }

      function anchorCompatible(anchor, group){
        if(group === "portraitTall" && anchor.row === 3) return false;
        return true;
      }

      function scoreAnchor(anchor, group){
        let score = (cycleIndex - anchor.lastUsed) * 10;
        score -= anchor.hits * 14;
        score += rand(0, 3);

        if(group === "portraitTall"){
          if(anchor.row === 1) score += 16;
          if(anchor.row === 2) score += 8;
        } else if(group === "portrait"){
          if(anchor.row === 1) score += 10;
          if(anchor.row === 2) score += 10;
          if(anchor.row === 3) score -= 100;
        } else if(group === "landscapeWide"){
          if(anchor.row === 2) score += 12;
          if(anchor.row === 1) score += 8;
          if(anchor.row === 3) score += 4;
        } else if(group === "landscape"){
          if(anchor.row === 2) score += 10;
          if(anchor.row === 1) score += 8;
          if(anchor.row === 3) score += 5;
        } else {
          if(anchor.row === 2) score += 9;
          if(anchor.row === 1) score += 7;
          if(anchor.row === 3) score += 4;
        }

        return score;
      }

      function getTopLeft(anchor, metrics){
        const { w, h } = stageSize();
        const ropeX = anchor.x * w;
        const ropeYpx = anchor.y * h;

        const clipOverlapIntoCard = metrics.clipH * 0.16;
        const cardTop = ropeYpx - clipOverlapIntoCard;

        return {
          x: ropeX - metrics.cardW / 2,
          y: cardTop
        };
      }

      function getBBox(x, y, w, h, angleDeg){
        const a = Math.abs(angleDeg) * Math.PI / 180;
        const bw = Math.abs(Math.cos(a) * w) + Math.abs(Math.sin(a) * h);
        const bh = Math.abs(Math.sin(a) * w) + Math.abs(Math.cos(a) * h);

        return {
          left: x - (bw - w) / 2,
          top: y - (bh - h) / 2,
          right: x + w + (bw - w) / 2,
          bottom: y + h + (bh - h) / 2
        };
      }

      function overlaps(a, b, pad = 12){
        return !(
          a.right < b.left + pad ||
          a.left > b.right - pad ||
          a.bottom < b.top + pad ||
          a.top > b.bottom - pad
        );
      }

      function rectIntersection(a, b){
        const x = Math.max(0, Math.min(a.right, b.right) - Math.max(a.left, b.left));
        const y = Math.max(0, Math.min(a.bottom, b.bottom) - Math.max(a.top, b.top));
        return x * y;
      }

      function getSlotFootprint(placement, group){
        const { x, y, metrics, angle } = placement;

        let fw = metrics.cardW;
        let fh = metrics.cardH;

        if(group === "portraitTall"){
          fw *= 1.18;
          fh *= 1.12;
        } else if(group === "portrait"){
          fw *= 1.12;
          fh *= 1.08;
        } else if(group === "landscapeWide"){
          fw *= 1.16;
          fh *= 1.06;
        } else if(group === "landscape"){
          fw *= 1.11;
          fh *= 1.05;
        } else {
          fw *= 1.1;
          fh *= 1.08;
        }

        return getBBox(
          x - (fw - metrics.cardW) / 2,
          y - (fh - metrics.cardH) / 2,
          fw,
          fh,
          angle
        );
      }

      function choosePlacement(resource, previewPlacements = []){
        const { w: stageW, h: stageH } = stageSize();
        const metrics = getCardMetrics(resource);
        const group = getGroup(resource, metrics);

        const anchors = buildAnchors()
          .filter(a => anchorCompatible(a, group))
          .filter(a => !activeCards.some(c => c.anchorId === a.id))
          .filter(a => !previewPlacements.some(p => p.anchorId === a.id))
          .sort((a,b) => scoreAnchor(b, group) - scoreAnchor(a, group));

        const anglePool =
          resource.orientation === "portrait"
            ? [-8,-7,-6,-5,-4,4,5,6,7,8]
            : resource.orientation === "square"
              ? [-8,-7,-6,-5,5,6,7,8]
              : [-7,-6,-5,-4,4,5,6,7];

        let best = null;

        for(const anchor of anchors){
          const angleTry = shuffle(anglePool);

          for(const angle of angleTry){
            const pos = getTopLeft(anchor, metrics);
            const bbox = getBBox(pos.x, pos.y, metrics.cardW, metrics.cardH, angle);

            if(bbox.left < 8 || bbox.right > stageW - 8) continue;
            if(bbox.top < 6) continue;
            if(bbox.bottom > stageH - 10) continue;

            const candidate = {
              anchorId: anchor.id,
              row: anchor.row,
              xNorm: anchor.x,
              yNorm: anchor.y,
              x: pos.x,
              y: pos.y,
              angle,
              metrics,
              bbox,
              group
            };

            const footprint = getSlotFootprint(candidate, group);
            const footprintArea = (footprint.right - footprint.left) * (footprint.bottom - footprint.top);

            let collision = false;
            let penalty = 0;

            for(const c of activeCards){
              const inter = rectIntersection(footprint, c.footprint);
              const share = inter / Math.min(footprintArea, c.footprintArea);
              if(share > 0.10){ collision = true; break; }
              penalty += share;
            }

            if(collision) continue;

            for(const p of previewPlacements){
              const inter = rectIntersection(footprint, p.footprint);
              const share = inter / Math.min(footprintArea, p.footprintArea);
              if(share > 0.10){ collision = true; break; }
              penalty += share;
            }

            if(collision) continue;

            candidate.footprint = footprint;
            candidate.penalty = penalty;

            if(!best || penalty < best.penalty){
              best = candidate;
              if(penalty < 0.0001) return best;
            }
          }
        }

        return best;
      }

      function createCard(resource, placement){
        const wrap = document.createElement("div");
        wrap.className = "polaroid";
        wrap.style.left = `${placement.x}px`;
        wrap.style.top = `${placement.y}px`;
        wrap.style.width = `${placement.metrics.cardW}px`;
        wrap.style.height = `${placement.metrics.cardH}px`;
        wrap.style.setProperty("--rest-r", `${placement.angle}deg`);

        const card = document.createElement("div");
        card.className = "card";
        card.style.background = "#fff";
        card.style.border = `${placement.metrics.outerBorder}px solid rgba(255,255,255,.98)`;

        const inner = document.createElement("div");
        inner.className = "inner";
        inner.style.background = resource.color;
        inner.style.padding = `${placement.metrics.innerPadTop}px ${placement.metrics.innerPadX}px 0`;

        const photoWrap = document.createElement("div");
        photoWrap.className = "photo-wrap";
        photoWrap.style.height = `${placement.metrics.photoH}px`;

        const img = document.createElement("img");
        img.src = resource.secureUrl;
        img.alt = resource.title;
        img.style.width = `${placement.metrics.photoW}px`;
        img.style.height = `${placement.metrics.photoH}px`;

        const caption = document.createElement("div");
        caption.className = "caption";
        caption.style.background = resource.color;
        caption.style.minHeight = `${placement.metrics.captionH}px`;
        caption.style.maxHeight = `${placement.metrics.captionH}px`;
        caption.style.fontSize = `${placement.metrics.captionFont}px`;

        const captionText = document.createElement("div");
        captionText.className = "caption-text";
        captionText.textContent = resource.title;

        photoWrap.appendChild(img);
        caption.appendChild(captionText);
        inner.appendChild(photoWrap);
        inner.appendChild(caption);
        card.appendChild(inner);

        const clip = document.createElement("img");
        clip.className = "clip";
        clip.src = pick(CLIP_PATHS);
        clip.alt = "";
        clip.style.height = `${placement.metrics.clipH}px`;

        const clipX = rand(-placement.metrics.cardW * 0.07, placement.metrics.cardW * 0.07);
        const clipY = -placement.metrics.clipH * 0.83;
        const clipR = rand(-8, 8);

        clip.style.setProperty("--clip-xf", `${clipX}px`);
        clip.style.setProperty("--clip-yf", `${clipY}px`);
        clip.style.setProperty("--clip-rf", `${clipR}deg`);
        clip.style.transform = `translate(-50%,0) translate(${clipX}px, ${clipY}px) rotate(${clipR}deg)`;

        wrap.appendChild(card);
        wrap.appendChild(clip);

        return { wrap, card, clip };
      }

      function setEnterAnimation(dom, finalAngle, delayMs){
        dom.wrap.style.setProperty("--in-x0", `${rand(-16, 16)}px`);
        dom.wrap.style.setProperty("--in-y0", `${rand(-46, -28)}px`);
        dom.wrap.style.setProperty("--in-r0", `${finalAngle + rand(-12,12)}deg`);
        dom.wrap.style.setProperty("--in-x1", `${rand(-6, 6)}px`);
        dom.wrap.style.setProperty("--in-y1", `${rand(0, 6)}px`);
        dom.wrap.style.setProperty("--in-r1", `${finalAngle - rand(2,5)}deg`);

        dom.clip.style.setProperty("--clip-x0", `${rand(-12,12)}px`);
        dom.clip.style.setProperty("--clip-y0", `${rand(-44,-24)}px`);
        dom.clip.style.setProperty("--clip-r0", `${rand(-14,14)}deg`);
        dom.clip.style.setProperty("--clip-x1", `${rand(-4,4)}px`);
        dom.clip.style.setProperty("--clip-y1", `${rand(-2,2)}px`);
        dom.clip.style.setProperty("--clip-r1", `${rand(-7,7)}deg`);

        dom.wrap.style.animation = `cardIn 2s cubic-bezier(.18,.82,.18,1) ${delayMs}ms forwards`;
        dom.clip.style.animation = `clipIn 1.8s cubic-bezier(.18,.82,.18,1) ${delayMs}ms forwards`;
      }

      function setLeaveAnimation(state){
        state.dom.wrap.style.setProperty("--out-x", `${rand(-28,28)}px`);
        state.dom.wrap.style.setProperty("--out-y", `${rand(60,96)}px`);
        state.dom.wrap.style.setProperty("--out-r", `${rand(-9,9)}deg`);

        state.dom.clip.style.setProperty("--clip-ox", `${rand(-14,14)}px`);
        state.dom.clip.style.setProperty("--clip-oy", `${rand(-22,-8)}px`);
        state.dom.clip.style.setProperty("--clip-or", `${rand(-14,14)}deg`);

        state.dom.wrap.style.animation = `cardOut 1.15s ease-in forwards`;
        state.dom.clip.style.animation = `clipOut .8s ease-in forwards`;
      }

      function addCard(resource, placement, delayMs){
        const dom = createCard(resource, placement);
        cardsEl.appendChild(dom.wrap);

        setEnterAnimation(dom, placement.angle, delayMs);

        const state = {
          id: resource.assetId,
          resource,
          anchorId: placement.anchorId,
          row: placement.row,
          angle: placement.angle,
          x: placement.x,
          y: placement.y,
          bbox: placement.bbox,
          footprint: placement.footprint,
          footprintArea: (placement.footprint.right - placement.footprint.left) * (placement.footprint.bottom - placement.footprint.top),
          dom,
          bornAt: Date.now(),
          bornCycle: cycleIndex
        };

        activeCards.push(state);

        slotMemory.set(placement.anchorId, {
          lastUsed: cycleIndex,
          hits: clamp((slotMemory.get(placement.anchorId)?.hits || 0) + 1, 0, 5)
        });

        resources = resources.map(r => r.assetId === resource.assetId
          ? { ...r, usedCount:(r.usedCount || 0) + 1 }
          : r
        );
      }

      function removeCards(cardsToRemove){
        return new Promise(resolve => {
          if(!cardsToRemove.length){
            resolve();
            return;
          }

          cardsToRemove.forEach(setLeaveAnimation);

          setTimeout(() => {
            cardsToRemove.forEach(c => {
              c.dom.wrap.remove();
              activeCards = activeCards.filter(x => x.id !== c.id);
            });
            resolve();
          }, 1300);
        });
      }

      function availableResources(){
        const activeIds = new Set(activeCards.map(c => c.id));
        const pool = resources.filter(r => !activeIds.has(r.assetId));
        return pool.length ? pool : resources;
      }

      function chooseResources(n){
        const pool = availableResources();
        if(!pool.length) return [];

        return pool
          .map(r => {
            let score = rand(0, 4);
            if(r.recentBoost) score += 18;
            score += Math.max(0, 8 - (r.usedCount || 0) * 2);
            score += (Date.now() - r.createdNum < 180000) ? 8 : 0;
            return { r, score };
          })
          .sort((a,b) => b.score - a.score)
          .slice(0, n)
          .map(x => x.r);
      }

      function chooseRemoveCount(currentCount){
        const possible = [1,2,3].filter(n => currentCount - n >= MIN_VISIBLE);
        if(!possible.length) return 0;
        return pick(possible.flatMap(n => n === 2 ? [2,2,2] : n === 3 ? [3,3] : [1]));
      }

      function chooseAddCount(afterRemove){
        const possible = [1,2,3].filter(n => afterRemove + n <= MAX_VISIBLE);
        if(!possible.length) return 0;
        return pick(possible.flatMap(n => n === 2 ? [2,2,2] : n === 3 ? [3,3] : [1]));
      }

      function chooseRemovalCards(n){
        return [...activeCards]
          .sort((a,b) => a.bornAt - b.bornAt || a.bornCycle - b.bornCycle)
          .slice(0, n);
      }

      function decaySlotMemory(){
        for(const [k,v] of slotMemory.entries()){
          slotMemory.set(k, {
            lastUsed: v.lastUsed,
            hits: Math.max(0, (v.hits || 0) - 1)
          });
        }
      }

      function relayoutAll(){
        const old = [...activeCards];
        cardsEl.innerHTML = "";
        activeCards = [];

        const preview = [];
        old.forEach((c, i) => {
          const placement = choosePlacement(c.resource, preview);
          if(!placement) return;
          preview.push(placement);
          addCard(c.resource, placement, i * 160);
        });
      }

      async function initialFill(){
        if(!resources.length) return;

        const wanted = clamp(Math.min(4, resources.length), MIN_VISIBLE, MAX_VISIBLE);
        const chosen = chooseResources(wanted);
        const preview = [];

        chosen.forEach((res, i) => {
          const placement = choosePlacement(res, preview);
          if(!placement) return;
          preview.push(placement);
          addCard(res, placement, i * 500);
        });

        scheduleNext(9000);
      }

      function scheduleNext(ms){
        clearTimeout(cycleTimer);
        cycleTimer = setTimeout(runCycle, ms);
      }

      async function runCycle(){
        cycleIndex++;
        decaySlotMemory();

        if(!resources.length){
          scheduleNext(5000);
          return;
        }

        if(activeCards.length < MIN_VISIBLE){
          const need = MIN_VISIBLE - activeCards.length;
          const preview = [];
          chooseResources(need).forEach((res, i) => {
            const placement = choosePlacement(res, preview);
            if(!placement) return;
            preview.push(placement);
            addCard(res, placement, i * 500);
          });
          scheduleNext(7000);
          return;
        }

        const removeCount = chooseRemoveCount(activeCards.length);
        const toRemove = chooseRemovalCards(removeCount);
        const afterRemove = activeCards.length - toRemove.length;
        const addCount = chooseAddCount(afterRemove);

        const chosen = chooseResources(addCount);
        const preview = [];
        const planned = [];

        chosen.forEach(res => {
          const placement = choosePlacement(res, preview);
          if(!placement) return;
          preview.push(placement);
          planned.push({ res, placement });
        });

        await removeCards(toRemove);
        await new Promise(r => setTimeout(r, 700));

        planned.forEach((p, i) => addCard(p.res, p.placement, i * 500));

        const delay =
          planned.length >= 3 ? 15000 :
          planned.length === 2 ? 10000 :
          5000;

        scheduleNext(delay + rand(300, 1200));
      }

      function startFetchLoop(){
        clearInterval(fetchTimer);
        fetchTimer = setInterval(fetchResources, FETCH_INTERVAL);
      }

      async function init(){
        resizeStage();
        await fetchResources();
        await initialFill();
        startFetchLoop();
        updateControlsVisibility();
      }

      init();
    })();
  </script>
</body>
